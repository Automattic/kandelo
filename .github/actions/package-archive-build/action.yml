name: Build package archive
description: |
  Resolve one package matrix entry, build its archive, and upload the
  archive artifact for downstream test/publish steps.

inputs:
  package:
    description: Package name under packages/registry.
    required: true
  arch:
    description: Target package architecture.
    required: true
  build-host:
    description: Stable build host/provenance string embedded in manifest.toml.
    required: true
  expected-cache-key-sha:
    description: Preflight-computed cache_key_sha this archive must carry.
    required: true
  materialize-library-overlays:
    description: Whether to download library-wave artifacts and write package.pr.toml overlays.
    required: false
    default: "false"
  library-matrix:
    description: JSON library package matrix for this run; available artifacts are downloaded before program builds.
    required: false
    default: "[]"
  dependency-matrix:
    description: JSON package matrix for this run; selected direct program dependencies are downloaded before building.
    required: false
    default: "[]"
  github-token:
    description: Token with actions:read permission, required when materialize-library-overlays is true.
    required: false
    default: ""

outputs:
  archive-path:
    description: Path to the produced .tar.zst archive.
    value: ${{ steps.archive.outputs.archive-path }}
  archive-name:
    description: Basename of the produced .tar.zst archive.
    value: ${{ steps.archive.outputs.archive-name }}

runs:
  using: composite
  steps:
    - name: Compute commit-bound build provenance
      id: provenance
      shell: bash
      env:
        BUILD_HOST: ${{ inputs.build-host }}
      run: |
        set -euo pipefail
        ts=$(git log -1 --format=%aI HEAD)
        echo "build-timestamp=$ts" >> "$GITHUB_OUTPUT"
        echo "build-host=$BUILD_HOST" >> "$GITHUB_OUTPUT"
        echo "provenance: build-timestamp=$ts" >&2

    - name: Fetch musl submodule
      uses: ./.github/actions/fetch-submodules
      with:
        submodules: libc/musl

    - name: Set up Nix
      uses: ./.github/actions/setup-nix

    - name: Download toolchain sysroots artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: toolchain-sysroots
        path: ${{ runner.temp }}/toolchain

    - name: Extract toolchain sysroots
      shell: bash
      run: tar --zstd -xf "$RUNNER_TEMP/toolchain/toolchain-sysroots.tar.zst"

    - name: Install host npm deps
      shell: bash
      run: |
        bash scripts/dev-shell.sh bash -c '
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund
          cd host && PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund
        '

    - name: Resolve selected library artifacts
      if: ${{ inputs.materialize-library-overlays == 'true' && inputs.library-matrix != '[]' }}
      shell: bash
      run: |
        set -euo pipefail
        matrix_file="$RUNNER_TEMP/library-matrix.json"
        artifact_file="$RUNNER_TEMP/library-dependency-artifacts.txt"
        printf '%s\n' '${{ inputs.library-matrix }}' > "$matrix_file"
        jq -r '.[] | "\(.package)-\(.arch)"' "$matrix_file" > "$artifact_file"

        if [ -s "$artifact_file" ]; then
          while IFS= read -r artifact; do
            if ! [[ "$artifact" =~ ^[A-Za-z0-9._-]+-wasm(32|64)$ ]]; then
              echo "::error::invalid library artifact name from library matrix: '$artifact'"
              exit 1
            fi
          done < "$artifact_file"
          echo "selected library dependency artifacts:"
          sed 's/^/  /' "$artifact_file"
        else
          echo "selected library dependency artifacts: none"
        fi

    - name: Resolve selected program dependency artifacts
      id: program-deps
      if: ${{ inputs.dependency-matrix != '[]' }}
      shell: bash
      run: |
        set -euo pipefail
        matrix_file="$RUNNER_TEMP/program-matrix.json"
        artifact_file="$RUNNER_TEMP/program-dependency-artifacts.txt"
        printf '%s\n' '${{ inputs.dependency-matrix }}' > "$matrix_file"
        bash scripts/dev-shell.sh bash -lc '
          HOST_TARGET=$(rustc -vV | awk "/^host/ {print \$2}")
          cargo run --release -p xtask --target "$HOST_TARGET" --quiet -- \
            package-dependency-artifacts \
              --registry packages/registry \
              --matrix "$RUNNER_TEMP/program-matrix.json" \
              --package "${{ inputs.package }}" \
              --arch "${{ inputs.arch }}" \
              > "$RUNNER_TEMP/program-dependency-artifacts.txt"
        '

        if [ -s "$artifact_file" ]; then
          while IFS= read -r artifact; do
            if ! [[ "$artifact" =~ ^[A-Za-z0-9._-]+-wasm(32|64)$ ]]; then
              echo "::error::invalid dependency artifact name from package-dependency-artifacts: '$artifact'"
              exit 1
            fi
          done < "$artifact_file"
          echo "has-dependencies=true" >> "$GITHUB_OUTPUT"
          echo "selected program dependency artifacts:"
          sed 's/^/  /' "$artifact_file"
        else
          echo "has-dependencies=false" >> "$GITHUB_OUTPUT"
          echo "selected program dependency artifacts: none"
        fi

    - name: Collect dependency artifacts
      id: deps
      shell: bash
      run: |
        set -euo pipefail
        artifacts_file="$RUNNER_TEMP/dependency-artifacts.txt"
        : > "$artifacts_file"
        for file in \
          "$RUNNER_TEMP/library-dependency-artifacts.txt" \
          "$RUNNER_TEMP/program-dependency-artifacts.txt"
        do
          [ -f "$file" ] || continue
          cat "$file"
        done | sed '/^$/d' | sort -u > "$artifacts_file"

        if [ -s "$artifacts_file" ]; then
          echo "has-dependencies=true" >> "$GITHUB_OUTPUT"
          echo "dependency artifacts to download:"
          sed 's/^/  /' "$artifacts_file"
        else
          echo "has-dependencies=false" >> "$GITHUB_OUTPUT"
          echo "dependency artifacts to download: none"
        fi

    - name: Download selected dependency archives
      if: ${{ steps.deps.outputs.has-dependencies == 'true' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: bash .github/scripts/download-dependency-artifacts.sh "$RUNNER_TEMP/dependency-artifacts.txt" "$RUNNER_TEMP/lib-archives"

    - name: Materialize dependency overlays
      if: ${{ steps.deps.outputs.has-dependencies == 'true' }}
      shell: bash
      run: bash scripts/materialize-pr-overlays.sh "$RUNNER_TEMP/lib-archives"

    - name: Build package archive
      id: archive
      shell: bash
      run: |
        bash scripts/dev-shell.sh bash -c '
          HOST_TARGET=$(rustc -vV | awk "/^host/ {print \$2}")
          cargo run --release -p xtask --target "$HOST_TARGET" --quiet -- \
            archive-stage \
              --package "packages/registry/${{ inputs.package }}" \
              --arch "${{ inputs.arch }}" \
              --out "$RUNNER_TEMP/staged" \
              --build-timestamp "${{ steps.provenance.outputs.build-timestamp }}" \
              --build-host "${{ steps.provenance.outputs.build-host }}" \
              --binaries-dir "$(pwd)/binaries" \
              --expected-cache-key-sha "${{ inputs.expected-cache-key-sha }}"
        '
        archive_path=$(find "$RUNNER_TEMP/staged" -name '*.tar.zst' -print -quit)
        archive_name=$(basename "$archive_path")
        echo "archive-path=$archive_path" >> "$GITHUB_OUTPUT"
        echo "archive-name=$archive_name" >> "$GITHUB_OUTPUT"

    - name: Upload archive as workflow artifact
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.package }}-${{ inputs.arch }}
        path: ${{ runner.temp }}/staged/*.tar.zst
        retention-days: 7
        if-no-files-found: error
