name: Browser demo smoke tests

on:
  pull_request:
    paths:
      - ".github/workflows/browser-demos-ci.yml"
      - "apps/browser-demos/**"
      - "host/package.json"
      - "host/package-lock.json"
      - "host/src/**"
      - "host/tsconfig.json"
      - "host/tsup.config.ts"
      - "web-libs/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/browser-demos-ci.yml"
      - "apps/browser-demos/**"
      - "host/package.json"
      - "host/package-lock.json"
      - "host/src/**"
      - "host/tsconfig.json"
      - "host/tsup.config.ts"
      - "web-libs/**"

permissions:
  contents: read

jobs:
  coi:
    name: COI smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            apps/browser-demos/package-lock.json
            host/package-lock.json

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          github-token: ""

      - name: Cache Nix store + flake eval
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
        with:
          use-gha-cache: false
          use-flakehub: false

      - name: Resolve current ABI kernel
        run: |
          ABI=$(grep -oE "ABI_VERSION: u32 = [0-9]+" crates/shared/src/lib.rs | awk '{print $4}')
          export WASM_POSIX_BINARY_INDEX_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/binaries-abi-v${ABI}/index.toml"
          bash scripts/dev-shell.sh bash -c '
            set -euo pipefail
            HOST_TARGET=$(rustc -vV | sed -n "s/^host: //p")
            cargo run --release -p xtask --target "$HOST_TARGET" --quiet -- \
              build-deps --arch wasm32 --binaries-dir "$PWD/binaries" \
              --fetch-only resolve kernel >/dev/null
            scripts/resolve-binary.sh kernel.wasm >/dev/null
          '

      - name: Install browser demo dependencies
        working-directory: apps/browser-demos
        run: npm ci --no-audit --no-fund

      - name: Install host dependencies
        working-directory: host
        run: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund

      - name: Typecheck host package
        working-directory: host
        run: npm run typecheck

      - name: Install Playwright browsers
        working-directory: apps/browser-demos
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run browser smoke tests
        working-directory: apps/browser-demos
        run: |
          npx playwright test \
            test/coi.spec.ts \
            test/browser-kernel-lazy-registration.spec.ts \
            test/wasm-trap-signal.spec.ts \
            --project=chromium \
            --project=firefox \
            --project=webkit
