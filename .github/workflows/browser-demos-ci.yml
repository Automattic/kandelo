name: Browser demo smoke tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/browser-demos-ci.yml"
      - "apps/browser-demos/**"
      - "host/package.json"
      - "host/package-lock.json"
      - "host/src/**"
      - "host/tsconfig.json"
      - "host/tsup.config.ts"
      - "web-libs/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/browser-demos-ci.yml"
      - "apps/browser-demos/**"
      - "host/package.json"
      - "host/package-lock.json"
      - "host/src/**"
      - "host/tsconfig.json"
      - "host/tsup.config.ts"
      - "web-libs/**"

permissions:
  contents: read

jobs:
  coi:
    name: COI smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            apps/browser-demos/package-lock.json
            host/package-lock.json

      - name: Install browser demo dependencies
        working-directory: apps/browser-demos
        run: npm ci --no-audit --no-fund

      - name: Install host dependencies
        working-directory: host
        run: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund

      - name: Typecheck host package
        working-directory: host
        run: npm run typecheck

      - name: Install Playwright browsers
        working-directory: apps/browser-demos
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run cross-origin isolation smoke tests
        working-directory: apps/browser-demos
        run: |
          npx playwright test test/coi.spec.ts \
            --project=chromium \
            --project=firefox \
            --project=webkit

  spidermonkey-node-oob-debug:
    name: SpiderMonkey Node OOB debug
    if: |
      (
        github.event_name == 'workflow_dispatch' &&
        startsWith(github.ref_name, 'debug-spidermonkey-oob')
      ) ||
      (
        github.event_name == 'pull_request' &&
        startsWith(github.head_ref, 'debug-spidermonkey-oob')
      )
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      actions: read
      contents: read
    env:
      PR629_RUN_ID: "27139189591"
      KANDELO_PLAYWRIGHT_PORT: "5591"
      KANDELO_BROWSER_NODE_MEMORY_DIAGNOSTICS: "1"
      KANDELO_SM_NODE_DIAG_STYLE: fresh
      KANDELO_SM_NODE_MEMORY_PAGES: "16384"
      KANDELO_SM_NODE_DIAG_REPEAT: "10"
      KANDELO_SM_NODE_DIAG_CASES: "NODE_VERSION NODE_EMPTY WORKER_SAB_TERMINATE_CORE WORKER_SAB_TERMINATE_BUFFER WORKER_SAB_TERMINATE_INTL WORKER_SAB_TERMINATE_BUFFER_INTL WORKER_SAB_TERMINATE_CORE_BUFFER WORKER_SAB_TERMINATE_CORE_INTL WORKER_SAB_TERMINATE_CORE_BUFFER_INTL WORKER_SAB_LISTENERCOUNT_CORE_BUFFER_INTL FULL_SMOKE_NO_TERMINATE FULL_SMOKE FULL_SMOKE_NO_EXIT"
      KANDELO_SM_NODE_DISABLE_NATIVE_EVAL: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            apps/browser-demos/package-lock.json
            host/package-lock.json

      - name: Download PR629 prepared workspace
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/pr629-test-workspace"
          gh run download "$PR629_RUN_ID" \
            --repo "${{ github.repository }}" \
            --name test-workspace \
            --dir "$RUNNER_TEMP/pr629-test-workspace"
          tar --zstd -xf "$RUNNER_TEMP/pr629-test-workspace/test-workspace.tar.zst" \
            -C "$RUNNER_TEMP/pr629-test-workspace"
          rsync -a "$RUNNER_TEMP/pr629-test-workspace/binaries/" binaries/
          rsync -a "$RUNNER_TEMP/pr629-test-workspace/local-binaries/" local-binaries/
          mkdir -p host/wasm
          rsync -a "$RUNNER_TEMP/pr629-test-workspace/host/wasm/" host/wasm/
          bash scripts/ci-verify-browser-workspace.sh

      - name: Patch SpiderMonkey Node native eval hook
        if: env.KANDELO_SM_NODE_DISABLE_NATIVE_EVAL == '1'
        run: |
          set -euo pipefail
          node <<'NODE'
          const { existsSync, readFileSync, writeFileSync } = require('node:fs');
          const paths = [
            'binaries/programs/wasm32/spidermonkey-node.wasm',
            'binaries/programs/wasm32/node.wasm',
            'binaries/programs/wasm32/js.wasm',
            'local-binaries/programs/wasm32/spidermonkey-node.wasm',
            'local-binaries/programs/wasm32/node.wasm',
            'local-binaries/programs/wasm32/js.wasm',
          ];
          const from = Buffer.from("typeof native.evalScriptAsFunction === 'function'");
          const to = Buffer.from("false&&native.evalScriptAsFunction === 'function'");
          if (from.length !== to.length) {
            throw new Error(`replacement length mismatch: ${from.length} !== ${to.length}`);
          }
          for (const path of paths) {
            if (!existsSync(path)) continue;
            const bytes = readFileSync(path);
            let count = 0;
            let offset = 0;
            while ((offset = bytes.indexOf(from, offset)) !== -1) {
              to.copy(bytes, offset);
              offset += to.length;
              count++;
            }
            if (count !== 1) {
              throw new Error(`${path}: expected one native eval hook marker, found ${count}`);
            }
            writeFileSync(path, bytes);
            console.log(`${path}: disabled native eval hook`);
          }
          NODE
          sha256sum \
            binaries/programs/wasm32/spidermonkey-node.wasm \
            binaries/programs/wasm32/node.wasm \
            binaries/programs/wasm32/js.wasm

      - name: Install dependencies and Chromium
        run: |
          set -euo pipefail
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund
          (cd host && PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund)
          (
            cd apps/browser-demos
            PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund
            npx playwright install --with-deps chromium
          )

      - name: Run focused SpiderMonkey Node diagnostics
        run: |
          set -euo pipefail
          out="$RUNNER_TEMP/spidermonkey-node-oob-debug"
          mkdir -p "$out"
          {
            echo "head=$(git rev-parse HEAD)"
            echo "PR629_RUN_ID=$PR629_RUN_ID"
            echo "KANDELO_SM_NODE_DIAG_STYLE=$KANDELO_SM_NODE_DIAG_STYLE"
            echo "KANDELO_SM_NODE_MEMORY_PAGES=$KANDELO_SM_NODE_MEMORY_PAGES"
            echo "KANDELO_SM_NODE_DIAG_CASES=$KANDELO_SM_NODE_DIAG_CASES"
            echo "KANDELO_SM_NODE_DISABLE_NATIVE_EVAL=$KANDELO_SM_NODE_DISABLE_NATIVE_EVAL"
            sha256sum binaries/programs/wasm32/spidermonkey-node.wasm
            sha256sum binaries/programs/wasm32/node.wasm
            sha256sum binaries/programs/wasm32/js.wasm
            uname -a
            google-chrome --version || true
            npx --prefix apps/browser-demos playwright --version
          } | tee "$out/environment.txt"
          (
            cd apps/browser-demos
            npx playwright test test/browser-node-memory-diagnostics.spec.ts \
              --project=chromium \
              --workers=1 \
              --trace=on \
              --output "$out/playwright-output"
          ) 2>&1 | tee "$out/playwright.log"

      - name: Upload SpiderMonkey Node debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spidermonkey-node-oob-debug
          path: ${{ runner.temp }}/spidermonkey-node-oob-debug
          retention-days: 7
          if-no-files-found: warn
