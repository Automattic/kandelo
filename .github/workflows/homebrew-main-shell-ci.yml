name: Homebrew main-shell closure

on:
  pull_request:
    paths:
      - ".github/actions/setup-nix/**"
      - ".github/workflows/homebrew-main-shell-ci.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "MANIFEST"
      - "apps/browser-demos/package-lock.json"
      - "apps/browser-demos/package.json"
      - "apps/browser-demos/pages/kandelo/**"
      - "apps/browser-demos/test/kandelo-homebrew-main-shell.spec.ts"
      - "apps/browser-demos/vite.config.ts"
      - "crates/kernel/**"
      - "crates/shared/**"
      - "flake.lock"
      - "flake.nix"
      - "homebrew/main-shell*"
      - "host/package-lock.json"
      - "host/package.json"
      - "host/src/binary-resolver.ts"
      - "host/src/generated/abi.ts"
      - "host/src/homebrew-vfs-*.ts"
      - "host/src/node-kernel-host.ts"
      - "host/src/vfs/**"
      - "host/test/homebrew-vfs-*.test.ts"
      - "host/test/optional-demo-vfs.test.ts"
      - "host/test/vfs-image.test.ts"
      - "images/rootfs/**"
      - "images/vfs/scripts/build-homebrew-vfs-image.ts"
      - "images/vfs/scripts/vfs-image-helpers.ts"
      - "package-lock.json"
      - "package.json"
      - "packages/registry/rootfs/package.toml"
      - "packages/registry/shell/**"
      - "rust-toolchain.toml"
      - "scripts/build-homebrew-main-shell-closure.sh"
      - "scripts/check-homebrew-main-shell-brewfile.mjs"
      - "scripts/dev-shell.sh"
      - "scripts/fetch-binaries.sh"
      - "scripts/homebrew-brewfile-selection.rb"
      - "scripts/homebrew-checkout-public-tap.sh"
      - "scripts/homebrew-main-shell-node-smoke.ts"
      - "scripts/homebrew-vfs-acceptance-smoke.ts"
      - "scripts/install-local-binary.sh"
      - "scripts/resolve-binary.sh"
      - "scripts/test-homebrew-main-shell-closure.sh"
      - "tools/mkrootfs/**"
      - "web-libs/kandelo-session/src/shell-config.ts"
      - "web-libs/kandelo-session/src/kernel-host.ts"
      - "web-libs/kandelo-session/src/vfs-capacity.ts"
  push:
    branches: [main]
    paths:
      - ".github/actions/setup-nix/**"
      - ".github/workflows/homebrew-main-shell-ci.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "MANIFEST"
      - "apps/browser-demos/package-lock.json"
      - "apps/browser-demos/package.json"
      - "apps/browser-demos/pages/kandelo/**"
      - "apps/browser-demos/test/kandelo-homebrew-main-shell.spec.ts"
      - "apps/browser-demos/vite.config.ts"
      - "crates/kernel/**"
      - "crates/shared/**"
      - "flake.lock"
      - "flake.nix"
      - "homebrew/main-shell*"
      - "host/package-lock.json"
      - "host/package.json"
      - "host/src/binary-resolver.ts"
      - "host/src/generated/abi.ts"
      - "host/src/homebrew-vfs-*.ts"
      - "host/src/node-kernel-host.ts"
      - "host/src/vfs/**"
      - "host/test/homebrew-vfs-*.test.ts"
      - "host/test/optional-demo-vfs.test.ts"
      - "host/test/vfs-image.test.ts"
      - "images/rootfs/**"
      - "images/vfs/scripts/build-homebrew-vfs-image.ts"
      - "images/vfs/scripts/vfs-image-helpers.ts"
      - "package-lock.json"
      - "package.json"
      - "packages/registry/rootfs/package.toml"
      - "packages/registry/shell/**"
      - "rust-toolchain.toml"
      - "scripts/build-homebrew-main-shell-closure.sh"
      - "scripts/check-homebrew-main-shell-brewfile.mjs"
      - "scripts/dev-shell.sh"
      - "scripts/fetch-binaries.sh"
      - "scripts/homebrew-brewfile-selection.rb"
      - "scripts/homebrew-checkout-public-tap.sh"
      - "scripts/homebrew-main-shell-node-smoke.ts"
      - "scripts/homebrew-vfs-acceptance-smoke.ts"
      - "scripts/install-local-binary.sh"
      - "scripts/resolve-binary.sh"
      - "scripts/test-homebrew-main-shell-closure.sh"
      - "tools/mkrootfs/**"
      - "web-libs/kandelo-session/src/shell-config.ts"
      - "web-libs/kandelo-session/src/kernel-host.ts"
      - "web-libs/kandelo-session/src/vfs-capacity.ts"
  workflow_dispatch:

concurrency:
  group: homebrew-main-shell-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  exact-public-bottle-closure:
    name: exact public-bottle closure (Node + Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GH_TOKEN: ${{ github.token }}
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/browser-demos/package-lock.json
            host/package-lock.json
            tools/mkrootfs/package-lock.json

      - name: Validate and expose the exact catalog lock
        id: catalog
        run: |
          set -euo pipefail
          node scripts/check-homebrew-main-shell-brewfile.mjs
          tap_commit=$(jq -er '.catalog.tap_commit' homebrew/main-shell-migration-lock.json)
          [[ "$tap_commit" =~ ^[0-9a-f]{40}$ ]]
          echo "tap_commit=$tap_commit" >> "$GITHUB_OUTPUT"

      - name: Check out the exact public tap without credentials
        env:
          TAP_COMMIT: ${{ steps.catalog.outputs.tap_commit }}
        run: |
          set -euo pipefail
          env -u GH_TOKEN -u GITHUB_TOKEN \
            -u HOMEBREW_GITHUB_API_TOKEN \
            -u HOMEBREW_GITHUB_PACKAGES_TOKEN \
            -u HOMEBREW_DOCKER_REGISTRY_TOKEN \
            bash scripts/homebrew-checkout-public-tap.sh \
              kandelo-dev/homebrew-tap-core "$TAP_COMMIT" \
              "$GITHUB_WORKSPACE/dependency-taps/core"

      - uses: ./.github/actions/setup-nix

      - name: Install exact-image and browser dependencies
        run: |
          set -euo pipefail
          npm ci --no-audit --no-fund
          npm --prefix tools/mkrootfs ci --no-audit --no-fund
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 \
            npm --prefix host ci --no-audit --no-fund
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 \
            npm --prefix apps/browser-demos ci --no-audit --no-fund
          (
            cd apps/browser-demos
            npx playwright install chromium --with-deps
          )

      - name: Fetch browser build inputs and build the exact candidate kernel
        run: |
          set -euo pipefail
          abi=$(sed -nE 's/^pub const ABI_VERSION: u32 = ([0-9]+);$/\1/p' \
            crates/shared/src/lib.rs)
          export WASM_POSIX_BINARY_INDEX_URL="https://github.com/Automattic/kandelo/releases/download/binaries-abi-v${abi}/index.toml"
          mapfile -t browser_input_packages < <(
            jq -r '.packages[].registry.name' homebrew/main-shell-migration-lock.json
          )
          browser_input_packages+=(
            dinit
            node
            rootfs
          )
          [ "${#browser_input_packages[@]}" -eq 35 ]
          [ "$(printf '%s\n' "${browser_input_packages[@]}" | sort -u | wc -l)" -eq 35 ]
          fetch_args=(--fetch-only)
          for package in "${browser_input_packages[@]}"; do
            fetch_args+=(--package "$package")
          done
          bash scripts/dev-shell.sh bash scripts/fetch-binaries.sh "${fetch_args[@]}"
          bash scripts/dev-shell.sh bash -c '
            set -euo pipefail
            cargo build --release -p kandelo -Z build-std=core,alloc
            mkdir -p local-binaries
            cp target/wasm32-unknown-unknown/release/kandelo_kernel.wasm \
              local-binaries/kernel.wasm
          '

      - name: Build the current shell artifact only from public bottles
        env:
          TAP_COMMIT: ${{ steps.catalog.outputs.tap_commit }}
        run: |
          set -euo pipefail
          env -u GH_TOKEN -u GITHUB_TOKEN \
            -u HOMEBREW_GITHUB_API_TOKEN \
            -u HOMEBREW_GITHUB_PACKAGES_TOKEN \
            -u HOMEBREW_DOCKER_REGISTRY_TOKEN \
            bash scripts/dev-shell.sh env \
              KANDELO_HOMEBREW_MAIN_SHELL_TAP_ROOT="$GITHUB_WORKSPACE/dependency-taps/core" \
              KANDELO_HOMEBREW_MAIN_SHELL_TAP_SHA="$TAP_COMMIT" \
              bash packages/registry/shell/build-shell.sh

      - name: Verify canonical installation and exact closure evidence
        id: image
        env:
          TAP_COMMIT: ${{ steps.catalog.outputs.tap_commit }}
        run: |
          set -euo pipefail
          built=apps/browser-demos/public/shell.vfs.zst
          installed=local-binaries/programs/wasm32/shell.vfs.zst
          report=target/homebrew-main-shell/main-shell-report.json
          test -f "$built"
          test -f "$installed"
          test -f "$report"
          cmp "$built" "$installed"
          resolved=$(bash scripts/resolve-binary.sh programs/shell.vfs.zst)
          test "$(realpath "$resolved")" = "$(realpath "$installed")"
          image_sha=$(sha256sum "$installed" | awk '{print $1}')
          [[ "$image_sha" =~ ^[0-9a-f]{64}$ ]]
          echo "sha256=$image_sha" >> "$GITHUB_OUTPUT"
          jq -e \
            --slurpfile lock homebrew/main-shell-migration-lock.json \
            --arg catalog "$TAP_COMMIT" '
              .catalog.checkout_commit == $catalog and
              (.selection.requested_packages | length) == 32 and
              ((.selection.requested_packages - [.packages[].name]) | length) == 0 and
              (.packages | length) == 38 and
              (([.packages[].full_name] | sort) == ($lock[0].formula_closure | sort)) and
              ([.packages[].source_status] | all(. == "success")) and
              ([.packages[].metadata_status] | all(. == "success")) and
              .default_shell.path == "/home/linuxbrew/.linuxbrew/bin/bash"
            ' "$report" >/dev/null

      - name: Boot the exact installed bytes in Node
        run: |
          bash scripts/dev-shell.sh npx tsx \
            scripts/homebrew-main-shell-node-smoke.ts \
            --image local-binaries/programs/wasm32/shell.vfs.zst

      - name: Boot the current main-shell path in Chromium
        env:
          KANDELO_HOMEBREW_MAIN_SHELL_STRICT: "1"
          KANDELO_HOMEBREW_MAIN_SHELL_SHA256: ${{ steps.image.outputs.sha256 }}
        run: |
          set -euo pipefail
          report="$RUNNER_TEMP/homebrew-main-shell-playwright.json"
          (
            cd apps/browser-demos
            bash ../../scripts/dev-shell.sh env \
              PLAYWRIGHT_JSON_OUTPUT_FILE="$report" \
              KANDELO_HOMEBREW_MAIN_SHELL_STRICT="$KANDELO_HOMEBREW_MAIN_SHELL_STRICT" \
              KANDELO_HOMEBREW_MAIN_SHELL_SHA256="$KANDELO_HOMEBREW_MAIN_SHELL_SHA256" \
              npx playwright test test/kandelo-homebrew-main-shell.spec.ts \
              --project=chromium --reporter=json
          )
          jq -e '
            .stats.expected == 1 and .stats.unexpected == 0 and
            .stats.flaky == 0 and .stats.skipped == 0
          ' "$report" >/dev/null

      - name: Upload exact closure evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: homebrew-main-shell-closure
          path: |
            apps/browser-demos/public/shell.vfs.zst
            target/homebrew-main-shell/main-shell-report.json
            ${{ runner.temp }}/homebrew-main-shell-playwright.json
          retention-days: 7
          if-no-files-found: warn
