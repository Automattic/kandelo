name: Homebrew main shell

on:
  pull_request:
    paths:
      - ".github/actions/setup-nix/**"
      - ".github/actions/fetch-submodules/**"
      - ".github/workflows/homebrew-main-shell-ci.yml"
      - ".gitmodules"
      - "Cargo.lock"
      - "Cargo.toml"
      - "MANIFEST"
      - "apps/browser-demos/**"
      - "crates/kernel/**"
      - "crates/shared/**"
      - "flake.lock"
      - "flake.nix"
      - "homebrew/main-shell*"
      - "homebrew/test/homebrew_guest_lifecycle*.ts"
      - "host/package-lock.json"
      - "host/package.json"
      - "host/src/**"
      - "host/test/**"
      - "images/rootfs/**"
      - "images/vfs/scripts/build-homebrew-materialized-vfs-image.ts"
      - "images/vfs/scripts/build-homebrew-vfs-image.ts"
      - "images/vfs/scripts/build-shell-vfs-image.ts"
      - "images/vfs/scripts/main-shell-demo-config.ts"
      - "images/vfs/scripts/vfs-image-helpers.ts"
      - "package-lock.json"
      - "package.json"
      - "libc/**"
      - "packages/registry/**"
      - "rust-toolchain.toml"
      - "scripts/build-homebrew-main-shell-closure.sh"
      - "scripts/build-musl.sh"
      - "scripts/browser-binary-package-roots.mjs"
      - "scripts/check-homebrew-main-shell-brewfile.mjs"
      - "scripts/create-homebrew-bottle-mirror-publish-manifest.ts"
      - "scripts/dev-shell.sh"
      - "scripts/fetch-binaries.sh"
      - "scripts/homebrew-brewfile-selection.rb"
      - "scripts/homebrew-language-runtime-contract.ts"
      - "scripts/homebrew-closed-lazy-assets*.ts"
      - "scripts/homebrew-main-shell-node-smoke.ts"
      - "scripts/homebrew-main-shell-image-contract*.ts"
      - "scripts/homebrew-vfs-acceptance-smoke.ts"
      - "scripts/install-local-binary.sh"
      - "scripts/install-overlay-headers.sh"
      - "scripts/resolve-binary.sh"
      - "scripts/resolve-binary.ts"
      - "scripts/resolve-binary.bundle.mjs"
      - "scripts/resolve-binary.bundle.LICENSES.txt"
      - "scripts/build-resolve-binary-bundle.sh"
      - "scripts/test-resolve-binary-bundle.sh"
      - "scripts/recover-homebrew-bottle-mirror.ts"
      - "scripts/test-homebrew-main-shell-closure.sh"
      - "scripts/verify-homebrew-main-shell-artifact-lock.sh"
      - "scripts/run-wasm-fork-instrument.sh"
      - "sdk/**"
      - "tests/package-system/browser-binary-dependencies.test.ts"
      - "tests/package-system/homebrew-bottle-mirror-recovery.test.ts"
      - "tools/mkrootfs/**"
      - "tools/xtask/**"
      - "web-libs/kandelo-session/**"
  push:
    branches: [main]
    paths:
      - ".github/actions/setup-nix/**"
      - ".github/actions/fetch-submodules/**"
      - ".github/workflows/homebrew-main-shell-ci.yml"
      - ".gitmodules"
      - "Cargo.lock"
      - "Cargo.toml"
      - "MANIFEST"
      - "apps/browser-demos/**"
      - "crates/kernel/**"
      - "crates/shared/**"
      - "flake.lock"
      - "flake.nix"
      - "homebrew/main-shell*"
      - "homebrew/test/homebrew_guest_lifecycle*.ts"
      - "host/package-lock.json"
      - "host/package.json"
      - "host/src/**"
      - "host/test/**"
      - "images/rootfs/**"
      - "images/vfs/scripts/build-homebrew-materialized-vfs-image.ts"
      - "images/vfs/scripts/build-homebrew-vfs-image.ts"
      - "images/vfs/scripts/build-shell-vfs-image.ts"
      - "images/vfs/scripts/main-shell-demo-config.ts"
      - "images/vfs/scripts/vfs-image-helpers.ts"
      - "package-lock.json"
      - "package.json"
      - "libc/**"
      - "packages/registry/**"
      - "rust-toolchain.toml"
      - "scripts/build-homebrew-main-shell-closure.sh"
      - "scripts/build-musl.sh"
      - "scripts/browser-binary-package-roots.mjs"
      - "scripts/check-homebrew-main-shell-brewfile.mjs"
      - "scripts/create-homebrew-bottle-mirror-publish-manifest.ts"
      - "scripts/dev-shell.sh"
      - "scripts/fetch-binaries.sh"
      - "scripts/homebrew-brewfile-selection.rb"
      - "scripts/homebrew-language-runtime-contract.ts"
      - "scripts/homebrew-closed-lazy-assets*.ts"
      - "scripts/homebrew-main-shell-node-smoke.ts"
      - "scripts/homebrew-main-shell-image-contract*.ts"
      - "scripts/homebrew-vfs-acceptance-smoke.ts"
      - "scripts/install-local-binary.sh"
      - "scripts/install-overlay-headers.sh"
      - "scripts/resolve-binary.sh"
      - "scripts/resolve-binary.ts"
      - "scripts/resolve-binary.bundle.mjs"
      - "scripts/resolve-binary.bundle.LICENSES.txt"
      - "scripts/build-resolve-binary-bundle.sh"
      - "scripts/test-resolve-binary-bundle.sh"
      - "scripts/recover-homebrew-bottle-mirror.ts"
      - "scripts/test-homebrew-main-shell-closure.sh"
      - "scripts/verify-homebrew-main-shell-artifact-lock.sh"
      - "scripts/run-wasm-fork-instrument.sh"
      - "sdk/**"
      - "tests/package-system/browser-binary-dependencies.test.ts"
      - "tests/package-system/homebrew-bottle-mirror-recovery.test.ts"
      - "tools/mkrootfs/**"
      - "tools/xtask/**"
      - "web-libs/kandelo-session/**"
  workflow_dispatch:
    inputs:
      transport_mode:
        description: Validate exact bottle bytes from closed bindings or the public release
        required: true
        default: closed
        type: choice
        options:
          - closed
          - public

concurrency:
  group: homebrew-main-shell-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  exact-public-bottle-closure:
    name: exact lazy shell (Node + Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      TRANSPORT_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.transport_mode || 'closed' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Fetch musl submodule for source-build fallback
        uses: ./.github/actions/fetch-submodules
        with:
          submodules: libc/musl

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/browser-demos/package-lock.json
            host/package-lock.json
            tools/mkrootfs/package-lock.json

      - name: Validate the exact catalog lock
        run: |
          set -euo pipefail
          node scripts/check-homebrew-main-shell-brewfile.mjs

      - uses: ./.github/actions/setup-nix

      - name: Prepare isolated source tree for the wasm32 sysroot
        id: sysroot-source
        run: |
          set -euo pipefail
          source_root="$RUNNER_TEMP/homebrew-main-shell-sysroot-source"
          test ! -e "$source_root"
          mkdir -p "$source_root"
          # Keep this copy outside Git. GitHub checks out a depth-one synthetic
          # merge, so a linked worktree makes Nix inspect parent commits that
          # are intentionally absent. An archive is the same reviewed tree but
          # Nix correctly treats it as a local path input.
          git archive "$GITHUB_SHA" | tar -x -C "$source_root"
          mkdir -p "$source_root/libc/musl"
          cp -R libc/musl/. "$source_root/libc/musl"
          test ! -e "$source_root/.git"
          echo "path=$source_root" >> "$GITHUB_OUTPUT"

      - name: Build current wasm32 sysroot for source-build fallback
        working-directory: ${{ steps.sysroot-source.outputs.path }}
        run: |
          set -euo pipefail
          bash scripts/dev-shell.sh bash scripts/build-musl.sh
          test -f sysroot/lib/libc.a
          test ! -e "$GITHUB_WORKSPACE/sysroot"
          cp -R sysroot "$GITHUB_WORKSPACE/sysroot"
          test -f "$GITHUB_WORKSPACE/sysroot/lib/libc.a"
          test -z "$(git -C "$GITHUB_WORKSPACE/libc/musl" status --porcelain=v1 --untracked-files=all)"

      - name: Install exact-image and browser dependencies
        run: |
          set -euo pipefail
          npm ci --no-audit --no-fund
          npm --prefix tools/mkrootfs ci --no-audit --no-fund
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 \
            npm --prefix host ci --no-audit --no-fund
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 \
            npm --prefix apps/browser-demos ci --no-audit --no-fund
          (
            cd apps/browser-demos
            npx playwright install chromium --with-deps
          )

      - name: Validate the stock guest lifecycle contracts
        run: |
          set -euo pipefail
          npx tsx --test \
            homebrew/test/homebrew_guest_lifecycle_contract.test.ts \
            homebrew/test/homebrew_guest_lifecycle_runtime_contract.test.ts \
            scripts/homebrew-main-shell-image-contract.test.ts \
            scripts/homebrew-closed-lazy-assets.test.ts
          npx esbuild homebrew/test/homebrew_guest_lifecycle_node.ts \
            --bundle \
            --platform=node \
            --format=esm \
            --packages=external \
            --outfile="$RUNNER_TEMP/homebrew_guest_lifecycle_node.mjs"

      - name: Select one verified package generation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          abi=$(sed -nE 's/^pub const ABI_VERSION: u32 = ([0-9]+);$/\1/p' \
            crates/shared/src/lib.rs)
          [[ "$abi" =~ ^[0-9]+$ ]]
          canonical_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/binaries-abi-v${abi}/index.toml"
          selected_url="$canonical_url"

          if [ "$GITHUB_EVENT_NAME" = pull_request ]; then
            pr_number=$(jq -er '.pull_request.number' "$GITHUB_EVENT_PATH")
            [[ "$pr_number" =~ ^[1-9][0-9]*$ ]]
            target_tag="pr-${pr_number}-staging"
            expected="$RUNNER_TEMP/homebrew-main-shell-staging-expected.json"
            snapshot="$RUNNER_TEMP/homebrew-main-shell-staging-snapshot"

            # WHY: an ABI bump has no canonical package release yet. Reuse the
            # parallel staging build only after proving it is a complete,
            # exact-current generation; accepting a partial mutable index would
            # mix packages from different builds or silently source-build gaps.
            if bash scripts/dev-shell.sh env \
                EXPECTED="$expected" \
                SNAPSHOT="$snapshot" \
                TARGET_TAG="$target_tag" \
                ABI="$abi" \
                bash -c '
                  set -euo pipefail
                  host_target=$(rustc -vV | awk "/^host/ {print \$2}")
                  cargo build --release -p xtask --target "$host_target"
                  xtask="target/$host_target/release/xtask"
                  "$xtask" staging-reuse expected \
                    --registry packages/registry \
                    --expected-abi "$ABI" \
                    --exclude erlang-vfs,perl,perl-vfs,python-vfs,redis,texlive \
                    --output "$EXPECTED"
                  bash .github/scripts/validate-staging-release.sh \
                    --tag "$TARGET_TAG" \
                    --expected-ledger "$EXPECTED" \
                    --mode current \
                    --output-dir "$SNAPSHOT" \
                    --xtask "$xtask"
                '; then
              frozen_index="$snapshot/frozen-index.toml"
              target_index_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${target_tag}/index.toml"
              # WHY: index freezing consumes only the bytes already validated
              # above. Remove network credentials so this pure transformation
              # cannot accidentally grow an authenticated code path.
              env -u GH_TOKEN -u GITHUB_TOKEN \
                -u HOMEBREW_GITHUB_API_TOKEN \
                -u HOMEBREW_GITHUB_PACKAGES_TOKEN \
                bash scripts/dev-shell.sh env \
                SOURCE_INDEX="$snapshot/source-index.toml" \
                FROZEN_INDEX="$frozen_index" \
                TARGET_INDEX_URL="$target_index_url" \
                ABI="$abi" \
                bash -c '
                  set -euo pipefail
                  host_target=$(rustc -vV | awk "/^host/ {print \$2}")
                  xtask="target/$host_target/release/xtask"
                  # WHY: the PR release tag remains mutable. Keep the validated
                  # index bytes local while rewriting relative archive names to
                  # their exact release URLs; archive hashes still fail closed.
                  "$xtask" index-candidate seed \
                    --canonical-index "$SOURCE_INDEX" \
                    --candidate-index "$FROZEN_INDEX" \
                    --canonical-index-url "$TARGET_INDEX_URL" \
                    --expected-abi "$ABI" \
                    --generated-at "1970-01-01T00:00:00Z" \
                    --generator "Homebrew main-shell frozen staging generation"
                '
              selected_url="file://${frozen_index}"
              echo "Using complete verified package generation from $target_tag"
            else
              echo "Complete current $target_tag generation is unavailable; using canonical/source fallback"
            fi
          fi

          echo "WASM_POSIX_BINARY_INDEX_URL=$selected_url" >> "$GITHUB_ENV"

      - name: Resolve current direct browser bundling inputs and build the exact candidate kernel
        run: |
          set -euo pipefail
          test -n "${WASM_POSIX_BINARY_INDEX_URL:-}"
          # Vite resolves static @binaries imports across the wider demo app.
          # Derive those registry roots from the imports and package manifests
          # so adding an import cannot silently leave this browser proof stale.
          # They are browser bundling inputs. The shell VFS consumes the exact
          # standalone homebrew-bootstrap package as a dependency, while the
          # exact candidate image still replaces shell before runtime proof.
          # Use the normal resolver contract for these supporting packages. A
          # matching public archive is reused; a PR that changes one of its
          # declared build inputs source-builds the exact current recipe. Using
          # --fetch-only here would make such a PR impossible to validate until
          # after its new support-package archive was already published.
          browser_package_file="$RUNNER_TEMP/browser-binary-packages.txt"
          node scripts/browser-binary-package-roots.mjs \
            --exclude-package shell \
            --include-package rootfs \
            > "$browser_package_file"
          mapfile -t browser_input_packages < "$browser_package_file"
          [ "${#browser_input_packages[@]}" -gt 0 ]
          [ "$(printf '%s\n' "${browser_input_packages[@]}" | sort -u | wc -l)" \
            -eq "${#browser_input_packages[@]}" ]
          fetch_args=()
          for package in "${browser_input_packages[@]}"; do
            fetch_args+=(--package "$package")
          done
          bash scripts/dev-shell.sh bash scripts/fetch-binaries.sh "${fetch_args[@]}"
          bash scripts/dev-shell.sh bash -c '
            set -euo pipefail
            cargo build --release -p kandelo -Z build-std=core,alloc
            mkdir -p local-binaries
            cp target/wasm32-unknown-unknown/release/kandelo_kernel.wasm \
              local-binaries/kernel.wasm
          '

      - name: Build the exact lazy shell and its source-materialized derivative
        id: candidate
        run: |
          set -euo pipefail
          tap_sha=$(jq -er '.catalog.tap_commit' \
            homebrew/main-shell-migration-lock.json)
          [[ "$tap_sha" =~ ^[0-9a-f]{40}$ ]]
          tap_root="$RUNNER_TEMP/homebrew-tap-core"
          candidate_root="$RUNNER_TEMP/homebrew-main-shell-candidate"
          eager_root="$RUNNER_TEMP/homebrew-main-shell-eager-candidate"
          test ! -e "$tap_root"
          test ! -e "$candidate_root"
          test ! -e "$eager_root"
          git init "$tap_root"
          git -C "$tap_root" remote add origin \
            https://github.com/Kandelo-dev/homebrew-tap-core.git
          git -C "$tap_root" fetch --depth=1 origin "$tap_sha"
          git -C "$tap_root" checkout --detach FETCH_HEAD
          test "$(git -C "$tap_root" rev-parse HEAD)" = "$tap_sha"
          test -z "$(git -C "$tap_root" status --porcelain=v1 --untracked-files=all)"
          bootstrap=$(bash scripts/resolve-binary.sh \
            programs/homebrew-bootstrap/homebrew-bootstrap.zip)
          bootstrap_env=$(bash scripts/resolve-binary.sh \
            programs/homebrew-bootstrap/homebrew-brew.env)
          test -f "$bootstrap"
          test -f "$bootstrap_env"
          env -u GH_TOKEN -u GITHUB_TOKEN \
            -u HOMEBREW_GITHUB_API_TOKEN \
            -u HOMEBREW_GITHUB_PACKAGES_TOKEN \
            -u HOMEBREW_DOCKER_REGISTRY_TOKEN \
            bash scripts/dev-shell.sh bash \
              scripts/build-homebrew-main-shell-closure.sh \
                --lazy-shell \
                --tap-root "$tap_root" \
                --expected-tap-sha "$tap_sha" \
                --package-tree-spec homebrew/main-shell-brew-package-tree.json \
                --package-tree-archive "$bootstrap" \
                --homebrew-bootstrap-env "$bootstrap_env" \
                --work-dir "$candidate_root"
          test -f "$candidate_root/main-shell.vfs.zst"
          test -f "$candidate_root/main-shell-report.json"
          expected_mirror_files=$(jq -er '.bottle_mirror.assets | length + 1' \
            "$candidate_root/main-shell-report.json")
          test "$(find "$candidate_root/bottle-mirror" -maxdepth 1 -type f | wc -l)" \
            -eq "$expected_mirror_files"
          env -u GH_TOKEN -u GITHUB_TOKEN \
            -u HOMEBREW_GITHUB_API_TOKEN \
            -u HOMEBREW_GITHUB_PACKAGES_TOKEN \
            -u HOMEBREW_DOCKER_REGISTRY_TOKEN \
            bash scripts/dev-shell.sh bash \
              scripts/build-homebrew-main-shell-closure.sh \
                --lazy-shell \
                --materialize-package-tree \
                --tap-root "$tap_root" \
                --expected-tap-sha "$tap_sha" \
                --package-tree-spec homebrew/main-shell-brew-package-tree.json \
                --package-tree-archive "$bootstrap" \
                --homebrew-bootstrap-env "$bootstrap_env" \
                --bottle-cache "$candidate_root/bottle-cache" \
                --work-dir "$eager_root"
          test -f "$eager_root/main-shell.vfs.zst"
          test -f "$eager_root/main-shell-report.json"
          test "$(jq -er '.package_deferred_trees[0].state' \
            "$candidate_root/main-shell-report.json")" = deferred
          test "$(jq -er '.package_deferred_trees[0].state' \
            "$eager_root/main-shell-report.json")" = materialized
          jq -S '.package_deferred_trees[0] | del(.state)' \
            "$candidate_root/main-shell-report.json" \
            > "$RUNNER_TEMP/homebrew-main-shell-lazy-package-tree.json"
          jq -S '.package_deferred_trees[0] | del(.state)' \
            "$eager_root/main-shell-report.json" \
            > "$RUNNER_TEMP/homebrew-main-shell-eager-package-tree.json"
          cmp "$RUNNER_TEMP/homebrew-main-shell-lazy-package-tree.json" \
            "$RUNNER_TEMP/homebrew-main-shell-eager-package-tree.json"
          jq -S '.homebrew_bootstrap' \
            "$candidate_root/main-shell-report.json" \
            > "$RUNNER_TEMP/homebrew-main-shell-lazy-bootstrap.json"
          jq -S '.homebrew_bootstrap' \
            "$eager_root/main-shell-report.json" \
            > "$RUNNER_TEMP/homebrew-main-shell-eager-bootstrap.json"
          cmp "$RUNNER_TEMP/homebrew-main-shell-lazy-bootstrap.json" \
            "$RUNNER_TEMP/homebrew-main-shell-eager-bootstrap.json"
          {
            echo "image=$candidate_root/main-shell.vfs.zst"
            echo "report=$candidate_root/main-shell-report.json"
            echo "bootstrap=$bootstrap"
            echo "bootstrap_env=$bootstrap_env"
            echo "eager_image=$eager_root/main-shell.vfs.zst"
            echo "eager_report=$eager_root/main-shell-report.json"
            echo "tap_sha=$tap_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Install the candidate's exact shell bytes
        id: image
        env:
          CANDIDATE_PATH: ${{ steps.candidate.outputs.image }}
          CANDIDATE_BOOTSTRAP_PATH: ${{ steps.candidate.outputs.bootstrap }}
          CANDIDATE_BOOTSTRAP_ENV_PATH: ${{ steps.candidate.outputs.bootstrap_env }}
        run: |
          set -euo pipefail
          browser_copy=apps/browser-demos/public/shell.vfs.zst
          install_session="homebrew-main-shell-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_JOB}"
          test -f "$CANDIDATE_PATH"
          test -f "$CANDIDATE_BOOTSTRAP_PATH"
          test -f "$CANDIDATE_BOOTSTRAP_ENV_PATH"
          mkdir -p "$(dirname "$browser_copy")"
          bash scripts/dev-shell.sh bash -c '
            set -euo pipefail
            host_target="$(rustc -vV | sed -n "s/^host: //p")"
            WASM_POSIX_LOCAL_INSTALL_SOURCE="$1" \
            WASM_POSIX_LOCAL_INSTALL_SESSION="$2" \
              cargo run -p xtask --target "$host_target" --quiet -- \
                build-deps --arch wasm32 --binaries-dir local-binaries \
                install-local-artifact shell shell.vfs.zst
          ' bash "$CANDIDATE_PATH" "$install_session"
          resolved=$(bash scripts/resolve-binary.sh programs/shell.vfs.zst)
          test -f "$resolved"
          cmp "$CANDIDATE_PATH" "$resolved"
          cp "$CANDIDATE_PATH" "$browser_copy"
          cmp "$CANDIDATE_PATH" "$browser_copy"
          resolved_bootstrap=$(bash scripts/resolve-binary.sh \
            programs/homebrew-bootstrap/homebrew-bootstrap.zip)
          resolved_bootstrap_env=$(bash scripts/resolve-binary.sh \
            programs/homebrew-bootstrap/homebrew-brew.env)
          cmp "$CANDIDATE_BOOTSTRAP_PATH" "$resolved_bootstrap"
          cmp "$CANDIDATE_BOOTSTRAP_ENV_PATH" "$resolved_bootstrap_env"
          image_sha=$(sha256sum "$CANDIDATE_PATH" | awk '{print $1}')
          bootstrap_sha=$(sha256sum "$CANDIDATE_BOOTSTRAP_PATH" | awk '{print $1}')
          bootstrap_bytes=$(wc -c <"$CANDIDATE_BOOTSTRAP_PATH" | tr -d '[:space:]')
          [[ "$image_sha" =~ ^[0-9a-f]{64}$ ]]
          [[ "$bootstrap_sha" =~ ^[0-9a-f]{64}$ ]]
          [[ "$bootstrap_bytes" =~ ^[1-9][0-9]*$ ]]
          echo "sha256=$image_sha" >> "$GITHUB_OUTPUT"
          echo "bootstrap_sha256=$bootstrap_sha" >> "$GITHUB_OUTPUT"
          echo "bootstrap_bytes=$bootstrap_bytes" >> "$GITHUB_OUTPUT"

      - name: Recover the exact bottle mirror from anonymous source packages
        id: mirror
        run: |
          set -euo pipefail
          mirror_dir="$RUNNER_TEMP/homebrew-main-shell-bottles"
          mirror_report="$RUNNER_TEMP/homebrew-main-shell-bottle-recovery.json"
          expected_assets=$(jq -er '.bottle_mirror.assets | length' \
            "${{ steps.candidate.outputs.report }}")
          expected_files=$((expected_assets + 1))
          env -u GH_TOKEN -u GITHUB_TOKEN \
            -u HOMEBREW_GITHUB_API_TOKEN \
            -u HOMEBREW_GITHUB_PACKAGES_TOKEN \
            -u HOMEBREW_DOCKER_REGISTRY_TOKEN \
            bash scripts/dev-shell.sh npx tsx \
              scripts/recover-homebrew-bottle-mirror.ts \
              --image "${{ steps.candidate.outputs.image }}" \
              --out "$mirror_dir" \
              --report "$mirror_report"
          test "$(find "$mirror_dir" -maxdepth 1 -type f | wc -l)" \
            -eq "$expected_files"
          test -f "$mirror_dir/kandelo-homebrew-bottle-mirror-plan.json"
          jq -e --argjson expected_assets "$expected_assets" '
            .schema == 1 and
            .kind == "kandelo-homebrew-bottle-mirror-recovery" and
            (.assets | length) == $expected_assets
          ' "$mirror_report" >/dev/null
          publish_manifest="$RUNNER_TEMP/homebrew-main-shell-bottle-publish.json"
          bash scripts/dev-shell.sh npx tsx \
            scripts/create-homebrew-bottle-mirror-publish-manifest.ts \
              --bundle "$mirror_dir" \
              --recovery-report "$mirror_report" \
              --out "$publish_manifest"
          jq -e \
            --arg target "${{ steps.candidate.outputs.tap_sha }}" \
            --argjson expected_files "$expected_files" '
            .schema == 1 and .target_commitish == $target and
            (.assets | length) == $expected_files and
            (.preferred_asset_names | length) == $expected_files and
            .accepted_existing_asset_sets == []
          ' "$publish_manifest" >/dev/null
          browser_mirror=apps/browser-demos/public/homebrew-main-shell-bottles
          test ! -e "$browser_mirror"
          if [ "$TRANSPORT_MODE" = closed ]; then
            cp -R "$mirror_dir" "$browser_mirror"
            test "$(find "$browser_mirror" -maxdepth 1 -type f | wc -l)" \
              -eq "$expected_files"
          elif [ "$TRANSPORT_MODE" = public ]; then
            mkdir -p "$browser_mirror"
            cp "$mirror_dir/kandelo-homebrew-bottle-mirror-plan.json" \
              "$browser_mirror/"
            test "$(find "$browser_mirror" -maxdepth 1 -type f | wc -l)" -eq 1
          else
            echo "unsupported transport mode: $TRANSPORT_MODE" >&2
            exit 1
          fi
          echo "plan=$mirror_dir/kandelo-homebrew-bottle-mirror-plan.json" >> "$GITHUB_OUTPUT"

      - name: Boot the exact installed bytes in Node
        run: |
          set -euo pipefail
          run_node_smoke() {
            local image="$1"
            local state="$2"
            local node_smoke_args=(
              --image "$image"
              --migration-lock homebrew/main-shell-migration-lock.json
              --homebrew-bootstrap-spec homebrew/main-shell-brew-package-tree.json
              --homebrew-bootstrap-archive "${{ steps.candidate.outputs.bootstrap }}"
              --homebrew-bootstrap-env "${{ steps.candidate.outputs.bootstrap_env }}"
              --homebrew-bootstrap-state "$state"
              --demo-config homebrew/main-shell-demo.json
              --transport-mode "$TRANSPORT_MODE"
            )
            case "$TRANSPORT_MODE" in
              closed)
                node_smoke_args+=(
                  --bottle-mirror-plan "${{ steps.mirror.outputs.plan }}"
                )
                ;;
              public)
                ;;
              *)
                echo "unsupported transport mode: $TRANSPORT_MODE" >&2
                exit 1
                ;;
            esac
            bash scripts/dev-shell.sh npx tsx \
              scripts/homebrew-main-shell-node-smoke.ts \
              "${node_smoke_args[@]}"
          }
          run_node_smoke "${{ steps.candidate.outputs.image }}" deferred
          run_node_smoke "${{ steps.candidate.outputs.eager_image }}" materialized

      - name: Boot the current main-shell path in Chromium
        env:
          KANDELO_HOMEBREW_MAIN_SHELL_STRICT: "1"
          KANDELO_HOMEBREW_MAIN_SHELL_SHA256: ${{ steps.image.outputs.sha256 }}
          KANDELO_HOMEBREW_MAIN_SHELL_BOOTSTRAP_SHA256: ${{ steps.image.outputs.bootstrap_sha256 }}
          KANDELO_HOMEBREW_MAIN_SHELL_BOOTSTRAP_BYTES: ${{ steps.image.outputs.bootstrap_bytes }}
          KANDELO_HOMEBREW_MAIN_SHELL_TRANSPORT_MODE: ${{ env.TRANSPORT_MODE }}
          KANDELO_HOMEBREW_MAIN_SHELL_MIRROR_PLAN_URL: /homebrew-main-shell-bottles/kandelo-homebrew-bottle-mirror-plan.json
        run: |
          set -euo pipefail
          shell_report="$RUNNER_TEMP/homebrew-main-shell-playwright.json"
          modeset_report="$RUNNER_TEMP/homebrew-main-shell-modeset-playwright.json"
          playwright_env=(
            "KANDELO_HOMEBREW_MAIN_SHELL_STRICT=$KANDELO_HOMEBREW_MAIN_SHELL_STRICT"
            "KANDELO_HOMEBREW_MAIN_SHELL_SHA256=$KANDELO_HOMEBREW_MAIN_SHELL_SHA256"
            "KANDELO_HOMEBREW_MAIN_SHELL_BOOTSTRAP_SHA256=$KANDELO_HOMEBREW_MAIN_SHELL_BOOTSTRAP_SHA256"
            "KANDELO_HOMEBREW_MAIN_SHELL_BOOTSTRAP_BYTES=$KANDELO_HOMEBREW_MAIN_SHELL_BOOTSTRAP_BYTES"
            "KANDELO_HOMEBREW_MAIN_SHELL_TRANSPORT_MODE=$KANDELO_HOMEBREW_MAIN_SHELL_TRANSPORT_MODE"
            "KANDELO_HOMEBREW_MAIN_SHELL_MIRROR_PLAN_URL=$KANDELO_HOMEBREW_MAIN_SHELL_MIRROR_PLAN_URL"
          )
          if [ "$KANDELO_HOMEBREW_MAIN_SHELL_TRANSPORT_MODE" = closed ]; then
            playwright_env+=(
              "VITE_KANDELO_HOMEBREW_CLOSED_ACCEPTANCE_ROOT=/homebrew-main-shell-bottles"
            )
          elif [ "$KANDELO_HOMEBREW_MAIN_SHELL_TRANSPORT_MODE" = public ]; then
            unset VITE_KANDELO_HOMEBREW_CLOSED_ACCEPTANCE_ROOT
          else
            echo "unsupported transport mode: $KANDELO_HOMEBREW_MAIN_SHELL_TRANSPORT_MODE" >&2
            exit 1
          fi
          (
            cd apps/browser-demos
            bash ../../scripts/dev-shell.sh env \
              "PLAYWRIGHT_JSON_OUTPUT_FILE=$shell_report" \
              "${playwright_env[@]}" \
              npx playwright test test/kandelo-homebrew-main-shell.spec.ts \
              --project=chromium --reporter=json
            # The shell VFS and worker occupy roughly 512 MiB, making browser-
            # process lifetime part of this proof. Start MODESET in a fresh
            # Playwright process so the test measures the candidate image, not
            # whether a previous heavyweight worker has been collected yet.
            bash ../../scripts/dev-shell.sh env \
              "PLAYWRIGHT_JSON_OUTPUT_FILE=$modeset_report" \
              "${playwright_env[@]}" \
              npx playwright test test/kandelo-modeset.spec.ts \
              --project=chromium --reporter=json
          )
          # WHY: the shell proof uses two independent browser machines so
          # brew's Ruby first use cannot pre-materialize the language-isolation
          # fixture. MODESET remains one separate heavyweight browser proof.
          jq -e '
            .stats.expected == 2 and .stats.unexpected == 0 and
            .stats.flaky == 0 and .stats.skipped == 0
          ' "$shell_report" >/dev/null
          jq -e '
            .stats.expected == 1 and .stats.unexpected == 0 and
            .stats.flaky == 0 and .stats.skipped == 0
          ' "$modeset_report" >/dev/null

      - name: Upload exact closure evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: homebrew-main-shell-closure
          path: |
            ${{ steps.candidate.outputs.image }}
            ${{ steps.candidate.outputs.report }}
            ${{ steps.candidate.outputs.bootstrap }}
            ${{ steps.candidate.outputs.bootstrap_env }}
            ${{ steps.candidate.outputs.eager_image }}
            ${{ steps.candidate.outputs.eager_report }}
            ${{ runner.temp }}/homebrew-main-shell-bottles
            ${{ runner.temp }}/homebrew-main-shell-bottle-recovery.json
            ${{ runner.temp }}/homebrew-main-shell-bottle-publish.json
            ${{ runner.temp }}/homebrew-main-shell-playwright.json
            ${{ runner.temp }}/homebrew-main-shell-modeset-playwright.json
            apps/browser-demos/test-results
          retention-days: 7
          if-no-files-found: warn
