name: Staging build

# Builds per-PR archives whose cache_key_sha differs from each
# package's durable [binary.<arch>] pin. Uploads them to a
# pr-<NNN>-staging pre-release for reviewers + CI to consume via the
# resolver (per-package package.toml + optional package.pr.toml
# overlay).
#
# All build steps run inside `scripts/dev-shell.sh` for a reproducible
# Rust/LLVM/Node toolchain (see flake.nix). The wrapper enters
# `nix develop --ignore-environment` so only flake-declared deps are
# visible — host /usr/bin tools that aren't in the flake won't leak in.
#
# See docs/plans/2026-04-29-pr-package-builds-design.md §4.1.
#
# Same-repo PRs only. Fork-PR support is documented as future work in
# §9.1 of the design doc.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

# Serialize concurrent runs on the same PR so a slow build doesn't
# step on a fresher push or label state. cancel-in-progress: true means
# a new push/label event aborts an in-flight run — fine, the overlay is
# content-keyed.
#
# `labeled`/`unlabeled` is only active for the skip-staging-tests label.
# Other PR labels, including ready-to-ship, get an isolated concurrency
# group so they cannot cancel a real staging run before the jobs skip.
concurrency:
  group: staging-build-pr-${{ github.event.pull_request.number }}-${{ (github.event.action == 'labeled' || github.event.action == 'unlabeled') && github.event.label.name != 'skip-staging-tests' && github.run_id || 'active' }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------
  # Decoupled package builds — staging-build's sole flow.
  #
  # Phase C Task 6 retired the monolithic legacy `build:` job that
  # previously ran the full registry walk + bulk publish + tests in
  # one runner. Today every staging build flows through the per-
  # package matrix below: preflight → toolchain-cache → matrix-build,
  # with source validation and Cargo tests running in parallel before the
  # prepared-workspace suites converge at test-gate → f2-status. Each
  # matrix-build job uploads an immutable workflow artifact. One
  # credentialed finalizer validates the complete matrix, takes the
  # per-tag state lock once, publishes every referenced archive, and
  # replaces index.toml exactly once. See
  # docs/plans/2026-05-05-decoupled-package-builds-design.md for the
  # design and docs/binary-releases.md for the consumer-side flow.
  # ---------------------------------------------------------------------


  change-scope:
    # Fork-PR support is deferred (design doc §9.1). Keep the same
    # same-repo security boundary as the package build jobs.
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      (
        github.event.action != 'labeled' &&
        github.event.action != 'unlabeled' ||
        github.event.label.name == 'skip-staging-tests'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      kernel: ${{ steps.scope.outputs.kernel }}
      package_archive_changed: ${{ steps.scope.outputs.package_archive_changed }}
      package_publish_flow_changed: ${{ steps.scope.outputs.package_publish_flow_changed }}
      binary_materialization_changed: ${{ steps.scope.outputs.binary_materialization_changed }}
      kernel_runtime_changed: ${{ steps.scope.outputs.kernel_runtime_changed }}
      test_gate_required: ${{ steps.scope.outputs.test_gate_required }}
      docs_only: ${{ steps.scope.outputs.docs_only }}
      package_staging_required: ${{ steps.scope.outputs.package_staging_required }}
      package_staging_reason: ${{ steps.scope.outputs.package_staging_reason }}
      skip_staging_tests: ${{ steps.skip.outputs.skip_staging_tests }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Detect staging test skip label
        id: skip
        run: |
          if [ "${{ contains(github.event.pull_request.labels.*.name, 'skip-staging-tests') }}" = "true" ]; then
            echo "skip_staging_tests=true" >> "$GITHUB_OUTPUT"
            echo "::notice::skip-staging-tests label present; staging-build will materialize artifacts and defer expensive tests to prepare-merge."
          else
            echo "skip_staging_tests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect package staging scope
        id: scope
        uses: ./.github/actions/detect-change-scope
        with:
          base-ref: origin/${{ github.event.pull_request.base.ref }}

  preflight:
    # Fork-PR support is deferred (design doc §9.1). The gate below
    # keeps fork PRs from hitting a no-token `gh release view` failure
    # inside the matrix-compute step.
    needs: [change-scope]
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      (
        needs.change-scope.outputs.package_staging_required == 'true' ||
        needs.change-scope.outputs.test_gate_required == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read           # gh release view (target tag probe)
      statuses: write          # post pending merge-gate status with helpful description
    outputs:
      library_matrix: ${{ steps.compute.outputs.library_matrix }}
      program_matrix: ${{ steps.compute.outputs.program_matrix }}
      abi: ${{ steps.compute.outputs.abi }}
      target_tag: ${{ steps.compute.outputs.target_tag }}
      baseline_tag: ${{ steps.compute.outputs.baseline_tag }}
      reuse_staging: ${{ steps.compute.outputs.reuse_staging }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch musl submodule
        # compute-cache-key-sha walks the package's source/build inputs
        # to derive a deterministic hash. It does NOT need libc-test or
        # os-test (those are test inputs, not build inputs). musl is
        # pulled in case any package's [build] dependency chain reaches
        # into the sysroot recipe.
        uses: ./.github/actions/fetch-submodules
        with:
          submodules: libc/musl

      - name: Set up Nix
        uses: ./.github/actions/setup-nix

      - name: Warm Nix dev shell
        run: bash scripts/dev-shell.sh true

      - name: Install JavaScript dependencies for Homebrew preflight
        run: |
          bash scripts/dev-shell.sh bash -c '
            PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund
          '

      - name: Validate Homebrew publisher trust contract
        run: bash scripts/dev-shell.sh bash scripts/test-homebrew-publish-workflow.sh

      - name: Cache xtask build
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: |
            ~/.cargo/registry
            target
          key: preflight-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'tools/xtask/**') }}
          restore-keys: |
            preflight-${{ runner.os }}-

      - name: Build xtask
        run: |
          bash scripts/dev-shell.sh bash -c '
            HOST_TARGET=$(rustc -vV | awk "/^host/ {print \$2}")
            cargo build --release -p xtask --target "$HOST_TARGET"
          '

      - name: Compute matrix
        id: compute
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash scripts/dev-shell.sh bash -c '
            set -euo pipefail
            PACKAGE_STAGING_REQUIRED="${{ needs.change-scope.outputs.package_staging_required }}"

            ABI=$(grep -oE "ABI_VERSION: u32 = [0-9]+" crates/shared/src/lib.rs | awk "{print \$4}")
            echo "abi=$ABI" >> "$GITHUB_OUTPUT"

            TARGET_TAG="pr-${{ github.event.pull_request.number }}-staging"
            BASELINE_TAG="binaries-abi-v${ABI}"
            echo "target_tag=$TARGET_TAG" >> "$GITHUB_OUTPUT"

            if [ "$PACKAGE_STAGING_REQUIRED" != "true" ]; then
              echo "baseline_tag=$BASELINE_TAG" >> "$GITHUB_OUTPUT"
              echo "reuse_staging=false" >> "$GITHUB_OUTPUT"
              echo "library_matrix=[]" >> "$GITHUB_OUTPUT"
              echo "program_matrix=[]" >> "$GITHUB_OUTPUT"
              echo "preflight: package staging not required; skipping package drift matrix"
              exit 0
            fi

            # One-shot fetch of existing release assets for fast lookup.
            # Falls back to empty list if the release doesn'"'"'t exist
            # yet (new ABI, new PR) — that just means everything in the
            # matrix needs to build.
            existing_assets=$(gh release view "$BASELINE_TAG" --repo "${{ github.repository }}" --json assets --jq "[.assets[].name]" 2>/dev/null || echo "[]")
            echo "existing-assets:"
            echo "$existing_assets" | jq -r ".[0:20][]"
            echo "..."
            existing_index_dir=$(mktemp -d)
            existing_index="$existing_index_dir/index.toml"
            if gh release download "$BASELINE_TAG" --repo "${{ github.repository }}" --pattern index.toml --dir "$existing_index_dir" --clobber >/dev/null 2>&1; then
              echo "existing-index: downloaded $BASELINE_TAG/index.toml"
            else
              echo "existing-index: none"
              : > "$existing_index"
            fi
            if [ -s "$existing_index" ]; then
              existing_index_abi=$(sed -nE "s/^abi_version *= *([0-9]+).*$/\\1/p" "$existing_index" | head -n1)
              if [ "$existing_index_abi" != "$ABI" ]; then
                echo "preflight: $BASELINE_TAG/index.toml declares ABI ${existing_index_abi:-unknown}; expected $ABI; ignoring baseline index"
                : > "$existing_index"
                existing_assets="[]"
              fi
            fi

            HOST_TARGET=$(rustc -vV | awk "/^host/ {print \$2}")
            library_matrix="[]"
            program_matrix="[]"

            # Temporarily disabled packages — too slow to rebuild in
            # CI while we have no separate prebuilt-package repo to
            # offload them to. Each is still consumable via its
            # existing `[binary]` pin in package.toml; staging-build
            # just refuses to redo the work. Remove an entry here (and
            # mirror in prepare-merge.yml) to re-enable rebuilds.
            disabled_pkgs=" erlang-vfs perl perl-vfs python-vfs redis texlive "

            expected_ledger=$(mktemp)
            XTASK="target/$HOST_TARGET/release/xtask"
            "$XTASK" staging-reuse expected \
              --registry packages/registry \
              --expected-abi "$ABI" \
              --exclude "${disabled_pkgs// /,}" \
              --output "$expected_ledger"

            # Reusing individual assets from a partial mutable release is not
            # safe: an empty matrix would then make test-gate resolve entries
            # that were never proven present. Promote the PR release to the
            # zero-build candidate only after its complete ledger and every
            # referenced asset have been validated as one snapshot.
            reuse_staging=false
            reuse_dir=$(mktemp -d)
            rm -rf "$reuse_dir"
            if bash .github/scripts/validate-staging-release.sh \
                --tag "$TARGET_TAG" \
                --expected-ledger "$expected_ledger" \
                --mode structural \
                --output-dir "$reuse_dir" \
                --xtask "$XTASK"; then
              stale_expected=$(mktemp)
              jq --slurpfile snapshot "$reuse_dir/snapshot.json" "
                .entries |= map(. as \$expected |
                  select(any(\$snapshot[0].entries[];
                    .package == \$expected.package and
                    .arch == \$expected.arch and
                    .current == false)))
              " "$expected_ledger" > "$stale_expected"
              stale_count=$(jq ".entries | length" "$stale_expected")
              if [ "$stale_count" -eq 0 ]; then
                reuse_staging=target
                echo "preflight: reusing fully current, asset-verified $TARGET_TAG"
              else
                canonical_reuse_dir=$(mktemp -d)
                rm -rf "$canonical_reuse_dir"
                if bash .github/scripts/validate-staging-release.sh \
                    --tag "$BASELINE_TAG" \
                    --expected-ledger "$stale_expected" \
                    --mode current \
                    --output-dir "$canonical_reuse_dir" \
                    --xtask "$XTASK"; then
                  reuse_staging=union
                  echo "preflight: target supplies current entries and $BASELINE_TAG supplies all $stale_count stale target entries"
                else
                  echo "preflight: canonical release cannot complete the current target ledger"
                fi
              fi
            else
              echo "preflight: $TARGET_TAG is absent, partial, ambiguous, or invalid; retaining canonical baseline"
            fi
            echo "baseline_tag=$BASELINE_TAG" >> "$GITHUB_OUTPUT"
            echo "reuse_staging=$reuse_staging" >> "$GITHUB_OUTPUT"

            for pkg_dir in packages/registry/*/; do
              pkg=$(basename "$pkg_dir")
              # Filter: package must have a [build] block. Today this
              # selects the recipes that own a build script and
              # naturally excludes kernel/userspace/examples/node and
              # *-source packages.
              if ! grep -q "^\[build\]" "$pkg_dir/package.toml"; then
                continue
              fi

              # Disabled-package skip (see `disabled_pkgs` above).
              if [[ "$disabled_pkgs" == *" $pkg "* ]]; then
                echo "preflight: skipping $pkg (temporarily disabled)" >&2
                continue
              fi

              # Read kind so we can split into library_matrix /
              # program_matrix. Library wave runs first, programs
              # second; programs reuse the library archives via
              # package.pr.toml overlays so each library builds at
              # most once across the matrix.
              kind=$(sed -nE "s/^kind *= *\"([^\"]+)\".*/\\1/p" "$pkg_dir/package.toml" | head -1)
              case "$kind" in
                library|program) ;;
                *)
                  echo "preflight: skipping $pkg (kind=$kind, not library/program)" >&2
                  continue
                  ;;
              esac

              # Per-package arches from package.toml'"'"'s top-level
              # `arches = [...]` field (default `["wasm32"]` when
              # absent). Mirrors the filter inside
              # `xtask archive-stage`, which rejects a `(package, arch)`
              # pair whose arch isn'"'"'t in the manifest'"'"'s
              # target_arches. Assumes the single-line form
              # `arches = ["a", "b"]`; all current package.toml files
              # use that shape.
              # Version + revision bind the matrix artifact to the one
              # finalizer-owned complete index replacement downstream.
              version=$(sed -nE "s/^version *= *\"([^\"]+)\".*/\\1/p" "$pkg_dir/package.toml" | head -1)
              revision=1
              if [ -f "$pkg_dir/build.toml" ]; then
                revision=$(sed -nE "s/^revision *= *([0-9]+).*/\\1/p" "$pkg_dir/build.toml" | head -1)
                revision=${revision:-1}
              fi
              arches=$(awk -F'"'"'[][]'"'"' '"'"'/^arches *=/ {print $2}'"'"' "$pkg_dir/package.toml" | tr -d '"'"' "'"'"' | tr '"'"','"'"' '"'"' '"'"')
              arches=${arches:-wasm32}
              for arch in $arches; do
                sha=$(cargo run --release -p xtask --target "$HOST_TARGET" --quiet -- \
                  compute-cache-key-sha --package "$pkg_dir" --arch "$arch" 2>/dev/null) || {
                  echo "preflight: skipping $pkg/$arch (compute-cache-key-sha failed)" >&2
                  continue
                }
                short=${sha:0:8}
                if [ "$reuse_staging" != false ] &&
                   jq -e --arg pkg "$pkg" --arg arch "$arch" "
                     .entries[] |
                     select(.package == \$pkg and .arch == \$arch and .current == true)
                   " "$reuse_dir/snapshot.json" >/dev/null; then
                  echo "preflight: skip $pkg/$arch (sha $short verified in $TARGET_TAG)"
                  continue
                fi
                if [ "$reuse_staging" = union ] &&
                   jq -e --arg pkg "$pkg" --arg arch "$arch" "
                     .entries[] |
                     select(.package == \$pkg and .arch == \$arch and .current == true)
                   " "$canonical_reuse_dir/snapshot.json" >/dev/null; then
                  echo "preflight: skip $pkg/$arch (sha $short verified in $BASELINE_TAG supplement)"
                  continue
                fi
                prefix="${pkg}-"
                suffix="-abi${ABI}-${arch}-${short}.tar.zst"
                existing_archive=$(echo "$existing_assets" | jq -r --arg pre "$prefix" --arg suf "$suffix" \
                    "first(.[] | select(startswith(\$pre) and endswith(\$suf))) // \"\"")
                if [ -n "$existing_archive" ] && scripts/index-has-current-entry.sh "$existing_index" "$pkg" "$arch" "$sha" "$revision"; then
                  echo "preflight: skip $pkg/$arch (sha $short already indexed)"
                  continue
                fi
                entry=$(jq -nc --arg pkg "$pkg" --arg arch "$arch" --arg sha "$sha" \
                                --arg ver "$version" --argjson rev "$revision" \
                  "{package: \$pkg, arch: \$arch, sha: \$sha, version: \$ver, revision: \$rev}")
                if [ "$kind" = "library" ]; then
                  library_matrix=$(echo "$library_matrix" | jq -c --argjson e "$entry" ". + [\$e]")
                else
                  program_matrix=$(echo "$program_matrix" | jq -c --argjson e "$entry" ". + [\$e]")
                fi
              done
            done

            program_matrix_file=$(mktemp)
            printf "%s" "$program_matrix" > "$program_matrix_file"
            program_matrix=$(cargo run --release -p xtask --target "$HOST_TARGET" --quiet -- \
              sort-package-matrix \
                --registry packages/registry \
                --matrix "$program_matrix_file")
            rm -f "$program_matrix_file"

            library_count=$(echo "$library_matrix" | jq length)
            program_count=$(echo "$program_matrix" | jq length)
            if [ "$reuse_staging" != false ] &&
               { [ "$library_count" -ne 0 ] || [ "$program_count" -ne 0 ]; }; then
              echo "preflight: validated target/canonical union did not cover the computed matrix" >&2
              exit 1
            fi
            echo "library_matrix=$library_matrix" >> "$GITHUB_OUTPUT"
            echo "program_matrix=$program_matrix" >> "$GITHUB_OUTPUT"
            echo "preflight: library=$library_count program=$program_count"
            echo "library_matrix:"; echo "$library_matrix" | jq .
            echo "program_matrix:"; echo "$program_matrix" | jq .
          '

      - name: Post pending merge-gate status (instructs reviewer)
        # Branch protection on `main` requires a `merge-gate` status
        # context (posted as success by prepare-merge.yml after the
        # ready-to-ship label triggers a durable release). Without
        # this step, GitHub's merge UI shows the generic "Waiting
        # for status to be reported" — unhelpful. Posting `pending`
        # with our own description replaces that text with actionable
        # guidance. prepare-merge.yml later overwrites the same
        # context with state=success on the lockfile-bump commit.
        #
        # Skip the post if `merge-gate` is already `success` on this
        # SHA. A staging-build rerun may overlap or follow a completed
        # Prepare merge run. Without this guard, it would overwrite the
        # tested success with pending and block the reviewer's merge.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing=$(gh api \
            "/repos/${{ github.repository }}/commits/${{ github.event.pull_request.head.sha }}/status" \
            --jq '[.statuses[] | select(.context == "merge-gate")] | .[0].state // ""')
          if [ "$existing" = "success" ]; then
            echo "merge-gate already success on ${{ github.event.pull_request.head.sha }}; skipping pending post."
            exit 0
          fi
          gh api -X POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }}" \
            -f state=pending \
            -f context=merge-gate \
            -f description="Tests green. Apply the ready-to-ship label to build the durable release and merge." \
            -f target_url="https://github.com/${{ github.repository }}/blob/main/docs/plans/2026-04-29-pr-package-builds-design.md"

  package-staging-not-required:
    needs: [change-scope]
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      needs.change-scope.outputs.package_staging_required == 'false' &&
      needs.change-scope.outputs.test_gate_required == 'false' &&
      needs.change-scope.outputs.skip_staging_tests != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      statuses: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Post merge-gate success for no-op package staging
        run: |
          gh api -X POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }}" \
            -f state=success \
            -f context=merge-gate \
            -f description="No package or runtime-affecting changes; package staging skipped." \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  toolchain-cache:
    # Same fork-PR gate as preflight + the legacy `build` job. Fork PRs
    # see this job as Skipped, consistent with current behavior.
    needs: [change-scope]
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      (needs.change-scope.outputs.package_staging_required == 'true' ||
       needs.change-scope.outputs.test_gate_required == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Prepare package toolchain
        uses: ./.github/actions/package-toolchain

      - name: Install JavaScript dependencies for tap-native Homebrew validation
        run: |
          bash scripts/dev-shell.sh bash -c '
            PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund
          '

      - name: Validate tap-native Homebrew sidecars and pour planning
        run: bash scripts/dev-shell.sh bash scripts/test-homebrew-tap-native-sidecars.sh

  # Library wave — kind=library packages build first. Each runner
  # uploads its archive as `<lib>-<arch>` so the program wave below
  # can pull them via package.pr.toml file:// overlays. This dedupes
  # library builds across the matrix: each library compiles exactly
  # once per arch, instead of once per dependent program.
  lib-matrix-build:
    needs: [preflight, toolchain-cache]
    if: ${{ needs.preflight.result == 'success' && needs.toolchain-cache.result == 'success' && needs.preflight.outputs.library_matrix != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      actions: read      # download toolchain artifact
      contents: read
    env:
      WASM_POSIX_BINARY_INDEX_URL: https://github.com/${{ github.repository }}/releases/download/${{ needs.preflight.outputs.baseline_tag }}/index.toml
    strategy:
      fail-fast: false
      # The matrix no longer contends on release writes or the staging
      # state-lock. Ten workers keeps codeload pressure bounded while removing
      # the old four-writer publication bottleneck.
      max-parallel: 10
      matrix:
        include: ${{ fromJSON(needs.preflight.outputs.library_matrix) }}
    steps:
      - id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Build ${{ matrix.package }} (${{ matrix.arch }})
        id: build
        uses: ./.github/actions/package-archive-build
        with:
          package: ${{ matrix.package }}
          arch: ${{ matrix.arch }}
          build-host: ${{ github.repository }}@${{ github.sha }}
          expected-cache-key-sha: ${{ matrix.sha }}

  # Program wave — kind=program packages, gated on the library wave.
  # Each runner downloads the library archives produced above and
  # materializes package.pr.toml overlays so the resolver finds each
  # library via file:// instead of source-building a fresh copy.
  matrix-build:
    needs: [preflight, toolchain-cache, lib-matrix-build]
    # !cancelled() so a partial library-wave failure (one lib failed,
    # others succeeded) doesn't cancel programs that depend only on
    # the green libs. Programs whose libs failed will fail loudly at
    # resolve time, which is the correct behavior.
    if: ${{ !cancelled() && needs.preflight.result == 'success' && needs.toolchain-cache.result == 'success' && needs.preflight.outputs.program_matrix != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: read      # download toolchain + library artifacts
      contents: read
    env:
      WASM_POSIX_BINARY_INDEX_URL: https://github.com/${{ github.repository }}/releases/download/${{ needs.preflight.outputs.baseline_tag }}/index.toml
    strategy:
      fail-fast: false
      # Program jobs retain dependency ordering through immutable workflow
      # artifacts, but no longer serialize on release publication.
      max-parallel: 10
      matrix:
        include: ${{ fromJSON(needs.preflight.outputs.program_matrix) }}
    steps:
      - id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Node for the shell VFS composer
        if: ${{ matrix.package == 'shell' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: tools/mkrootfs/package-lock.json

      - name: Install shell VFS composer dependencies
        if: ${{ matrix.package == 'shell' }}
        run: npm --prefix tools/mkrootfs ci --no-audit --no-fund

      - name: Build ${{ matrix.package }} (${{ matrix.arch }})
        id: build
        uses: ./.github/actions/package-archive-build
        with:
          package: ${{ matrix.package }}
          arch: ${{ matrix.arch }}
          build-host: ${{ github.repository }}@${{ github.sha }}
          expected-cache-key-sha: ${{ matrix.sha }}
          materialize-library-overlays: ${{ needs.preflight.outputs.library_matrix != '[]' }}
          library-matrix: ${{ needs.preflight.outputs.library_matrix }}
          dependency-matrix: ${{ needs.preflight.outputs.program_matrix }}
          github-token: ${{ github.token }}


  finalize-staging-release:
    # Matrix jobs are uncredentialed producers. This is the only staging
    # release writer, and it runs after both dependency-ordered waves even
    # when one entry failed so reviewers still receive a complete failure
    # ledger and last-green fallbacks.
    needs: [preflight, toolchain-cache, lib-matrix-build, matrix-build]
    if: |
      always() &&
      !cancelled() &&
      needs.preflight.result == 'success' &&
      needs.toolchain-cache.result == 'success' &&
      (
        needs.preflight.outputs.library_matrix != '[]' ||
        needs.preflight.outputs.program_matrix != '[]'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: phase-b-1-publish-${{ needs.preflight.outputs.target_tag }}
      cancel-in-progress: false
    permissions:
      actions: read      # download matrix artifacts + recover abandoned lock owners
      contents: write    # publish one referentially safe staging snapshot
    outputs:
      had_failures: ${{ steps.compose.outputs.had_failures }}
    env:
      GH_TOKEN: ${{ github.token }}
      GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch musl submodule
        uses: ./.github/actions/fetch-submodules
        with:
          submodules: libc/musl

      - name: Set up Nix
        uses: ./.github/actions/setup-nix

      - name: Restore xtask cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: |
            ~/.cargo/registry
            target
          key: preflight-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'tools/xtask/**') }}
          restore-keys: |
            preflight-${{ runner.os }}-

      - name: Build exact finalization inputs
        run: |
          bash scripts/dev-shell.sh env \
            LIBRARY_MATRIX='${{ needs.preflight.outputs.library_matrix }}' \
            PROGRAM_MATRIX='${{ needs.preflight.outputs.program_matrix }}' \
            ABI='${{ needs.preflight.outputs.abi }}' \
            bash -c '
              set -euo pipefail
              HOST_TARGET=$(rustc -vV | awk "/^host/ {print \$2}")
              cargo build --release -p xtask --target "$HOST_TARGET"
              jq -nc --argjson libraries "$LIBRARY_MATRIX" \
                --argjson programs "$PROGRAM_MATRIX" \
                "\$libraries + \$programs" > "$RUNNER_TEMP/staging-matrix.json"
              target/$HOST_TARGET/release/xtask staging-reuse expected \
                --registry packages/registry \
                --expected-abi "$ABI" \
                --exclude erlang-vfs,perl,perl-vfs,python-vfs,redis,texlive \
                --output "$RUNNER_TEMP/staging-expected.json"
              jq -r ".[] | \"\\(.package)-\\(.arch)\"" \
                "$RUNNER_TEMP/staging-matrix.json" \
                > "$RUNNER_TEMP/staging-artifacts.txt"
            '

      - name: Download immutable matrix archives
        run: |
          bash scripts/dev-shell.sh env \
            GH_TOKEN="$GH_TOKEN" \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_RUN_ID="$GITHUB_RUN_ID" \
            DEPENDENCY_ARTIFACT_ATTEMPTS=4 \
            DEPENDENCY_ARTIFACT_POLL_SECONDS=5 \
            bash .github/scripts/download-dependency-artifacts.sh \
              --list "$RUNNER_TEMP/staging-artifacts.txt" \
              --output "$RUNNER_TEMP/staging-artifacts" \
              --allow-missing-completed

      - name: Freeze the available last-green baseline
        env:
          BASELINE_TAG: ${{ needs.preflight.outputs.baseline_tag }}
        run: |
          bash scripts/dev-shell.sh env \
            GH_TOKEN="$GH_TOKEN" \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            BASELINE_TAG="$BASELINE_TAG" \
            bash -c '
              set -euo pipefail
              error="$RUNNER_TEMP/baseline-view.err"
              if gh release view "$BASELINE_TAG" --repo "$GITHUB_REPOSITORY" \
                  >/dev/null 2>"$error"; then
                HOST_TARGET=$(rustc -vV | awk "/^host/ {print \$2}")
                # WHY: canonical can lack an expected package/arch key. Freeze
                # every valid key it does have; matrix artifacts fill gaps and
                # the post-composition validator still requires full coverage.
                bash .github/scripts/validate-staging-release.sh \
                  --tag "$BASELINE_TAG" \
                  --expected-ledger "$RUNNER_TEMP/staging-expected.json" \
                  --mode available \
                  --materialize \
                  --output-dir "$RUNNER_TEMP/staging-baseline" \
                  --xtask "target/$HOST_TARGET/release/xtask"
              elif grep -Eqi "not found|HTTP 404|release does not exist" "$error"; then
                echo "finalizer: $BASELINE_TAG is absent; the matrix must supply the complete first ABI snapshot"
              else
                cat "$error" >&2
                exit 1
              fi
            '

      - name: Compose one complete target-relative index
        id: compose
        env:
          TARGET_TAG: ${{ needs.preflight.outputs.target_tag }}
          ABI: ${{ needs.preflight.outputs.abi }}
        run: |
          bash scripts/dev-shell.sh env \
            TARGET_TAG="$TARGET_TAG" \
            ABI="$ABI" \
            BUILT_BY="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            bash -c '
              set -euo pipefail
              HOST_TARGET=$(rustc -vV | awk "/^host/ {print \$2}")
              baseline_args=()
              if [ -d "$RUNNER_TEMP/staging-baseline" ]; then
                baseline_args=(--baseline-dir "$RUNNER_TEMP/staging-baseline")
              fi
              bash .github/scripts/compose-staging-finalization.sh \
                --target-tag "$TARGET_TAG" \
                --expected-ledger "$RUNNER_TEMP/staging-expected.json" \
                --matrix "$RUNNER_TEMP/staging-matrix.json" \
                --artifacts-dir "$RUNNER_TEMP/staging-artifacts" \
                "${baseline_args[@]}" \
                --output-dir "$RUNNER_TEMP/staging-final" \
                --xtask "target/$HOST_TARGET/release/xtask" \
                --abi "$ABI" \
                --built-at "$(date -u +%FT%TZ)" \
                --built-by "$BUILT_BY"
              echo "had_failures=$(cat "$RUNNER_TEMP/staging-final/had-failures")" \
                >> "$GITHUB_OUTPUT"
            '

      - name: Publish and re-read the complete staging snapshot
        id: publish
        env:
          TARGET_TAG: ${{ needs.preflight.outputs.target_tag }}
        run: |
          bash scripts/dev-shell.sh env \
            GH_TOKEN="$GH_TOKEN" \
            GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
            GITHUB_RUN_ID="$GITHUB_RUN_ID" \
            GITHUB_RUN_ATTEMPT="$GITHUB_RUN_ATTEMPT" \
            GITHUB_SHA="${{ github.event.pull_request.head.sha }}" \
            TARGET_TAG="$TARGET_TAG" \
            bash .github/scripts/publish-staging-finalization.sh \
              --target-tag "$TARGET_TAG" \
              --target-sha "${{ github.event.pull_request.head.sha }}" \
              --final-dir "$RUNNER_TEMP/staging-final"

      - name: Record finalizer publication result
        if: ${{ always() && steps.compose.outcome == 'success' }}
        env:
          PUBLISH_OUTCOME: ${{ steps.publish.outcome }}
        run: |
          # WHY: package rows describe matrix builds, not the release write.
          # Preserve that distinction so a successful build followed by a
          # failed GitHub upload is never reported as a published snapshot.
          publication_status=failed
          if [ "$PUBLISH_OUTCOME" = success ]; then
            publication_status=success
          fi
          jq --arg status "$publication_status" \
            '.publication_status = $status' \
            "$RUNNER_TEMP/staging-final/publish-status.json" \
            > "$RUNNER_TEMP/staging-final/publish-status.next.json"
          mv "$RUNNER_TEMP/staging-final/publish-status.next.json" \
            "$RUNNER_TEMP/staging-final/publish-status.json"

      - name: Upload per-package publication status
        if: ${{ always() && steps.compose.outcome == 'success' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: staging-finalizer-status
          path: ${{ runner.temp }}/staging-final/publish-status.json
          retention-days: 30
          if-no-files-found: error

  staging-finalization-state:
    # Always reduce producer/finalizer outcomes in one tested state machine.
    # A partial package failure may still publish an exact fallback snapshot
    # for the test gate, while package-staging-result below remains red.
    needs: [preflight, lib-matrix-build, matrix-build, finalize-staging-release]
    if: ${{ always() && !cancelled() && needs.preflight.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      matrix_selected: ${{ steps.state.outputs.matrix_selected }}
      publication_succeeded: ${{ steps.state.outputs.publication_succeeded }}
      finalization_ready: ${{ steps.state.outputs.finalization_ready }}
      test_ready: ${{ steps.state.outputs.test_ready }}
      artifact_failures: ${{ steps.state.outputs.artifact_failures }}
      had_failures: ${{ steps.state.outputs.had_failures }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Reduce staging finalization outcomes
        id: state
        env:
          MATRIX_SELECTED: ${{ needs.preflight.outputs.library_matrix != '[]' || needs.preflight.outputs.program_matrix != '[]' }}
          LIBRARY_RESULT: ${{ needs.lib-matrix-build.result }}
          PROGRAM_RESULT: ${{ needs.matrix-build.result }}
          FINALIZER_RESULT: ${{ needs.finalize-staging-release.result }}
          HAD_FAILURES: ${{ needs.finalize-staging-release.outputs.had_failures }}
        run: |
          bash .github/scripts/staging-finalization-outcome.sh \
            --matrix-selected "$MATRIX_SELECTED" \
            --library-result "$LIBRARY_RESULT" \
            --program-result "$PROGRAM_RESULT" \
            --finalizer-result "$FINALIZER_RESULT" \
            --had-failures "$HAD_FAILURES" \
            --output "$RUNNER_TEMP/staging-finalization-state.json"
          jq . "$RUNNER_TEMP/staging-finalization-state.json"
          while IFS= read -r key; do
            echo "$key=$(jq -r --arg key "$key" '.[$key]' \
              "$RUNNER_TEMP/staging-finalization-state.json")" >> "$GITHUB_OUTPUT"
          done <<'EOF'
          matrix_selected
          publication_succeeded
          finalization_ready
          test_ready
          artifact_failures
          had_failures
          EOF

  test-gate-validation:
    # Source-only validation does not consume the prepared test workspace.
    # Run it alongside package materialization and kernel fixture preparation
    # so typechecking and workflow tests do not extend the suite critical path.
    needs: [change-scope]
    if: |
      !cancelled() &&
      needs.change-scope.result == 'success' &&
      (
        needs.change-scope.outputs.package_staging_required == 'true' ||
        needs.change-scope.outputs.test_gate_required == 'true'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      PACKAGE_PUBLISH_FLOW_CHANGED: ${{ needs.change-scope.outputs.package_publish_flow_changed }}
      BINARY_MATERIALIZATION_CHANGED: ${{ needs.change-scope.outputs.binary_materialization_changed }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Nix
        uses: ./.github/actions/setup-nix

      - name: Install root npm deps
        run: bash scripts/dev-shell.sh npm ci --no-audit --no-fund

      - name: Install host npm deps
        run: |
          bash scripts/dev-shell.sh bash -c '
            cd host
            PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund
          '

      - name: Typecheck host package
        run: |
          bash scripts/dev-shell.sh bash -c '
            cd host && npm run typecheck
          '

      - name: Test CI suite routing
        run: |
          bash scripts/dev-shell.sh bash \
            tests/scripts/ci-run-test-suite-groups.test.sh

      - name: Test package build root contract
        run: bash scripts/dev-shell.sh bash scripts/test-package-build-roots.sh

      - name: Test package publish flow
        if: env.PACKAGE_PUBLISH_FLOW_CHANGED == 'true'
        run: |
          bash scripts/dev-shell.sh bash tests/scripts/package-publish-flow.sh

      - name: Test binary materialization flow
        if: env.BINARY_MATERIALIZATION_CHANGED == 'true'
        run: |
          bash scripts/dev-shell.sh npx --prefix host vitest run --root . tests/package-system

  test-suite-early:
    name: test-suite (${{ matrix.label }})
    # These source-only Cargo suites need neither package materialization nor
    # the prepared workspace, so start them as soon as change scope is known.
    needs: [change-scope]
    if: |
      !cancelled() &&
      needs.change-scope.result == 'success' &&
      (
        needs.change-scope.outputs.package_staging_required == 'true' ||
        needs.change-scope.outputs.test_gate_required == 'true'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: cargo-kernel
            label: cargo-kernel
          - suite: fork-instrument
            label: fork-instrument
    env:
      KERNEL_CHANGED: ${{ needs.change-scope.outputs.kernel }}
      SKIP_STAGING_TESTS: ${{ needs.change-scope.outputs.skip_staging_tests }}
      SUITE: ${{ matrix.suite }}
    steps:
      - name: Decide whether to run suite
        id: suite
        run: |
          set -euo pipefail
          if [ "$SKIP_STAGING_TESTS" = "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "skip-staging-tests label is present; $SUITE is deferred to prepare-merge."
            exit 0
          fi
          if [ "$KERNEL_CHANGED" != "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "$SUITE is kernel-only and this diff does not require kernel suites."
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: steps.suite.outputs.skip != 'true'
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Nix
        if: steps.suite.outputs.skip != 'true'
        uses: ./.github/actions/setup-nix

      - name: Run ${{ matrix.label }} suite
        if: steps.suite.outputs.skip != 'true'
        run: |
          bash scripts/dev-shell.sh bash scripts/ci-run-test-suite.sh "$SUITE"

  test-gate-prepare:
    # Materializes the union of (matrix-built archives + durable release
    # fallback), builds the fresh kernel/test fixtures once, and uploads
    # the complete prepared workspace for the parallel suites below.
    #
    # Run even when some matrix entries failed. Per the design doc,
    # partial-matrix-failure is a real scenario the consumer side
    # handles via last-green fallback, so the green packages should
    # still be tested for the union they form with the durable release.
    # Use !cancelled() instead of always() so manual/concurrency
    # cancellation is respected and this long test job doesn't keep an
    # obsolete workflow alive.
    # Run even when preflight produces an empty matrix. A retry push can
    # legitimately hit all package archives in pr-<N>-staging (because
    # the previous run published them) while still needing to validate
    # the gate itself, especially after workflow/test-gate fixes.
    needs: [change-scope, preflight, toolchain-cache, staging-finalization-state]
    if: |
      !cancelled() &&
      needs.toolchain-cache.result == 'success' &&
      needs.preflight.result == 'success' &&
      needs.staging-finalization-state.result == 'success' &&
      needs.staging-finalization-state.outputs.test_ready == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      actions: read
      contents: read
    env:
      PACKAGE_STAGING_REQUIRED: ${{ needs.change-scope.outputs.package_staging_required }}
      PACKAGE_FINALIZED_STAGING: ${{ needs.preflight.outputs.library_matrix != '[]' || needs.preflight.outputs.program_matrix != '[]' }}
      PACKAGE_TARGET_TAG: ${{ needs.preflight.outputs.target_tag }}
      PACKAGE_BASELINE_TAG: ${{ needs.preflight.outputs.baseline_tag }}
      PACKAGE_REUSE_STAGING: ${{ needs.preflight.outputs.reuse_staging }}
      SKIP_STAGING_TESTS: ${{ needs.change-scope.outputs.skip_staging_tests }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Nix
        uses: ./.github/actions/setup-nix

      - name: Download toolchain sysroots artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: toolchain-sysroots
          path: ${{ runner.temp }}/toolchain

      - name: Extract toolchain sysroots
        run: |
          tar --zstd -xf "$RUNNER_TEMP/toolchain/toolchain-sysroots.tar.zst"

      - name: Materialize binaries
        env:
          GH_TOKEN: ${{ github.token }}
          WASM_POSIX_FETCH_SKIP_PKGS: cpython erlang erlang-vfs perl perl-vfs python-vfs redis texlive
        # A finalized or reused staging release is fetched after the only
        # writer finishes, validated, and frozen into a local file://
        # snapshot. Tests therefore consume the same complete remote
        # snapshot reviewers receive.
        run: |
          set -euo pipefail
          if [ "$PACKAGE_FINALIZED_STAGING" = "true" ]; then
            ABI=$(grep -oE "ABI_VERSION: u32 = [0-9]+" crates/shared/src/lib.rs | awk '{print $4}')
            EXPECTED="$RUNNER_TEMP/staging-expected.json"
            SNAPSHOT="$RUNNER_TEMP/current-staging-snapshot"
            bash scripts/dev-shell.sh env \
              EXPECTED="$EXPECTED" \
              SNAPSHOT="$SNAPSHOT" \
              PACKAGE_TARGET_TAG="$PACKAGE_TARGET_TAG" \
              ABI="$ABI" \
              bash -c '
                set -euo pipefail
                HOST_TARGET=$(rustc -vV | awk "/^host/ {print \$2}")
                cargo build --release -p xtask --target "$HOST_TARGET"
                XTASK="target/$HOST_TARGET/release/xtask"
                "$XTASK" staging-reuse expected \
                  --registry packages/registry \
                  --expected-abi "$ABI" \
                  --exclude erlang-vfs,perl,perl-vfs,python-vfs,redis,texlive \
                  --output "$EXPECTED"
                TARGET_SNAPSHOT="$RUNNER_TEMP/fresh-finalized-target"
                bash .github/scripts/validate-staging-release.sh \
                  --tag "$PACKAGE_TARGET_TAG" \
                  --expected-ledger "$EXPECTED" \
                  --mode testable \
                  --materialize \
                  --output-dir "$TARGET_SNAPSHOT" \
                  --xtask "$XTASK"
                bash .github/scripts/compose-staging-release-snapshots.sh \
                  --target-dir "$TARGET_SNAPSHOT" \
                  --output-dir "$SNAPSHOT"
              '
            export WASM_POSIX_BINARY_INDEX_URL
            WASM_POSIX_BINARY_INDEX_URL=$(cat "$SNAPSHOT/index-url.txt")
          elif [ "$PACKAGE_REUSE_STAGING" != "false" ]; then
            ABI=$(grep -oE "ABI_VERSION: u32 = [0-9]+" crates/shared/src/lib.rs | awk '{print $4}')
            EXPECTED="$RUNNER_TEMP/staging-expected.json"
            SNAPSHOT="$RUNNER_TEMP/current-staging-snapshot"
            bash scripts/dev-shell.sh env \
              EXPECTED="$EXPECTED" \
              SNAPSHOT="$SNAPSHOT" \
              PACKAGE_TARGET_TAG="$PACKAGE_TARGET_TAG" \
              PACKAGE_BASELINE_TAG="$PACKAGE_BASELINE_TAG" \
              ABI="$ABI" \
              bash -c '
              set -euo pipefail
              HOST_TARGET=$(rustc -vV | awk "/^host/ {print \$2}")
              cargo build --release -p xtask --target "$HOST_TARGET"
              XTASK="target/$HOST_TARGET/release/xtask"
              "$XTASK" staging-reuse expected \
                --registry packages/registry \
                --expected-abi "$ABI" \
                --exclude cpython,erlang,erlang-vfs,perl,perl-vfs,python-vfs,redis,texlive \
                --output "$EXPECTED"
              TARGET_SNAPSHOT="$RUNNER_TEMP/fresh-target-snapshot"
              bash .github/scripts/validate-staging-release.sh \
                --tag "$PACKAGE_TARGET_TAG" \
                --expected-ledger "$EXPECTED" \
                --mode structural \
                --materialize \
                --output-dir "$TARGET_SNAPSHOT" \
                --xtask "$XTASK"
              STALE_EXPECTED="$RUNNER_TEMP/fresh-stale-expected.json"
              jq --slurpfile snapshot "$TARGET_SNAPSHOT/snapshot.json" "
                .entries |= map(. as \$expected |
                  select(any(\$snapshot[0].entries[];
                    .package == \$expected.package and
                    .arch == \$expected.arch and
                    .current == false)))
              " "$EXPECTED" > "$STALE_EXPECTED"
              stale_count=$(jq ".entries | length" "$STALE_EXPECTED")
              if [ "$stale_count" -eq 0 ]; then
                bash .github/scripts/compose-staging-release-snapshots.sh \
                  --target-dir "$TARGET_SNAPSHOT" \
                  --output-dir "$SNAPSHOT"
              else
                CANONICAL_SNAPSHOT="$RUNNER_TEMP/fresh-canonical-supplement"
                bash .github/scripts/validate-staging-release.sh \
                  --tag "$PACKAGE_BASELINE_TAG" \
                  --expected-ledger "$STALE_EXPECTED" \
                  --mode current \
                  --materialize \
                  --output-dir "$CANONICAL_SNAPSHOT" \
                  --xtask "$XTASK"
                bash .github/scripts/compose-staging-release-snapshots.sh \
                  --target-dir "$TARGET_SNAPSHOT" \
                  --canonical-dir "$CANONICAL_SNAPSHOT" \
                  --overlay-expected-ledger "$STALE_EXPECTED" \
                  --output-dir "$SNAPSHOT" \
                  --xtask "$XTASK"
              fi
            '
            export WASM_POSIX_BINARY_INDEX_URL
            WASM_POSIX_BINARY_INDEX_URL=$(cat "$SNAPSHOT/index-url.txt")
          else
            ABI=$(grep -oE "ABI_VERSION: u32 = [0-9]+" crates/shared/src/lib.rs | awk '{print $4}')
            export WASM_POSIX_BINARY_INDEX_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/binaries-abi-v${ABI}/index.toml"
          fi
          echo "WASM_POSIX_BINARY_INDEX_URL=$WASM_POSIX_BINARY_INDEX_URL" >> "$GITHUB_ENV"
          bash scripts/dev-shell.sh bash scripts/fetch-binaries.sh --fetch-only

      - name: Skip staging test suites
        if: env.SKIP_STAGING_TESTS == 'true'
        run: |
          echo "skip-staging-tests label is present on this PR."
          echo "staging-build validated preflight, toolchain cache, package matrix/builds, and binary materialization."
          echo "Kernel/test program build, cargo tests, fork-instrument tests, vitest, browser E2E, libc-test, POSIX, and Sortix are deferred to prepare-merge."

      - name: Build kernel + test programs + rootfs
        if: env.SKIP_STAGING_TESTS != 'true'
        # Test prereqs not shipped in the release archives: kernel.wasm
        # is built fresh (and copied into local-binaries/ where the
        # resolver finds it ahead of binaries/), as are programs/*.wasm
        # fixtures consumed by vitest. build-rootfs.sh installs only its
        # own missing Node dependencies and produces host/wasm/rootfs.vfs,
        # which NodeKernelHost loads for `rootfsImage:"default"`.
        run: |
          bash scripts/dev-shell.sh bash -c '
            set -euo pipefail
            export PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
            cargo build --release -p kandelo \
              -Z build-std=core,alloc
            mkdir -p local-binaries
            cp target/wasm32-unknown-unknown/release/kandelo_kernel.wasm \
              local-binaries/kernel.wasm
            bash scripts/build-programs.sh
            bash scripts/build-rootfs.sh
          '

      - name: Pack prepared test workspace
        if: env.SKIP_STAGING_TESTS != 'true'
        run: |
          bash scripts/dev-shell.sh bash scripts/pack-ci-test-workspace.sh \
            "$RUNNER_TEMP/test-workspace.tar.zst"

      - name: Upload prepared test workspace
        if: env.SKIP_STAGING_TESTS != 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-workspace
          path: ${{ runner.temp }}/test-workspace.tar.zst
          retention-days: 1
          if-no-files-found: error

  test-suite:
    name: test-suite (${{ matrix.label }})
    needs: [change-scope, test-gate-prepare]
    if: |
      !cancelled() &&
      needs.test-gate-prepare.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 75
    permissions:
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: vitest
            label: vitest
            group: all
            kernel_only: false
            submodules: ''
            needs_toolchain: true
            needs_workspace: true
          - suite: browser
            label: browser
            group: all
            kernel_only: false
            submodules: ''
            needs_toolchain: true
            needs_workspace: true
          - suite: libc
            label: libc (functional + regression)
            group: functional-regression
            kernel_only: true
            submodules: tests/libc/libc-test
            needs_toolchain: true
            needs_workspace: true
          - suite: libc
            label: libc (math)
            group: math
            kernel_only: true
            submodules: tests/libc/libc-test
            needs_toolchain: true
            needs_workspace: true
          - suite: posix
            label: posix
            group: all
            kernel_only: true
            submodules: ''
            needs_toolchain: true
            needs_workspace: true
          - suite: sortix
            label: sortix (include)
            group: include
            kernel_only: true
            submodules: tests/sortix/os-test
            needs_toolchain: true
            needs_workspace: true
          - suite: sortix
            label: sortix (basic)
            group: basic
            kernel_only: true
            submodules: tests/sortix/os-test
            needs_toolchain: true
            needs_workspace: true
          - suite: sortix
            label: sortix (runtime)
            group: runtime
            kernel_only: true
            submodules: tests/sortix/os-test
            needs_toolchain: true
            needs_workspace: true
    env:
      KERNEL_CHANGED: ${{ needs.change-scope.outputs.kernel }}
      KERNEL_ONLY: ${{ matrix.kernel_only }}
      SKIP_STAGING_TESTS: ${{ needs.change-scope.outputs.skip_staging_tests }}
      SUITE: ${{ matrix.suite }}
      TEST_GROUP: ${{ matrix.group }}
      PREPARE_BROWSER_ASSETS: ${{ matrix.suite == 'browser' }}
    steps:
      - name: Decide whether to run suite
        id: suite
        run: |
          set -euo pipefail
          if [ "$SKIP_STAGING_TESTS" = "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "skip-staging-tests label is present; $SUITE is deferred to prepare-merge."
            exit 0
          fi
          if [ "$KERNEL_ONLY" = "true" ] && [ "$KERNEL_CHANGED" != "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "$SUITE is kernel-only and this diff does not require kernel suites."
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: steps.suite.outputs.skip != 'true'
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch suite submodule
        if: steps.suite.outputs.skip != 'true' && matrix.submodules != ''
        uses: ./.github/actions/fetch-submodules
        with:
          submodules: ${{ matrix.submodules }}

      - name: Set up Nix
        if: steps.suite.outputs.skip != 'true'
        uses: ./.github/actions/setup-nix

      - name: Download toolchain sysroots artifact
        if: steps.suite.outputs.skip != 'true' && matrix.needs_toolchain == true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: toolchain-sysroots
          path: ${{ runner.temp }}/toolchain

      - name: Extract toolchain sysroots
        if: steps.suite.outputs.skip != 'true' && matrix.needs_toolchain == true
        run: |
          tar --zstd -xf "$RUNNER_TEMP/toolchain/toolchain-sysroots.tar.zst"

      - name: Download prepared test workspace
        if: steps.suite.outputs.skip != 'true' && matrix.needs_workspace == true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: test-workspace
          path: ${{ runner.temp }}/test-workspace

      - name: Extract prepared test workspace
        if: steps.suite.outputs.skip != 'true' && matrix.needs_workspace == true
        run: |
          tar --zstd -xf \
            "$RUNNER_TEMP/test-workspace/test-workspace.tar.zst"

      - name: Run ${{ matrix.label }} suite
        if: steps.suite.outputs.skip != 'true'
        # Suite controls must cross dev-shell.sh's --ignore-environment
        # boundary explicitly; otherwise every shard defaults to "all" and
        # the browser consumer skips its deferred asset preparation.
        run: |
          bash scripts/dev-shell.sh env \
            PREPARE_BROWSER_ASSETS="$PREPARE_BROWSER_ASSETS" \
            bash scripts/ci-run-test-suite.sh "$SUITE" "$TEST_GROUP"

      - name: Upload browser test artifacts
        if: failure() && steps.suite.outputs.skip != 'true' && matrix.suite == 'browser'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: browser-test-artifacts
          path: |
            apps/browser-demos/test-results
          if-no-files-found: ignore
          retention-days: 7

  test-gate:
    needs: [change-scope, test-gate-validation, test-suite-early, test-gate-prepare, test-suite]
    if: |
      always() &&
      !cancelled() &&
      needs.test-gate-prepare.result != 'skipped'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      statuses: write
    env:
      GH_TOKEN: ${{ github.token }}
      VALIDATION_RESULT: ${{ needs.test-gate-validation.result }}
      EARLY_TEST_SUITE_RESULT: ${{ needs.test-suite-early.result }}
      PREPARE_RESULT: ${{ needs.test-gate-prepare.result }}
      TEST_SUITE_RESULT: ${{ needs.test-suite.result }}
      SKIP_STAGING_TESTS: ${{ needs.change-scope.outputs.skip_staging_tests }}
    steps:
      - name: Check validation and split test suites
        run: |
          set -euo pipefail
          if [ "$VALIDATION_RESULT" != "success" ]; then
            echo "::error::source validation completed with result: $VALIDATION_RESULT"
            exit 1
          fi
          if [ "$EARLY_TEST_SUITE_RESULT" != "success" ]; then
            echo "::error::early test suites completed with result: $EARLY_TEST_SUITE_RESULT"
            exit 1
          fi
          if [ "$PREPARE_RESULT" != "success" ]; then
            echo "::error::test preparation completed with result: $PREPARE_RESULT"
            exit 1
          fi
          if [ "$TEST_SUITE_RESULT" != "success" ]; then
            echo "::error::split test suites completed with result: $TEST_SUITE_RESULT"
            exit 1
          fi

      - name: Post merge-gate success for runtime-only staging
        if: |
          env.SKIP_STAGING_TESTS != 'true' &&
          needs.change-scope.outputs.package_staging_required == 'false' &&
          needs.change-scope.outputs.test_gate_required == 'true'
        run: |
          gh api -X POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }}" \
            -f state=success \
            -f context=merge-gate \
            -f description="Runtime/materialization tests passed; package staging skipped." \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  package-staging-result:
    # Keep package publication red after the test gate has exercised a valid
    # last-green fallback. This is intentionally separate from the finalizer:
    # publication success and package build success are different facts.
    needs: [preflight, staging-finalization-state, test-gate]
    if: |
      always() &&
      !cancelled() &&
      needs.preflight.result == 'success' &&
      (
        needs.preflight.outputs.library_matrix != '[]' ||
        needs.preflight.outputs.program_matrix != '[]'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions: {}
    steps:
      - name: Enforce package staging result
        env:
          PUBLICATION_SUCCEEDED: ${{ needs.staging-finalization-state.outputs.publication_succeeded }}
          ARTIFACT_FAILURES: ${{ needs.staging-finalization-state.outputs.artifact_failures }}
          HAD_FAILURES: ${{ needs.staging-finalization-state.outputs.had_failures }}
          TEST_GATE_RESULT: ${{ needs.test-gate.result }}
        run: |
          if [ "$PUBLICATION_SUCCEEDED" != true ]; then
            echo "::error::The complete staging snapshot was not published and re-read."
            exit 1
          fi
          if [ "$TEST_GATE_RESULT" != success ]; then
            echo "::error::The test gate did not accept the published staging snapshot."
            exit 1
          fi
          if [ "$ARTIFACT_FAILURES" = true ] || [ "$HAD_FAILURES" = 1 ]; then
            # WHY: fallbacks keep tests useful, but they are not evidence that
            # the requested package generation built successfully.
            echo "::error::The testable last-green snapshot passed, but one or more requested package artifacts failed."
            exit 1
          fi
          echo "Package staging publication, artifacts, and test gate succeeded."

  # Per-matrix publication — REMOVED.
  #
  # Matrix jobs now produce immutable workflow artifacts. The single
  # finalize-staging-release job validates the entire result, takes one
  # state lock, uploads every index-referenced archive, and replaces the
  # complete target-relative index exactly once.
  #
  # Stale-archive pruning (prune-staging-release.sh) is also gone:
  # the index.toml is authoritative, so orphan archives on the
  # staging tag are harmless until cleaned by staging-cleanup.yml.

  f2-status:
    # Phase B-2 Task 1 — F2 sticky PR-comment bot.
    #
    # Aggregates the narrowed matrix from preflight against the release
    # asset list (post-publish, post-generate-index) into a flat
    # publish-status.json, uploads it as a workflow artifact, and
    # posts/edits a sticky PR comment surfacing per-package outcomes
    # ("X built, Y failed").
    #
    # `if: always()` is intentional: the bot's whole purpose is to
    # surface partial failures in matrix-build. We still skip when
    # the narrowed matrix is empty (nothing was attempted; nothing
    # to report). For B-2, only matrix-included entries are
    # reported — `cached-skip` (entries the preflight gate filtered
    # out) is not surfaced. Follow-up if reviewers want full coverage.
    #
    # Joins the publish concurrency group so the comment can't race a
    # concurrent re-run on the same target tag. The narrow window where
    # this matters: workflow_dispatch or "re-run all jobs" on a still-
    # current PR (the workflow-level `cancel-in-progress: true` already
    # eliminates the common-case quick-push race). cancel-in-progress is
    # false here because aborting an in-flight comment edit is worse than
    # waiting one more comment-edit's worth of time.
    needs: [preflight, lib-matrix-build, matrix-build, finalize-staging-release]
    if: always() && needs.preflight.result == 'success' && (needs.preflight.outputs.library_matrix != '[]' || needs.preflight.outputs.program_matrix != '[]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: phase-b-1-publish-${{ needs.preflight.outputs.target_tag }}
      cancel-in-progress: false
    permissions:
      actions: read         # consume the finalizer's exact matrix result
      pull-requests: write   # post/edit PR comment
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Download exact finalizer status
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: staging-finalizer-status
          path: ${{ runner.temp }}/staging-finalizer-status

      - name: Compute publish-status.json
        id: status
        run: |
          set -euo pipefail
          cp "$RUNNER_TEMP/staging-finalizer-status/publish-status.json" \
            publish-status.json
          jq -e '
            (.abi_version | type == "number") and
            (.release_tag | type == "string") and
            (.publication_status == "success" or .publication_status == "failed") and
            (.packages | type == "array") and
            all(.packages[];
              (.name | type == "string") and
              (.arch == "wasm32" or .arch == "wasm64") and
              (.status == "built" or .status == "failed"))
          ' publish-status.json >/dev/null

          echo "--- publish-status.json ---"
          jq . publish-status.json

          # Stash compact JSON in step output for the comment script.
          # Use a heredoc-style multi-line output to avoid quoting issues
          # with embedded special characters in package names / shas.
          json=$(jq -c . publish-status.json)
          {
            echo "json<<__EOF__"
            echo "$json"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Upload publish-status.json
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: publish-status
          path: publish-status.json
          retention-days: 30
          if-no-files-found: error

      - name: Post or edit sticky PR comment
        # Skipped on non-PR triggers (workflow_dispatch from the
        # force-rebuild flow, etc.) — those still get the artifact
        # but have no PR to comment on.
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          STATUS_JSON: ${{ steps.status.outputs.json }}
        with:
          script: |
            const status = JSON.parse(process.env.STATUS_JSON);
            const marker = '<!-- phase-b-status -->';
            const total = status.packages.length;
            const built = status.packages.filter(p => p.status === 'built').length;
            const failed = status.packages.filter(p => p.status === 'failed').length;
            const publication = status.publication_status === 'success'
              ? 'complete staging snapshot published and re-read'
              : 'staging snapshot publication failed; inspect the finalizer job';

            const rows = status.packages.map(p => {
              const sha = p.sha
                ? `\`${p.sha.slice(0, 8)}\``
                : (p.previous_sha ? `\`(prev ${p.previous_sha})\`` : '—');
              return `| ${p.name} | ${p.arch} | ${p.status} | ${sha} |`;
            }).join('\n');

            const body = [
              marker,
              `## Phase B-1 matrix build status — \`${status.release_tag}\``,
              '',
              `ABI v${status.abi_version}. **${built} built**, **${failed} failed**, ${total} total.`,
              `Publication: **${publication}**.`,
              '',
              '| Package | Arch | Status | Sha |',
              '| --- | --- | --- | --- |',
              rows,
              '',
              '<sub>Auto-generated; replaced on each push. Raw data in the `publish-status` workflow artifact.</sub>',
            ].join('\n');

            const issue_number = context.issue.number;
            const { owner, repo } = context.repo;

            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
              console.log(`Updated sticky comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
              console.log('Created new sticky comment');
            }
