name: Promote durable package generation

# Promote one exact PR-staging package closure into a content-addressed public
# prerelease that survives ordinary `pr-*-staging` cleanup. The read-only job
# executes the historical package-source xtask. The writer executes only
# current default-branch authority and independently revalidates the bundle.
on:
  workflow_dispatch:
    inputs:
      source-tag:
        description: 'Exact temporary source release, for example pr-1079-staging'
        required: true
        type: string
      package-source-sha:
        description: 'Full 40-character commit that produced every source archive'
        required: true
        type: string
      expected-abi:
        description: 'Kernel ABI carried by the package generation'
        required: true
        default: '42'
        type: string
      root-package:
        description: 'Program package whose exact dependency closure is promoted'
        required: true
        default: rootfs
        type: string
      arch:
        description: 'Target architecture for the selected closure'
        required: true
        default: wasm32
        type: string

permissions:
  contents: read

concurrency:
  group: durable-package-generation-${{ inputs.package-source-sha }}-${{ inputs.root-package }}-${{ inputs.arch }}
  cancel-in-progress: false

jobs:
  prepare:
    if: github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
    steps:
      - name: Checkout current publishing authority
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false
          path: authority

      - name: Checkout exact package source without credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.package-source-sha }}
          fetch-depth: 1
          persist-credentials: false
          path: package-source

      - name: Set up declared build tools
        uses: ./authority/.github/actions/setup-nix

      - name: Build the exact source identity tool
        working-directory: package-source
        run: |
          bash scripts/dev-shell.sh bash -c '
            set -euo pipefail
            host_target="$(rustc -vV | awk "/^host/ {print \$2}")"
            cargo build --release -p xtask \
              --target "$host_target" \
              --target-dir "$RUNNER_TEMP/package-source-target"
            printf "%s\n" \
              "$RUNNER_TEMP/package-source-target/$host_target/release/xtask" \
              > "$RUNNER_TEMP/source-xtask-path"
          '

      - name: Validate and prepare the content-addressed generation
        working-directory: authority
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PACKAGE_SOURCE_SHA: ${{ inputs.package-source-sha }}
          SOURCE_TAG: ${{ inputs.source-tag }}
          EXPECTED_ABI: ${{ inputs.expected-abi }}
          ROOT_PACKAGE: ${{ inputs.root-package }}
          TARGET_ARCH: ${{ inputs.arch }}
        run: |
          set -euo pipefail
          source_xtask="$(cat "$RUNNER_TEMP/source-xtask-path")"
          bash .github/scripts/prepare-durable-package-generation.sh \
            --source-tag "$SOURCE_TAG" \
            --package-source-root "$GITHUB_WORKSPACE/package-source" \
            --package-source-sha "$PACKAGE_SOURCE_SHA" \
            --expected-abi "$EXPECTED_ABI" \
            --root-package "$ROOT_PACKAGE" \
            --arch "$TARGET_ARCH" \
            --repository "$GITHUB_REPOSITORY" \
            --output-dir "$RUNNER_TEMP/package-generation" \
            --source-xtask "$source_xtask"
          echo "Prepared $(jq -r .tag "$RUNNER_TEMP/package-generation/generation.json")"

      - name: Transfer the inert generation bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: durable-package-generation-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/package-generation
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  publish:
    needs: [prepare]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - name: Checkout current publishing authority without persisted credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up declared build tools
        uses: ./.github/actions/setup-nix

      - name: Build current authority validator
        run: |
          bash scripts/dev-shell.sh bash -c '
            set -euo pipefail
            host_target="$(rustc -vV | awk "/^host/ {print \$2}")"
            cargo build --release -p xtask \
              --target "$host_target" \
              --target-dir "$RUNNER_TEMP/authority-target"
            printf "%s\n" \
              "$RUNNER_TEMP/authority-target/$host_target/release/xtask" \
              > "$RUNNER_TEMP/authority-xtask-path"
          '

      - name: Download the inert generation bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: durable-package-generation-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/package-generation

      - name: Revalidate, publish, and anonymously read back every asset
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          authority_xtask="$(cat "$RUNNER_TEMP/authority-xtask-path")"
          bash .github/scripts/publish-durable-package-generation.sh \
            --bundle "$RUNNER_TEMP/package-generation" \
            --authority-xtask "$authority_xtask" \
            --lock-root "$GITHUB_WORKSPACE" \
            --receipt "$RUNNER_TEMP/package-generation-receipt.json"
          tag="$(jq -r .tag "$RUNNER_TEMP/package-generation/generation.json")"
          {
            echo "## Durable package generation"
            echo
            echo "- Tag: \`$tag\`"
            echo "- Package source: \`${{ inputs.package-source-sha }}\`"
            echo "- Source staging release: \`${{ inputs.source-tag }}\`"
          } >>"$GITHUB_STEP_SUMMARY"

      - name: Retain the exact publication receipt
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: durable-package-generation-receipt-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/package-generation-receipt.json
          if-no-files-found: error
          retention-days: 30
