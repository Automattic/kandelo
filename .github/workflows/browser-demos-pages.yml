name: Deploy browser demos

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/browser-demos-pages.yml"
      - ".github/actions/fetch-submodules/**"
      - ".gitmodules"
      - "MANIFEST"
      - "apps/browser-demos/**"
      - "benchmarks/**"
      - "examples/**"
      - "host/package.json"
      - "host/package-lock.json"
      - "host/src/**"
      - "host/tsconfig.json"
      - "host/tsup.config.ts"
      - "web-libs/**"
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/**"
      - "flake.lock"
      - "flake.nix"
      - "libc/**"
      - "package.json"
      - "package-lock.json"
      - "packages/registry/**/package.toml"
      - "packages/registry/**/build.toml"
      - "programs/**"
      - "rust-toolchain.toml"
      - "images/rootfs/**"
      - "images/vfs/**"
      - "run.sh"
      - "scripts/build-musl.sh"
      - "scripts/build-programs.sh"
      - "scripts/build-rootfs.sh"
      - "scripts/dev-shell.sh"
      - "scripts/fetch-binaries.sh"
      - "scripts/install-overlay-headers.sh"
      - "scripts/install-local-binary.sh"
      - "scripts/resolve-binary.sh"
      - "sdk/**"
      - "tools/mkrootfs/**"
      - "tools/xtask/**"
  workflow_dispatch:

permissions:
  contents: write

env:
  # Exercise GitHub's post-Node-20 action runtime now, before it becomes
  # the runner default for actions that still declare node20.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Fetch musl submodule
        uses: ./.github/actions/fetch-submodules
        with:
          submodules: libc/musl

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            apps/browser-demos/package-lock.json
            host/package-lock.json

      - name: Install root dependencies
        run: npm ci --no-audit --no-fund

      - name: Install host dependencies
        working-directory: host
        run: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund

      - name: Install browser demo dependencies
        working-directory: apps/browser-demos
        run: npm ci --no-audit --no-fund

      - name: Typecheck host package
        working-directory: host
        run: npm run typecheck

      - name: Set up Nix
        uses: ./.github/actions/setup-nix

      - name: Prepare browser demo assets
        run: bash scripts/dev-shell.sh ./run.sh prepare-browser --allow-stale

      - name: Build browser demos for GitHub Pages
        working-directory: apps/browser-demos
        env:
          VITE_BASE: /kandelo/
          VITE_CORS_PROXY_URL: https://wordpress-playground-cors-proxy.net/?
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apps/browser-demos/dist
          keep_files: true
