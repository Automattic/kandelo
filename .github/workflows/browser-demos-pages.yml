name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/browser-demos-pages.yml"
      - ".github/actions/fetch-submodules/**"
      - ".gitmodules"
      - "MANIFEST"
      - "apps/browser-demos/**"
      - "benchmarks/**"
      - "docs-site/**"
      - "examples/**"
      - "host/package.json"
      - "host/package-lock.json"
      - "host/src/**"
      - "host/typedoc.json"
      - "host/tsconfig.json"
      - "host/tsconfig.docs.json"
      - "host/tsup.config.ts"
      - "web-libs/**"
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/**"
      - "flake.lock"
      - "flake.nix"
      - "libc/**"
      - "package.json"
      - "package-lock.json"
      - "packages/registry/**/package.toml"
      - "packages/registry/**/build.toml"
      - "programs/**"
      - "rust-toolchain.toml"
      - "images/rootfs/**"
      - "images/vfs/**"
      - "run.sh"
      - "scripts/build-musl.sh"
      - "scripts/build-programs.sh"
      - "scripts/build-rootfs.sh"
      - "scripts/check-pages-publish-size.mjs"
      - "scripts/check-pages-run-freshness.sh"
      - "scripts/ci-check-pages-deployment.sh"
      - "scripts/test-pages-deployment-contract.sh"
      - "scripts/test-pages-publish-size.sh"
      - "scripts/test-pages-run-freshness.sh"
      - "scripts/dev-shell.sh"
      - "scripts/fetch-binaries.sh"
      - "scripts/install-overlay-headers.sh"
      - "scripts/install-local-binary.sh"
      - "scripts/resolve-binary.sh"
      - "sdk/**"
      - "tools/mkrootfs/**"
      - "tools/xtask/**"
  workflow_dispatch:

concurrency:
  group: kandelo-gh-pages
  cancel-in-progress: true

permissions:
  actions: read
  contents: write

env:
  # Exercise GitHub's post-Node-20 action runtime now, before it becomes
  # the runner default for actions that still declare node20.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the source commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Fetch musl submodule
        uses: ./.github/actions/fetch-submodules
        with:
          submodules: libc/musl

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            apps/browser-demos/package-lock.json
            host/package-lock.json

      - name: Install root dependencies
        run: npm ci --no-audit --no-fund

      - name: Install host dependencies
        working-directory: host
        run: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund

      - name: Install browser demo dependencies
        working-directory: apps/browser-demos
        run: npm ci --no-audit --no-fund

      - name: Typecheck host package
        working-directory: host
        run: npm run typecheck

      - name: Set up Nix
        uses: ./.github/actions/setup-nix

      - name: Prepare browser demo assets
        run: bash scripts/dev-shell.sh ./run.sh prepare-browser --allow-stale

      - name: Build browser demos for GitHub Pages
        working-directory: apps/browser-demos
        env:
          VITE_BASE: /kandelo/
          VITE_CORS_PROXY_URL: https://wordpress-playground-cors-proxy.net/?
        run: npm run build

      # The root publisher replaces the complete branch so content-addressed
      # browser assets cannot accumulate forever. Include the independently
      # published documentation trees in that replacement.
      - name: Build user guide for the complete Pages tree
        env:
          VITEPRESS_BASE: /kandelo/guide/
        run: npm run docs:build

      - name: Typecheck API docs for the complete Pages tree
        working-directory: host
        run: npx tsc --noEmit -p tsconfig.docs.json

      - name: Build API docs for the complete Pages tree
        working-directory: host
        run: npx typedoc

      - name: Add documentation to the complete Pages tree
        run: |
          cp -R docs-site/.vitepress/dist apps/browser-demos/dist/guide
          cp -R host/docs apps/browser-demos/dist/api

      - name: Enforce the GitHub Pages published-site size limit
        run: node scripts/check-pages-publish-size.mjs apps/browser-demos/dist 1000000000

      # Concurrency removes the usual superseded run promptly, but GitHub does
      # not guarantee the order in which runs enter a concurrency group. Query
      # this workflow immediately before its only publishing step so a delayed
      # older run cannot overwrite the newest triggered complete-tree build.
      - name: Confirm this is the newest Pages run
        id: publish_freshness
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/check-pages-run-freshness.sh

      - name: Deploy to gh-pages
        if: steps.publish_freshness.outputs.publish == 'true'
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apps/browser-demos/dist
          force_orphan: true
