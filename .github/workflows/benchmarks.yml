name: Performance benchmarks

# Runs the full benchmark suite (Node + browser hosts) twice on the
# same runner — once on the PR HEAD, once on the PR base — and posts
# a sticky PR comment with the per-suite delta table.
#
# Self-comparing per PR: both sides run on the same runner back-to-back,
# so absolute noise floor matters less than the relative delta between
# sides. The compare/gate uses ±5% as the change-of-note threshold
# (matches benchmarks/compare.ts default).
#
# **Informational only**: the gate marks regressions in the comment but
# does NOT fail the job — `continue-on-error: true` is set on the
# compare steps. Shared-tenant `ubuntu-latest` jitter still shows up at
# 10–40% on small benchmarks even back-to-back, so a hard threshold
# would be flake-prone today. Reviewers eyeball the comment; future
# work can re-enable hard fails once we have either a beefier runner,
# more rounds + percentile-based gating, or both.
#
# Path-filtered: skipped for changes that can't plausibly affect runtime
# performance (docs, sdk tooling, browser-only demo HTML, CI config for
# unrelated workflows). Kernel/host/glue/binaries.lock changes always
# run.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'crates/kernel/**'
      - 'crates/shared/**'
      - 'crates/userspace/**'
      - 'host/src/**'
      - 'glue/**'
      - 'binaries.lock'
      - 'examples/libs/**'
      - 'benchmarks/**'
      - 'scripts/build-musl.sh'
      - 'scripts/build-libcxx.sh'
      - 'scripts/build-programs.sh'
      - 'scripts/fetch-binaries.sh'
      - 'flake.nix'
      - 'flake.lock'
      - '.github/workflows/benchmarks.yml'

concurrency:
  group: benchmarks-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  benchmarks:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
      pull-requests: write
    env:
      # CI-run suite shape:
      #   * syscall-io / process-lifecycle: kernel primitives — fast
      #     (well under a minute combined). Highest-value coverage for
      #     fork/exec/clone and IPC regressions.
      #   * php: standalone PHP startup + a small compute loop. Replaces
      #     wordpress in CI — isolates interpreter perf from framework
      #     so a regression here is attributable to PHP itself.
      #   * mariadb-* (wasm32 + wasm64, both engines): heavy native app
      #     coverage. Tractable now that the suite batches all queries
      #     into one mysqltest invocation (was ~50s × 4 calls per round
      #     just for spawn overhead — now ~50s once).
      #
      # Skipped in CI but still registered in benchmarks/run.ts'
      # SUITE_MODULES so they remain runnable locally and are easy to
      # re-enable:
      #   * wordpress — folded into php-standalone for CI; the WordPress
      #     suite is still useful for measuring framework-level deltas
      #     ad-hoc.
      #   * erlang-ring — needs the full OTP install tree
      #     (examples/libs/erlang/erlang-install/) which isn't shipped
      #     by package management today; would silently skip even if
      #     listed as expected.
      EXPECTED_SUITES: "syscall-io,process-lifecycle,php,mariadb-aria,mariadb-aria-64,mariadb-innodb,mariadb-innodb-64"
      SKIP_SUITES: "wordpress,erlang-ring"
      ROUNDS: "3"
      THRESHOLD: "5"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch submodules (musl)
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --depth 1 musl

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v18

      - name: Cache Nix store + flake eval
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Warm Nix dev shell
        run: nix develop --accept-flake-config --command true

      - name: Cache resolver + cargo target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/wasm-posix-kernel
            target
          key: benchmarks-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'examples/libs/**/deps.toml') }}
          restore-keys: |
            benchmarks-${{ runner.os }}-
            staging-build-${{ runner.os }}-

      - name: Cache musl sysroot + libc++
        uses: actions/cache@v4
        id: cache-sysroot
        with:
          path: |
            sysroot
            sysroot64
          key: musl-sysroot-v3-${{ runner.os }}-${{ hashFiles('scripts/build-musl.sh', 'scripts/build-libcxx.sh', 'musl-overlay/**', 'glue/**') }}

      - name: Build musl sysroot + libc++ (wasm32 + wasm64)
        if: steps.cache-sysroot.outputs.cache-hit != 'true'
        # Mirrors staging-build.yml.
        run: |
          nix develop --accept-flake-config --command bash scripts/build-musl.sh
          nix develop --accept-flake-config --command bash scripts/build-musl.sh --arch wasm64posix
          nix develop --accept-flake-config --command bash -c '
            src=""
            for cand in "$LLVM_PREFIX/include/c++/v1" "$LLVM_PREFIX/share/libc++/v1"; do
              if [ -f "$cand/__config" ] || [ -f "$cand/iostream" ]; then
                src="$cand"; break
              fi
            done
            if [ -z "$src" ]; then
              echo "ERROR: cannot locate libc++ headers under $LLVM_PREFIX" >&2
              exit 1
            fi
            for arch_dir in sysroot sysroot64; do
              if [ ! -f "$arch_dir/include/c++/v1/__config" ]; then
                mkdir -p "$arch_dir/include/c++/v1"
                cp -RL "$src"/* "$arch_dir/include/c++/v1/"
                chmod -R u+w "$arch_dir/include/c++/v1/"
                cs="$arch_dir/include/c++/v1/__config_site"
                if [ -f "$cs" ]; then
                  sed -i "s/_LIBCPP_HAS_MUSL_LIBC 0/_LIBCPP_HAS_MUSL_LIBC 1/" "$cs"
                  sed -i "s/_LIBCPP_HAS_THREAD_API_PTHREAD 0/_LIBCPP_HAS_THREAD_API_PTHREAD 1/" "$cs"
                fi
              fi
            done
          '
          nix develop --accept-flake-config --command bash scripts/build-libcxx.sh
          nix develop --accept-flake-config --command bash scripts/build-libcxx.sh --arch wasm64

      - name: Install Node deps + Playwright browser
        # host/ is what benchmarks import; examples/browser/ is what the
        # browser harness boots. Repo root pulls tsx for the runner and
        # owns the `playwright` dep that benchmarks/browser/run-browser.ts
        # imports — install browsers from there so the chromium-headless-shell
        # version matches the repo-root Playwright (host/ + examples/browser/
        # ship a slightly older @playwright/test which expects a different
        # browser build).
        run: |
          nix develop --accept-flake-config --command bash -c '
            npm install --no-audit --no-fund
            (cd host && npm install --no-audit --no-fund)
            (cd examples/browser && npm install --no-audit --no-fund)
            npx playwright install --with-deps chromium
          '

      # ---- AFTER side: PR HEAD ----
      - name: Build kernel + programs (after)
        run: |
          nix develop --accept-flake-config --command bash -c '
            cargo build --release -p wasm-posix-kernel \
              -Z build-std=core,alloc \
              -Z build-std-features=panic_immediate_abort
            mkdir -p local-binaries
            cp target/wasm64-unknown-unknown/release/wasm_posix_kernel.wasm \
              local-binaries/kernel.wasm
            bash scripts/build-programs.sh
          '

      - name: Fetch binaries (after — auto PR overlay)
        # fetch-binaries.sh auto-detects the PR via the GitHub API and
        # applies pr-<N>-staging overlay if present.
        run: |
          nix develop --accept-flake-config --command bash scripts/fetch-binaries.sh

      - name: Stage bench fixtures (after)
        # WordPress checkout + MariaDB bootstrap SQL — see script.
        # Only staged on the AFTER side: the fixtures land in untracked
        # paths (examples/wordpress/wordpress/, examples/libs/mariadb/share/mysql/),
        # so they survive the `git checkout $BASE` below and the BEFORE
        # side reuses them without needing the script to exist on base.
        run: |
          nix develop --accept-flake-config --command bash scripts/stage-bench-fixtures.sh

      - name: Run benchmarks — Node host (after)
        # Tolerate suite-level failures: run.ts already catches per-suite
        # errors and records empty metrics, but continue-on-error here
        # also covers infrastructure-level failures (a Playwright launch
        # crash, a wasm trap inside the harness) so the BEFORE side and
        # the comment still get to run.
        continue-on-error: true
        run: |
          nix develop --accept-flake-config --command \
            npx tsx benchmarks/run.ts --rounds=${{ env.ROUNDS }} --exclude=${{ env.SKIP_SUITES }} --host=node
          mv $(ls -t benchmarks/results/benchmark-node-*.json | head -1) /tmp/after-node.json

      - name: Run benchmarks — browser host (after)
        if: always()
        continue-on-error: true
        run: |
          nix develop --accept-flake-config --command \
            npx tsx benchmarks/run.ts --rounds=${{ env.ROUNDS }} --exclude=${{ env.SKIP_SUITES }} --host=browser
          mv $(ls -t benchmarks/results/benchmark-browser-*.json | head -1) /tmp/after-browser.json

      # ---- BEFORE side: PR base ----
      # All BEFORE-side steps use `if: always()` so a partial AFTER-side
      # failure (single suite throwing, browser harness flake, etc.) doesn't
      # prevent us from collecting baseline numbers. The gate then renders
      # whatever data each side managed to produce.
      - name: Reset to PR base
        if: always()
        # Hard reset working tree to the PR base SHA, then re-apply the
        # PR-HEAD benchmark harness on top.
        #
        # Why keep `benchmarks/` at HEAD: the benchmark suites are the
        # *measuring tool*, not the system under test. Reverting them
        # to base means BEFORE runs different code than AFTER, so the
        # comparison isn't apples-to-apples. Concretely, the previous
        # PR's wordpress.ts / mariadb.ts fixes (use packaged binaries
        # via tryResolveBinary) only ship on PR HEAD; BASE's suites
        # hard-code source-build paths that don't exist in CI, so they
        # silently skip and produce no BEFORE data for those suites.
        # Holding `benchmarks/` to HEAD on both sides keeps the harness
        # version pinned per-run.
        #
        # local-binaries/ + benchmarks/results/ are deleted to ensure
        # BEFORE rebuilds from base.
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          git checkout "$BASE"
          git checkout "$HEAD_SHA" -- benchmarks/
          git submodule update --init --depth 1 musl
          rm -rf local-binaries benchmarks/results

      - name: Build kernel + programs (before)
        if: always()
        run: |
          nix develop --accept-flake-config --command bash -c '
            cargo build --release -p wasm-posix-kernel \
              -Z build-std=core,alloc \
              -Z build-std-features=panic_immediate_abort
            mkdir -p local-binaries
            cp target/wasm64-unknown-unknown/release/wasm_posix_kernel.wasm \
              local-binaries/kernel.wasm
            bash scripts/build-programs.sh
          '

      - name: Fetch binaries (before — base lockfile, no overlay)
        if: always()
        # We are checked out at base SHA, so any PR-overlay auto-detection
        # via /commits/{sha}/pulls returns empty and fetch-binaries reads
        # base's binaries.lock alone. Delete a stale binaries.lock.pr from
        # the AFTER side so it can't be reused.
        run: |
          rm -f binaries.lock.pr
          nix develop --accept-flake-config --command bash scripts/fetch-binaries.sh

      - name: Run benchmarks — Node host (before)
        if: always()
        continue-on-error: true
        run: |
          nix develop --accept-flake-config --command \
            npx tsx benchmarks/run.ts --rounds=${{ env.ROUNDS }} --exclude=${{ env.SKIP_SUITES }} --host=node
          mv $(ls -t benchmarks/results/benchmark-node-*.json | head -1) /tmp/before-node.json

      - name: Run benchmarks — browser host (before)
        if: always()
        continue-on-error: true
        run: |
          nix develop --accept-flake-config --command \
            npx tsx benchmarks/run.ts --rounds=${{ env.ROUNDS }} --exclude=${{ env.SKIP_SUITES }} --host=browser
          mv $(ls -t benchmarks/results/benchmark-browser-*.json | head -1) /tmp/before-browser.json

      # ---- Compare and gate ----
      - name: Restore PR HEAD (for gate.ts source)
        if: always()
        run: git checkout "${{ github.event.pull_request.head.sha }}"

      - name: Compare and gate (Node)
        id: gate-node
        if: always()
        # Informational — see header comment. Non-zero exit from gate.ts
        # surfaces as ❌ in the comment without failing the job.
        continue-on-error: true
        run: |
          set -o pipefail
          nix develop --accept-flake-config --command \
            npx tsx benchmarks/gate.ts \
              --before /tmp/before-node.json \
              --after  /tmp/after-node.json \
              --expected "${{ env.EXPECTED_SUITES }}" \
              --threshold ${{ env.THRESHOLD }} \
              --label "Node host" \
            | tee /tmp/gate-node.md

      - name: Compare and gate (browser)
        if: always()
        id: gate-browser
        continue-on-error: true
        run: |
          set -o pipefail
          nix develop --accept-flake-config --command \
            npx tsx benchmarks/gate.ts \
              --before /tmp/before-browser.json \
              --after  /tmp/after-browser.json \
              --expected "${{ env.EXPECTED_SUITES }}" \
              --threshold ${{ env.THRESHOLD }} \
              --label "Browser host" \
            | tee /tmp/gate-browser.md

      - name: Assemble PR comment body
        if: always()
        id: comment
        # The sticky-pull-request-comment action's `message:` field is a
        # plain string, not a shell — there's no command substitution. So
        # we build the body in shell, write it to a file, then load it
        # into GITHUB_OUTPUT for the next step.
        run: |
          NODE_BODY=$(cat /tmp/gate-node.md 2>/dev/null || echo "_gate did not run_")
          BROWSER_BODY=$(cat /tmp/gate-browser.md 2>/dev/null || echo "_gate did not run_")
          NODE_MARK="${{ steps.gate-node.outcome == 'success' && '✅' || '❌' }}"
          BROWSER_MARK="${{ steps.gate-browser.outcome == 'success' && '✅' || '❌' }}"
          {
            echo "**Performance benchmarks** — \`${{ env.ROUNDS }}\` round(s), gating threshold ±${{ env.THRESHOLD }}%"
            echo
            echo "Both sides ran on the same \`ubuntu-latest\` runner back-to-back."
            echo
            echo "${NODE_MARK} **Node** &nbsp;&nbsp; ${BROWSER_MARK} **Browser**"
            echo
            echo "<details><summary>Node host results</summary>"
            echo
            echo "${NODE_BODY}"
            echo
            echo "</details>"
            echo
            echo "<details><summary>Browser host results</summary>"
            echo
            echo "${BROWSER_BODY}"
            echo
            echo "</details>"
          } > /tmp/comment.md
          {
            echo "body<<COMMENT_EOF"
            cat /tmp/comment.md
            echo "COMMENT_EOF"
          } >> $GITHUB_OUTPUT

      - name: Post sticky comment with results
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-benchmarks
          message: ${{ steps.comment.outputs.body }}
