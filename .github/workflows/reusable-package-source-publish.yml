name: Reusable Kandelo package source publish

on:
  workflow_call:
    inputs:
      kandelo-repository:
        type: string
        default: brandonpayton/kandelo
      kandelo-ref:
        type: string
        default: main
      packages:
        type: string
        default: all
      release-tag:
        type: string
        default: ""
      package-list:
        type: string
        default: packages.txt

permissions:
  contents: write

concurrency:
  group: kandelo-package-source-publish-${{ github.repository }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 1440
    steps:
      - name: Checkout package source
        uses: actions/checkout@v4
        with:
          path: package-source

      - name: Checkout Kandelo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.kandelo-repository }}
          ref: ${{ inputs.kandelo-ref }}
          path: kandelo
          submodules: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Cache Nix store + flake eval
        uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-gha-cache: false

      - name: Install Erlang/OTP for Erlang package builds
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28"

      - name: Fetch Kandelo musl submodule
        shell: bash
        run: |
          git -C kandelo config --global url."https://github.com/".insteadOf "git@github.com:"
          git -C kandelo submodule update --init --depth 1 musl

      - name: Cache Cargo and Kandelo sysroots
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            kandelo/target
            kandelo/sysroot
            kandelo/sysroot64
          key: kandelo-package-source-${{ runner.os }}-${{ hashFiles('kandelo/Cargo.lock', 'kandelo/scripts/build-musl.sh', 'kandelo/musl-overlay/**', 'kandelo/glue/**', 'kandelo/packages/registry/libcxx/**') }}
          restore-keys: |
            kandelo-package-source-${{ runner.os }}-

      - name: Warm Kandelo dev shell and sysroots
        shell: bash
        run: |
          cd kandelo
          bash scripts/dev-shell.sh true
          bash scripts/dev-shell.sh bash scripts/build-musl.sh
          bash scripts/dev-shell.sh bash scripts/build-musl.sh --arch wasm64posix

      - name: Install JavaScript build prerequisites
        shell: bash
        run: |
          cd kandelo
          bash scripts/dev-shell.sh bash -c '
            npm install --no-audit --no-fund
            cd host && npm install --no-audit --no-fund
            cd ../apps/browser-demos && npm install --no-audit --no-fund
          '

      - name: Build and publish selected packages
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          args=(
            --package-source-root "$GITHUB_WORKSPACE/package-source"
            --kandelo-root "$GITHUB_WORKSPACE/kandelo"
            --packages "${{ inputs.packages }}"
            --repo "${{ github.repository }}"
            --package-list "$GITHUB_WORKSPACE/package-source/${{ inputs.package-list }}"
          )
          if [ -n "${{ inputs.release-tag }}" ]; then
            args+=(--target-tag "${{ inputs.release-tag }}")
          fi
          cd "$GITHUB_WORKSPACE/kandelo"
          bash scripts/dev-shell.sh bash scripts/publish-package-source.sh "${args[@]}"
