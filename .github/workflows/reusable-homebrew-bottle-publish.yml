name: Reusable Kandelo Homebrew bottle publish

on:
  workflow_call:
    inputs:
      kandelo-repository:
        type: string
        default: Automattic/kandelo
      kandelo-ref:
        type: string
        default: main
      tap-repository:
        type: string
        default: kandelo-dev/homebrew-tap-core
      tap-name:
        type: string
        default: kandelo-dev/tap-core
      tap-ref:
        type: string
        default: main
      formulae:
        type: string
        required: true
      arches:
        type: string
        default: wasm32
      release-tag:
        type: string
        default: ""
      bottle-root-url:
        type: string
        default: ""
      expected-cache-keys:
        type: string
        default: ""
      force:
        type: boolean
        default: false
      dry-run:
        type: boolean
        default: false
      require-vfs-acceptance:
        type: boolean
        default: false
      prepublication-staging-tag:
        type: string
        default: ""
      prepublication-staging-kandelo-sha:
        type: string
        default: ""
      defer-vfs-acceptance-until-postpublication:
        type: boolean
        default: false

jobs:
  plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      formula-matrix: ${{ steps.matrix.outputs.formula-matrix }}
      abi: ${{ steps.release.outputs.abi }}
      release-tag: ${{ steps.release.outputs.release-tag }}
      bottle-root-prefix: ${{ steps.release.outputs.bottle-root-prefix }}
      kandelo-sha: ${{ steps.source-commits.outputs.kandelo-sha }}
      tap-sha: ${{ steps.source-commits.outputs.tap-sha }}
      core-dependency-tap-sha: ${{ steps.dependency-taps.outputs.core-tap-sha }}
      vfs-acceptance-formula: ${{ steps.vfs-acceptance.outputs.formula }}
    steps:
      - name: Validate caller trust boundary
        id: trust
        shell: bash
        env:
          CALLER_EVENT_NAME: ${{ github.event_name }}
          CALLER_REF: ${{ github.ref }}
          CALLER_REPOSITORY: ${{ github.repository }}
          CALLER_WORKFLOW_REF: ${{ github.workflow_ref }}
          DRY_RUN: ${{ inputs.dry-run }}
          KANDELO_REPOSITORY: ${{ inputs.kandelo-repository }}
          KANDELO_REF: ${{ inputs.kandelo-ref }}
          TAP_NAME: ${{ inputs.tap-name }}
          TAP_REPOSITORY: ${{ inputs.tap-repository }}
          TAP_REF: ${{ inputs.tap-ref }}
          BOTTLE_ROOT_URL: ${{ inputs.bottle-root-url }}
          REQUIRE_VFS_ACCEPTANCE: ${{ inputs.require-vfs-acceptance }}
          PREPUBLICATION_STAGING_TAG: ${{ inputs.prepublication-staging-tag }}
          PREPUBLICATION_STAGING_KANDELO_SHA: ${{ inputs.prepublication-staging-kandelo-sha }}
          DEFER_VFS_ACCEPTANCE: ${{ inputs.defer-vfs-acceptance-until-postpublication }}
        run: |
          set -euo pipefail
          normalize_dry_run_source_ref() {
            local label="$1"
            local ref="$2"

            if [[ "$ref" =~ ^[0-9a-f]{40}$ ]]; then
              printf '%s\n' "$ref"
              return 0
            fi
            if [ "${#ref}" -le 255 ] &&
               [[ "$ref" != refs/* ]] &&
               [[ "$ref" != -* ]] &&
               git check-ref-format "refs/heads/$ref" >/dev/null 2>&1; then
              printf 'refs/heads/%s\n' "$ref"
              return 0
            fi

            echo "::error::dry-run $label ref must be a branch name or exact lowercase 40-character commit SHA" >&2
            return 2
          }

          normalize_write_kandelo_ref() {
            local ref="$1"

            if [ "$ref" = "main" ]; then
              printf 'refs/heads/main\n'
              return 0
            fi
            if [[ "$ref" =~ ^[0-9a-f]{40}$ ]]; then
              # WHY: a new ABI needs bottles before its bottle-backed shell can
              # validate and merge. The protected tap caller must hardcode this
              # reviewed SHA, and the Kandelo merge must preserve it as an
              # ancestor of main; accepting a branch would make executable
              # publication input mutable between review and checkout.
              printf '%s\n' "$ref"
              return 0
            fi

            echo "::error::write publication requires Kandelo main or an exact reviewed lowercase 40-character commit SHA" >&2
            return 2
          }

          normalize_write_tap_ref() {
            local ref="$1"

            if [[ "$ref" =~ ^[0-9a-f]{40}$ ]]; then
              # WHY: repository_dispatch can be admitted while main is at one
              # commit but instantiated after another publication advances it.
              # The dispatch payload therefore owns the immutable source
              # selection; the workflow execution SHA is not a substitute.
              printf '%s\n' "$ref"
              return 0
            fi

            echo "::error::write publication requires an exact reviewed lowercase 40-character tap commit SHA" >&2
            return 2
          }

          normalized_caller_repository="$(printf '%s' "$CALLER_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          normalized_tap_repository="$(printf '%s' "$TAP_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          normalized_tap_name="$(printf '%s' "$TAP_NAME" | tr '[:upper:]' '[:lower:]')"
          [ "$normalized_caller_repository" = "$normalized_tap_repository" ] || {
            echo "::error::the caller repository must own the target tap repository"; exit 2;
          }
          [ "$CALLER_REF" = "refs/heads/main" ] || {
            echo "::error::publication requires the tap main branch"; exit 2;
          }
          [ "$CALLER_EVENT_NAME" = "repository_dispatch" ] || {
            echo "::error::publication requires the reviewed repository_dispatch caller"; exit 2;
          }
          [ -z "$BOTTLE_ROOT_URL" ] || {
            echo "::error::the publisher derives the bottle root from the tap repository"; exit 2;
          }
          [ "$KANDELO_REPOSITORY" = "Automattic/kandelo" ] || {
            echo "::error::publication requires Automattic/kandelo"; exit 2;
          }
          case "$REQUIRE_VFS_ACCEPTANCE" in
            true|false) ;;
            *) echo "::error::require-vfs-acceptance must be true or false"; exit 2 ;;
          esac
          case "$DEFER_VFS_ACCEPTANCE" in
            true|false) ;;
            *) echo "::error::defer-vfs-acceptance-until-postpublication must be true or false"; exit 2 ;;
          esac
          if [ -n "$PREPUBLICATION_STAGING_TAG" ] ||
             [ -n "$PREPUBLICATION_STAGING_KANDELO_SHA" ]; then
            [[ "$PREPUBLICATION_STAGING_TAG" =~ ^pr-[1-9][0-9]*-staging$ ]] || {
              echo "::error::prepublication-staging-tag must be pr-N-staging"; exit 2;
            }
            [[ "$PREPUBLICATION_STAGING_KANDELO_SHA" =~ ^[0-9a-f]{40}$ ]] || {
              echo "::error::prepublication-staging-kandelo-sha must be an exact lowercase commit SHA"; exit 2;
            }
            [ -n "$PREPUBLICATION_STAGING_TAG" ] &&
              [ -n "$PREPUBLICATION_STAGING_KANDELO_SHA" ] || {
              echo "::error::prepublication staging tag and Kandelo SHA must be supplied together"; exit 2;
            }
            [ "$DRY_RUN" = "false" ] || {
              echo "::error::prepublication package generation is restricted to write publication"; exit 2;
            }
            [[ "$KANDELO_REF" =~ ^[0-9a-f]{40}$ ]] || {
              echo "::error::prepublication package generation requires an exact reviewed Kandelo commit"; exit 2;
            }
          fi
          if [ "$DEFER_VFS_ACCEPTANCE" = "true" ]; then
            [ -n "$PREPUBLICATION_STAGING_TAG" ] &&
              [ "$REQUIRE_VFS_ACCEPTANCE" = "true" ] || {
              echo "::error::VFS acceptance may be deferred only for a required sealed prepublication generation"; exit 2;
            }
          fi
          [[ "$normalized_tap_repository" =~ ^[a-z0-9_.-]+/homebrew-[a-z0-9_.-]+$ ]] || {
            echo "::error::tap repositories must use owner/homebrew-name"; exit 2;
          }
          tap_owner="${normalized_tap_repository%%/*}"
          tap_short_name="${normalized_tap_repository#*/homebrew-}"
          [ "$normalized_tap_name" = "${tap_owner}/${tap_short_name}" ] || {
            echo "::error::tap-name must be owner/name derived from the conventional repository"; exit 2;
          }
          if [ "$DRY_RUN" = "true" ]; then
            [ "$CALLER_WORKFLOW_REF" = "$CALLER_REPOSITORY/.github/workflows/dry-run-bottles.yml@refs/heads/main" ] || {
              echo "::error::dry-run publication requires the reviewed tap dry-run workflow"; exit 2;
            }
            validated_kandelo_ref="$(normalize_dry_run_source_ref "Kandelo" "$KANDELO_REF")"
            validated_tap_ref="$(normalize_dry_run_source_ref "tap" "$TAP_REF")"
          else
            case "$CALLER_WORKFLOW_REF" in
              "$CALLER_REPOSITORY/.github/workflows/publish-bottles.yml@refs/heads/main"|\
              "$CALLER_REPOSITORY/.github/workflows/maintain-bottles.yml@refs/heads/main") ;;
              *) echo "::error::publication requires a reviewed tap write workflow"; exit 2 ;;
            esac
            validated_kandelo_ref="$(normalize_write_kandelo_ref "$KANDELO_REF")"
            validated_tap_ref="$(normalize_write_tap_ref "$TAP_REF")"
          fi
          {
            echo "kandelo-ref=$validated_kandelo_ref"
            echo "tap-ref=$validated_tap_ref"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout Kandelo workflow source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ inputs.kandelo-repository }}
          ref: ${{ steps.trust.outputs.kandelo-ref }}
          path: kandelo
          submodules: false

      - name: Checkout exact prepublication package generation
        if: ${{ inputs.prepublication-staging-tag != '' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ inputs.kandelo-repository }}
          ref: ${{ inputs.prepublication-staging-kandelo-sha }}
          path: kandelo-generation
          submodules: false

      - name: Checkout tap
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ inputs.tap-repository }}
          ref: ${{ steps.trust.outputs.tap-ref }}
          path: tap

      - name: Resolve source commits
        id: source-commits
        shell: bash
        run: |
          set -euo pipefail
          kandelo_sha="$(git -C kandelo rev-parse HEAD)"
          tap_sha="$(git -C tap rev-parse HEAD)"
          [[ "$kandelo_sha" =~ ^[0-9a-f]{40}$ ]] || {
            echo "::error::Kandelo checkout did not resolve to a commit SHA"; exit 2;
          }
          [[ "$tap_sha" =~ ^[0-9a-f]{40}$ ]] || {
            echo "::error::tap checkout did not resolve to a commit SHA"; exit 2;
          }
          {
            echo "kandelo-sha=$kandelo_sha"
            echo "tap-sha=$tap_sha"
          } >> "$GITHUB_OUTPUT"

      - name: Bind write tap source to protected main history
        if: ${{ !inputs.dry-run }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_TAP_SHA: ${{ inputs.tap-ref }}
          TAP_REPOSITORY: ${{ inputs.tap-repository }}
          TAP_SHA: ${{ steps.source-commits.outputs.tap-sha }}
        run: |
          set -euo pipefail
          [ "$TAP_SHA" = "$REQUESTED_TAP_SHA" ] || {
            echo "::error::tap checkout differs from the exact requested source commit"; exit 2;
          }
          if ! compare_status="$(gh api \
              "/repos/$TAP_REPOSITORY/compare/$TAP_SHA...main" \
              --jq .status)"; then
            echo "::error::could not prove that the requested tap commit belongs to protected main"
            exit 1
          fi
          case "$compare_status" in
            ahead|identical) ;;
            # WHY: an older requested source is safe only while it remains an
            # ancestor of protected main. Descendant, detached, and
            # force-pushed sources have not passed that branch's review path.
            *) echo "::error::requested tap commit must remain on protected main history"; exit 1 ;;
          esac

      - name: Bind prepublication generation to the workflow descendant
        if: ${{ inputs.prepublication-staging-tag != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          KANDELO_REPOSITORY: ${{ inputs.kandelo-repository }}
          KANDELO_SHA: ${{ steps.source-commits.outputs.kandelo-sha }}
          GENERATION_SHA: ${{ inputs.prepublication-staging-kandelo-sha }}
        run: |
          set -euo pipefail
          [ "$(git -C kandelo-generation rev-parse HEAD)" = "$GENERATION_SHA" ] || {
            echo "::error::prepublication generation checkout differs from its exact SHA"; exit 2;
          }
          compare_status="$(gh api \
            "/repos/$KANDELO_REPOSITORY/compare/$GENERATION_SHA...$KANDELO_SHA" \
            --jq .status)"
          case "$compare_status" in
            ahead|identical) ;;
            *) echo "::error::publishing workflow commit must descend from the staged package generation"; exit 1 ;;
          esac

      - name: Validate committed dependency tap lock
        id: dependency-taps
        shell: bash
        env:
          TAP_NAME: ${{ inputs.tap-name }}
          TAP_REPOSITORY: ${{ inputs.tap-repository }}
        run: |
          set -euo pipefail
          lock="$RUNNER_TEMP/homebrew-dependency-taps.json"
          python3 kandelo/scripts/homebrew-dependency-taps.py validate \
            --tap-root "$GITHUB_WORKSPACE/tap" \
            --tap-name "$TAP_NAME" \
            --tap-repository "$TAP_REPOSITORY" \
            --out "$lock"
          core_sha="$(jq -r '
            [.taps[] | select(.tap_name == "kandelo-dev/tap-core") | .tap_commit] |
            if length == 0 then "" elif length == 1 then .[0] else error("duplicate core tap") end
          ' "$lock")"
          echo "core-tap-sha=$core_sha" >> "$GITHUB_OUTPUT"

      - name: Checkout exact public core dependency tap
        if: ${{ steps.dependency-taps.outputs.core-tap-sha != '' }}
        shell: bash
        env:
          CORE_TAP_SHA: ${{ steps.dependency-taps.outputs.core-tap-sha }}
        run: |
          /usr/bin/bash kandelo/scripts/homebrew-checkout-public-tap.sh \
            kandelo-dev/homebrew-tap-core "$CORE_TAP_SHA" \
            "$GITHUB_WORKSPACE/dependency-taps/core"

      - name: Verify immutable dependency tap checkouts
        shell: bash
        env:
          CORE_TAP_SHA: ${{ steps.dependency-taps.outputs.core-tap-sha }}
          TAP_NAME: ${{ inputs.tap-name }}
          TAP_REPOSITORY: ${{ inputs.tap-repository }}
          TAP_SHA: ${{ steps.source-commits.outputs.tap-sha }}
        run: |
          set -euo pipefail
          dependency_args=()
          if [ -n "$CORE_TAP_SHA" ]; then
            dependency_args+=(--dependency-root \
              "kandelo-dev/tap-core=$GITHUB_WORKSPACE/dependency-taps/core")
          fi
          python3 kandelo/scripts/homebrew-dependency-taps.py resolve \
            --tap-root "$GITHUB_WORKSPACE/tap" \
            --tap-name "$TAP_NAME" \
            --tap-repository "$TAP_REPOSITORY" \
            --tap-commit "$TAP_SHA" \
            "${dependency_args[@]}" \
            --out "$RUNNER_TEMP/homebrew-resolved-taps.json"

      - name: Resolve release and bottle root
        id: release
        shell: bash
        env:
          REQUESTED_BOTTLE_ROOT_URL: ${{ inputs.bottle-root-url }}
          REQUESTED_RELEASE_TAG: ${{ inputs.release-tag }}
          TAP_NAME: ${{ inputs.tap-name }}
          TAP_REPOSITORY: ${{ inputs.tap-repository }}
        run: |
          set -euo pipefail
          abi=$(sed -nE 's/^pub const ABI_VERSION: u32 = ([0-9]+);$/\1/p' kandelo/crates/shared/src/lib.rs | head -n1)
          if [ -z "$abi" ]; then
            echo "::error::could not read ABI_VERSION"
            exit 2
          fi
          expected_release_tag="bottles-abi-v${abi}"
          release_tag="${REQUESTED_RELEASE_TAG:-$expected_release_tag}"
          if [ "$release_tag" != "$expected_release_tag" ]; then
            echo "::error::release-tag $release_tag does not match resolved Kandelo ABI $abi"
            exit 2
          fi
          root_prefix="$REQUESTED_BOTTLE_ROOT_URL"
          if [ -z "$root_prefix" ]; then
            # Keep Homebrew's owner/name package identity while using the exact
            # public owner/homebrew-name repository as the GHCR namespace.
            # shellcheck source=/dev/null
            . kandelo/scripts/homebrew-tap-identity.sh
            root_prefix="$(homebrew_bottle_root_url "$TAP_REPOSITORY" "$TAP_NAME")"
          fi
          {
            echo "abi=$abi"
            echo "release-tag=$release_tag"
            echo "bottle-root-prefix=$root_prefix"
          } >> "$GITHUB_OUTPUT"

      - name: Install Nix for prepublication generation validation
        if: ${{ inputs.prepublication-staging-tag != '' }}
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          github-token: ""

      - name: Build prepublication index tooling without credentials
        if: ${{ inputs.prepublication-staging-tag != '' }}
        id: prepublication-tooling
        shell: bash
        run: |
          set -euo pipefail
          host_target="$(
            cd kandelo
            env -u GH_TOKEN -u GITHUB_TOKEN \
              -u HOMEBREW_GITHUB_API_TOKEN \
              -u HOMEBREW_GITHUB_PACKAGES_TOKEN \
              -u HOMEBREW_DOCKER_REGISTRY_TOKEN \
              bash scripts/dev-shell.sh rustc -vV |
              sed -n 's/^host: //p'
          )"
          [[ "$host_target" =~ ^[a-z0-9_]+(-[a-z0-9_.]+){2,}$ ]] || {
            echo "::error::unable to resolve the prepublication tooling host target"; exit 2;
          }
          (
            cd kandelo
            env -u GH_TOKEN -u GITHUB_TOKEN \
              -u HOMEBREW_GITHUB_API_TOKEN \
              -u HOMEBREW_GITHUB_PACKAGES_TOKEN \
              -u HOMEBREW_DOCKER_REGISTRY_TOKEN \
              bash scripts/dev-shell.sh \
                cargo build --release -p xtask --target "$host_target"
          )
          echo "host-target=$host_target" >>"$GITHUB_OUTPUT"

      - name: Freeze exact prepublication package generation
        if: ${{ inputs.prepublication-staging-tag != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          HOST_TARGET: ${{ steps.prepublication-tooling.outputs.host-target }}
          KANDELO_ABI: ${{ steps.release.outputs.abi }}
          KANDELO_SHA: ${{ steps.source-commits.outputs.kandelo-sha }}
          GENERATION_SHA: ${{ inputs.prepublication-staging-kandelo-sha }}
          STAGING_TAG: ${{ inputs.prepublication-staging-tag }}
        run: |
          set -euo pipefail
          [[ "$HOST_TARGET" =~ ^[a-z0-9_]+(-[a-z0-9_.]+){2,}$ ]] || {
            echo "::error::invalid prepublication tooling host target"; exit 2;
          }
          bash kandelo/.github/scripts/freeze-homebrew-prepublication-generation.sh \
            --tag "$STAGING_TAG" \
            --generation-root "$GITHUB_WORKSPACE/kandelo-generation" \
            --consumer-root "$GITHUB_WORKSPACE/kandelo" \
            --expected-abi "$KANDELO_ABI" \
            --generation-sha "$GENERATION_SHA" \
            --consumer-sha "$KANDELO_SHA" \
            --repository Automattic/kandelo \
            --output-dir "$RUNNER_TEMP/homebrew-prepublication-generation" \
            --xtask "$GITHUB_WORKSPACE/kandelo/target/$HOST_TARGET/release/xtask"

      - name: Upload sealed prepublication package generation
        if: ${{ inputs.prepublication-staging-tag != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: homebrew-prepublication-generation-${{ github.run_id }}-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/homebrew-prepublication-generation
          compression-level: 0
          if-no-files-found: error
          retention-days: 2

      - name: Plan formula matrix
        id: matrix
        shell: bash
        env:
          ARCHES: ${{ inputs.arches }}
          EXPECTED_ABI: ${{ steps.release.outputs.abi }}
          EXPECTED_BOTTLE_ROOT_URL: ${{ steps.release.outputs.bottle-root-prefix }}
          EXPECTED_CACHE_KEYS_JSON: ${{ inputs.expected-cache-keys }}
          FORCE_REBUILD: ${{ inputs.force }}
          FORMULAE: ${{ inputs.formulae }}
        run: |
          set -euo pipefail
          expected_args=()
          if [ -n "$EXPECTED_CACHE_KEYS_JSON" ]; then
            expected_file="$RUNNER_TEMP/homebrew-expected-cache-keys.json"
            printf '%s\n' "$EXPECTED_CACHE_KEYS_JSON" >"$expected_file"
            jq empty "$expected_file"
            expected_args+=(--expected-cache-keys "$expected_file")
            expected_args+=(--expected-abi "$EXPECTED_ABI")
            expected_args+=(--expected-bottle-root-url "$EXPECTED_BOTTLE_ROOT_URL")
          fi
          if [ "$FORCE_REBUILD" = "true" ]; then
            expected_args+=(--force)
          fi
          matrix="$(bash kandelo/scripts/homebrew-plan-matrix.sh \
            --tap-root "$GITHUB_WORKSPACE/tap" \
            --formulae "$FORMULAE" \
            --arches "$ARCHES" \
            "${expected_args[@]}")"
          formula_matrix="$(jq -c 'map({formula}) | unique_by(.formula)' <<<"$matrix")"
          {
            echo "matrix=$matrix"
            echo "formula-matrix=$formula_matrix"
          } >> "$GITHUB_OUTPUT"
          echo "$matrix" | jq .

      - name: Validate dependency-bearing VFS acceptance selection
        id: vfs-acceptance
        shell: bash
        env:
          DRY_RUN: ${{ inputs.dry-run }}
          PLANNED_MATRIX: ${{ steps.matrix.outputs.matrix }}
          REQUIRE_VFS_ACCEPTANCE: ${{ inputs.require-vfs-acceptance }}
          DEFER_VFS_ACCEPTANCE: ${{ inputs.defer-vfs-acceptance-until-postpublication }}
          TAP_NAME: ${{ inputs.tap-name }}
        run: |
          set -euo pipefail
          case "$REQUIRE_VFS_ACCEPTANCE" in
            true|false) ;;
            *) echo "::error::require-vfs-acceptance must be true or false"; exit 2 ;;
          esac

          tap_root="$(realpath "$GITHUB_WORKSPACE/tap")"
          policy_dir="$GITHUB_WORKSPACE/tap/Kandelo"
          if [ -L "$policy_dir" ] || { [ -e "$policy_dir" ] && [ ! -d "$policy_dir" ]; }; then
            echo "::error::tap Kandelo policy path must be a real directory"; exit 2
          fi
          config_candidate="$policy_dir/vfs-acceptance.json"
          if [ ! -e "$config_candidate" ] && [ ! -L "$config_candidate" ]; then
            if [ "$REQUIRE_VFS_ACCEPTANCE" = "true" ]; then
              echo "::error::this invocation requires dependency-bearing VFS acceptance, but the tap has no Kandelo/vfs-acceptance.json"
              exit 1
            fi
            echo "::notice::tap has no dependency-bearing VFS acceptance selection; this invocation will produce no closure acceptance evidence"
            exit 0
          fi
          [ -f "$config_candidate" ] && [ ! -L "$config_candidate" ] || {
            echo "::error::tap VFS acceptance configuration must be a regular non-symlink file"; exit 2;
          }
          config="$(realpath "$config_candidate")"
          case "$config" in
            "$tap_root"/*) ;;
            *) echo "::error::tap VFS acceptance configuration resolved outside the exact tap checkout"; exit 2 ;;
          esac
          jq -e '
            type == "object" and
            (
              (.schema == 1 and
                keys == ["argv", "brewfile", "executable", "expected_stdout", "formula", "schema"]) or
              (.schema == 2 and
                keys == ["argv", "brewfile", "executable", "expected_stdout", "formula", "schema", "shell_config"] and
                (.shell_config | type == "string" and length > 0 and length <= 255))
            ) and
            (.formula | type == "string" and test("^[a-z0-9][a-z0-9._-]*$")) and
            (.brewfile | type == "string" and length > 0 and length <= 255) and
            (.executable | type == "string" and test("^/([A-Za-z0-9._@%+=:-]+/)*[A-Za-z0-9._@%+=:-]+$")) and
            (.argv | type == "array" and length > 0 and length <= 64 and all(.[];
              type == "string" and length > 0 and length <= 4096 and contains("\u0000") == false) and
              (tojson | utf8bytelength <= 16384)) and
            (.expected_stdout | type == "string" and length > 0 and length <= 4096 and
              contains("\u0000") == false and contains("\u000a") == false and
              contains("\u000d") == false)
          ' "$config" >/dev/null || {
            echo "::error::tap VFS acceptance configuration is invalid"; exit 2;
          }

          selected_formula="$(jq -er '.formula' "$config")"
          formula_candidate="$GITHUB_WORKSPACE/tap/Formula/${selected_formula}.rb"
          [ -f "$formula_candidate" ] && [ ! -L "$formula_candidate" ] || {
            echo "::error::selected VFS acceptance formula is not a regular tap Formula: $selected_formula"; exit 2;
          }
          formula_source="$(realpath "$formula_candidate")"
          case "$formula_source" in
            "$tap_root"/*) ;;
            *) echo "::error::selected VFS acceptance Formula resolved outside the exact tap checkout"; exit 2 ;;
          esac
          brewfile_rel="$(jq -er '.brewfile' "$config")"
          case "$brewfile_rel" in
            /*|../*|*/../*|*/..) echo "::error::Brewfile path escapes the tap"; exit 2 ;;
          esac
          brewfile_candidate="$GITHUB_WORKSPACE/tap/$brewfile_rel"
          [ -f "$brewfile_candidate" ] && [ ! -L "$brewfile_candidate" ] || {
            echo "::error::tap VFS acceptance Brewfile must be a regular non-symlink file"; exit 2;
          }
          brewfile="$(realpath "$brewfile_candidate")"
          case "$brewfile" in
            "$tap_root"/*) ;;
            *) echo "::error::Brewfile resolved outside the exact tap checkout"; exit 2 ;;
          esac
          if [ "$(jq -r '.schema' "$config")" = "2" ]; then
            shell_config_rel="$(jq -er '.shell_config' "$config")"
            case "$shell_config_rel" in
              /*|../*|*/../*|*/..) echo "::error::default-shell config path escapes the tap"; exit 2 ;;
            esac
            shell_config_candidate="$GITHUB_WORKSPACE/tap/$shell_config_rel"
            [ -f "$shell_config_candidate" ] && [ ! -L "$shell_config_candidate" ] || {
              echo "::error::tap default-shell config must be a regular non-symlink file"; exit 2;
            }
            shell_config="$(realpath "$shell_config_candidate")"
            case "$shell_config" in
              "$tap_root"/*) ;;
              *) echo "::error::default-shell config resolved outside the exact tap checkout"; exit 2 ;;
            esac
            shell_config_bytes="$(wc -c <"$shell_config" | tr -d '[:space:]')"
            if [ "$shell_config_bytes" -le 0 ] || [ "$shell_config_bytes" -gt 65536 ]; then
              echo "::error::default-shell config must contain 1 to 65536 bytes"; exit 2
            fi
            jq -e '
              type == "object" and keys == ["argv", "path", "version"] and
              .version == 1 and
              (.path | type == "string" and
                test("^/home/linuxbrew/\\.linuxbrew/(bin|sbin)/[A-Za-z0-9._@%+=:-]+$") and
                utf8bytelength <= 4096) and
              (.argv | type == "array" and length > 0 and length <= 64 and
                all(.[]; type == "string" and length > 0 and
                  utf8bytelength <= 4096 and contains("\u0000") == false) and
                (.[0] | test("^[A-Za-z0-9][A-Za-z0-9._@%+=:-]*$")) and
                (tojson | utf8bytelength <= 65536))
            ' "$shell_config" >/dev/null || {
              echo "::error::tap default-shell config is invalid"; exit 2;
            }
          fi
          selection="$(ruby kandelo/scripts/homebrew-brewfile-selection.rb "$brewfile")"
          expected_tap="$(printf '%s' "$TAP_NAME" | tr '[:upper:]' '[:lower:]')"
          jq -e --arg formula "$selected_formula" --arg tap "$expected_tap" \
            '.tap_name == $tap and (.packages | index($formula) != null)' \
            <<<"$selection" >/dev/null || {
            echo "::error::acceptance Brewfile must name the selected tap and Formula root"; exit 2;
          }

          target_planned="$(jq -r --arg formula "$selected_formula" \
            'any(.[]; .formula == $formula and .arch == "wasm32")' <<<"$PLANNED_MATRIX")"
          if [ "$REQUIRE_VFS_ACCEPTANCE" = "true" ]; then
            [ "$DRY_RUN" = "false" ] || {
              echo "::error::required dependency-bearing VFS acceptance needs a non-dry-run publication"; exit 1;
            }
            [ "$target_planned" = "true" ] || {
              echo "::error::required dependency-bearing VFS acceptance target ${selected_formula}/wasm32 is absent from the planned matrix; include it and use force when its bottle is already current"
              exit 1
            }
            if [ "$DEFER_VFS_ACCEPTANCE" = "true" ]; then
              # WHY: this bootstrap publishes the bottles needed to construct
              # the acceptance VFS itself. Keep the missing proof explicit so
              # a postpublication invocation must close the cycle.
              echo "::notice::dependency-bearing VFS acceptance is explicitly deferred until the sealed generation is canonical"
            fi
          elif [ "$DRY_RUN" = "true" ] || [ "$target_planned" != "true" ]; then
            echo "::notice::this invocation will produce no dependency-bearing VFS acceptance evidence"
          fi
          echo "formula=$selected_formula" >> "$GITHUB_OUTPUT"

  build-and-test:
    needs: [plan]
    if: ${{ needs.plan.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 1440
    permissions:
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout Kandelo workflow source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ inputs.kandelo-repository }}
          ref: ${{ needs.plan.outputs.kandelo-sha }}
          path: kandelo
          submodules: false

      - name: Checkout tap
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ inputs.tap-repository }}
          ref: ${{ needs.plan.outputs.tap-sha }}
          path: tap

      - name: Checkout exact public core dependency tap for build
        if: ${{ needs.plan.outputs.core-dependency-tap-sha != '' }}
        shell: bash
        env:
          CORE_TAP_SHA: ${{ needs.plan.outputs.core-dependency-tap-sha }}
        run: |
          /usr/bin/bash kandelo/scripts/homebrew-checkout-public-tap.sh \
            kandelo-dev/homebrew-tap-core "$CORE_TAP_SHA" \
            "$GITHUB_WORKSPACE/dependency-taps/core"

      - name: Verify source snapshots
        shell: bash
        env:
          KANDELO_SHA: ${{ needs.plan.outputs.kandelo-sha }}
          TAP_SHA: ${{ needs.plan.outputs.tap-sha }}
        run: |
          set -euo pipefail
          [[ "$KANDELO_SHA" =~ ^[0-9a-f]{40}$ ]] || {
            echo "::error::invalid planned Kandelo commit"; exit 2;
          }
          [[ "$TAP_SHA" =~ ^[0-9a-f]{40}$ ]] || {
            echo "::error::invalid planned tap commit"; exit 2;
          }
          [ "$(git -C kandelo rev-parse HEAD)" = "$KANDELO_SHA" ] || {
            echo "::error::Kandelo build checkout differs from the validated plan"; exit 2;
          }
          [ "$(git -C tap rev-parse HEAD)" = "$TAP_SHA" ] || {
            echo "::error::tap build checkout differs from the validated plan"; exit 2;
          }

      - name: Materialize immutable dependency tap map for build
        shell: bash
        env:
          CORE_TAP_SHA: ${{ needs.plan.outputs.core-dependency-tap-sha }}
          TAP_NAME: ${{ inputs.tap-name }}
          TAP_REPOSITORY: ${{ inputs.tap-repository }}
          TAP_SHA: ${{ needs.plan.outputs.tap-sha }}
        run: |
          set -euo pipefail
          resolved="$RUNNER_TEMP/homebrew-resolved-taps.json"
          dependency_args=()
          if [ -n "$CORE_TAP_SHA" ]; then
            dependency_args+=(--dependency-root \
              "kandelo-dev/tap-core=$GITHUB_WORKSPACE/dependency-taps/core")
          fi
          python3 kandelo/scripts/homebrew-dependency-taps.py resolve \
            --tap-root "$GITHUB_WORKSPACE/tap" \
            --tap-name "$TAP_NAME" \
            --tap-repository "$TAP_REPOSITORY" \
            --tap-commit "$TAP_SHA" \
            "${dependency_args[@]}" \
            --out "$resolved"
          echo "KANDELO_HOMEBREW_RESOLVED_TAPS_FILE=$resolved" >> "$GITHUB_ENV"

      - name: Checkout reviewed Homebrew implementation
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: Homebrew/brew
          ref: 34c40c18ffa2029b611b61c73273e32c003d0842
          path: homebrew-prefix/Homebrew

      - name: Activate reviewed Homebrew implementation
        shell: bash
        env:
          ARCH: ${{ matrix.arch }}
          FORMULA: ${{ matrix.formula }}
          HOMEBREW_BREW_COMMIT: 34c40c18ffa2029b611b61c73273e32c003d0842
        run: |
          set -euo pipefail
          [[ "$HOMEBREW_BREW_COMMIT" =~ ^[0-9a-f]{40}$ ]] || {
            echo "::error::invalid pinned Homebrew commit"; exit 2;
          }
          brew_prefix="/home/linuxbrew/.linuxbrew"
          brew_repository="$GITHUB_WORKSPACE/homebrew-prefix/Homebrew"
          [ "$(git -C "$brew_repository" rev-parse HEAD)" = "$HOMEBREW_BREW_COMMIT" ] || {
            echo "::error::Homebrew checkout differs from the reviewed commit"; exit 2;
          }
          [ -z "$(git -C "$brew_repository" status --short --untracked-files=no)" ] || {
            echo "::error::reviewed Homebrew checkout has tracked modifications"; exit 2;
          }
          mkdir -p "$brew_prefix/bin"
          rm -f "$brew_prefix/bin/brew"
          ln -s "$brew_repository/bin/brew" "$brew_prefix/bin/brew"
          brew_bin="$brew_prefix/bin/brew"
          [ "$(readlink -f "$brew_bin")" = "$brew_repository/bin/brew" ] || {
            echo "::error::Homebrew executable does not resolve into the reviewed checkout"; exit 2;
          }
          homebrew_cache="$RUNNER_TEMP/homebrew-cache-${FORMULA}-${ARCH}"
          homebrew_temp="$RUNNER_TEMP/homebrew-temp-${FORMULA}-${ARCH}"
          mkdir -p "$homebrew_cache" "$homebrew_temp"
          {
            echo "HOMEBREW_BREW_FILE=$brew_bin"
            echo "HOMEBREW_BREW_COMMIT=$HOMEBREW_BREW_COMMIT"
            echo "HOMEBREW_CACHE=$homebrew_cache"
            echo "HOMEBREW_TEMP=$homebrew_temp"
            echo "HOMEBREW_NO_AUTO_UPDATE=1"
            echo "HOMEBREW_NO_INSTALL_CLEANUP=1"
            echo "HOMEBREW_NO_ANALYTICS=1"
            echo "HOMEBREW_DEVELOPER=1"
          } >> "$GITHUB_ENV"
          export HOMEBREW_BREW_FILE="$brew_bin"
          export HOMEBREW_CACHE="$homebrew_cache"
          export HOMEBREW_TEMP="$homebrew_temp"
          export HOMEBREW_NO_AUTO_UPDATE=1
          export HOMEBREW_NO_INSTALL_CLEANUP=1
          export HOMEBREW_NO_ANALYTICS=1
          export HOMEBREW_DEVELOPER=1
          "$brew_bin" --version
          [ "$("$brew_bin" --prefix)" = "$brew_prefix" ] || {
            echo "::error::Homebrew prefix is not the canonical Linuxbrew prefix"; exit 2;
          }
          [ "$("$brew_bin" --cellar)" = "$brew_prefix/Cellar" ] || {
            echo "::error::Homebrew cellar is not the canonical Linuxbrew cellar"; exit 2;
          }
          [ "$(git -C "$brew_repository" rev-parse HEAD)" = "$HOMEBREW_BREW_COMMIT" ] || {
            echo "::error::Homebrew moved during activation"; exit 2;
          }
          [ -z "$(git -C "$brew_repository" status --short --untracked-files=no)" ] || {
            echo "::error::Homebrew activation modified reviewed tracked files"; exit 2;
          }

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          github-token: ""

      - name: Cache Nix store + flake eval
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
        with:
          use-gha-cache: false
          use-flakehub: false

      - name: Warm Kandelo dev shell
        shell: bash
        run: |
          cd kandelo
          bash scripts/dev-shell.sh true

      - name: Download sealed prepublication package generation
        if: ${{ inputs.prepublication-staging-tag != '' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: homebrew-prepublication-generation-${{ github.run_id }}-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/homebrew-prepublication-generation

      - name: Activate sealed prepublication package generation
        if: ${{ inputs.prepublication-staging-tag != '' }}
        shell: bash
        env:
          KANDELO_ABI: ${{ needs.plan.outputs.abi }}
          KANDELO_SHA: ${{ needs.plan.outputs.kandelo-sha }}
          GENERATION_SHA: ${{ inputs.prepublication-staging-kandelo-sha }}
          STAGING_TAG: ${{ inputs.prepublication-staging-tag }}
        run: |
          bash kandelo/.github/scripts/activate-homebrew-prepublication-generation.sh \
            --bundle "$RUNNER_TEMP/homebrew-prepublication-generation" \
            --expected-tag "$STAGING_TAG" \
            --expected-generation-sha "$GENERATION_SHA" \
            --expected-consumer-sha "$KANDELO_SHA" \
            --expected-abi "$KANDELO_ABI" \
            --github-env "$GITHUB_ENV"

      - name: Build Kandelo sysroot
        shell: bash
        env:
          KANDELO_HOMEBREW_ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          cd kandelo
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config submodule.musl.url "https://github.com/ifduyue/musl.git"
          fetched=0
          for attempt in 1 2 3; do
            if timeout 180s git submodule update --init --depth 1 libc/musl; then
              fetched=1
              break
            fi
            echo "::warning::libc/musl fetch failed (attempt ${attempt}/3)"
            rm -f .git/index.lock
            find .git/modules -type f -name '*.lock' -delete 2>/dev/null || true
            sleep 10
          done
          if [ "$fetched" != "1" ]; then
            echo "::error::failed to fetch libc/musl"
            exit 1
          fi
          bash scripts/dev-shell.sh bash scripts/build-musl.sh
          case "$KANDELO_HOMEBREW_ARCH" in
            wasm32) ;;
            wasm64)
              bash scripts/dev-shell.sh bash scripts/build-musl.sh --arch wasm64posix
              ;;
            *)
              echo "::error::unsupported Kandelo Homebrew architecture: $KANDELO_HOMEBREW_ARCH"
              exit 2
              ;;
          esac

      - name: Build Kandelo kernel
        shell: bash
        run: |
          cd kandelo
          bash scripts/dev-shell.sh bash packages/registry/kernel/build-kernel.sh

      - name: Build fork-instrument host tool
        shell: bash
        run: |
          cd kandelo
          bash scripts/dev-shell.sh bash scripts/build-fork-instrument-tool.sh

      - name: Materialize Formula test platform runtime
        id: formula-runtime
        shell: bash
        run: |
          set -euo pipefail
          cd kandelo
          bash scripts/dev-shell.sh bash -c '
            set -euo pipefail
            host="$(rustc -vV | sed -n "s/^host: //p")"
            [ -n "$host" ] || {
              echo "unable to resolve the Rust host target" >&2
              exit 2
            }
            cargo build --release -p xtask --target "$host" --quiet
            xtask="$PWD/target/$host/release/xtask"
            [ -f "$xtask" ] && [ ! -L "$xtask" ] && [ -x "$xtask" ] &&
              [ "$(realpath -- "$xtask")" = "$xtask" ] || {
              echo "prepared Formula test xtask is not an exact executable" >&2
              exit 2
            }
            # Formula tests need the source-projection checker, not Cargo or
            # Nix authority. Cargo may hard-link this executable on Linux, so
            # detach exact bytes before the launcher exposes one read-only
            # source-alias path to the Formula user.
            sealed_xtask="$(
              bash scripts/seal-homebrew-formula-checker.sh \
                --root "$PWD" \
                --checker "$xtask"
            )"
            [ "$sealed_xtask" = "$xtask" ] || {
              echo "Formula test checker seal selected another executable" >&2
              exit 2
            }
            printf "xtask-bin=%s\n" "$xtask" >>"$GITHUB_OUTPUT"
            for package in dash coreutils grep sed rootfs; do
              "$xtask" \
                build-deps --arch wasm32 \
                --binaries-dir "$PWD/binaries" --fetch-only resolve "$package"
            done
            cache_root="$("$xtask" build-deps cache-root)"
            case "$cache_root" in
              /*) ;;
              *) echo "Formula runtime cache root is not absolute" >&2; exit 2 ;;
            esac
            bash scripts/materialize-resolver-binaries.sh \
              "$PWD/binaries" "$cache_root"
          '

      - name: Install JavaScript dependencies for formula tests
        shell: bash
        run: |
          cd kandelo
          bash scripts/dev-shell.sh bash -c '
            set -euo pipefail
            PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund
            cd host
            PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund
            cd ../apps/browser-demos
            PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund
          '

      - name: Create isolated Formula execution identity
        id: formula-identity
        shell: bash
        run: |
          set -euo pipefail
          build_user="kandelo-homebrew-build"
          build_home="/home/$build_user"
          sudo_bin="/usr/bin/sudo"
          systemd_run_bin="/usr/bin/systemd-run"
          systemctl_bin="/usr/bin/systemctl"
          getent_bin="/usr/bin/getent"
          findmnt_bin="/usr/bin/findmnt"
          pgrep_bin="/usr/bin/pgrep"
          pkill_bin="/usr/bin/pkill"
          useradd_bin="/usr/sbin/useradd"
          userdel_bin="/usr/sbin/userdel"
          sudo_mode="$(stat -c '%a' "$sudo_bin" 2>/dev/null || true)"
          if [ ! -f "$sudo_bin" ] || [ -L "$sudo_bin" ] || [ ! -x "$sudo_bin" ] || \
             [ "$(stat -c '%u' "$sudo_bin" 2>/dev/null || true)" != "0" ] || \
             ! [[ "$sudo_mode" =~ ^[0-7]{3,4}$ ]] || \
             [ $((8#$sudo_mode & 0022)) -ne 0 ]; then
            echo "::error::runner sudo boundary is unavailable"; exit 2
          fi
          for protected_bin in "$systemd_run_bin" "$systemctl_bin" "$getent_bin" "$findmnt_bin" "$pgrep_bin" \
            "$useradd_bin" "$userdel_bin"; do
            protected_mode="$(stat -c '%a' "$protected_bin" 2>/dev/null || true)"
            if [ ! -f "$protected_bin" ] || [ -L "$protected_bin" ] || \
               [ ! -x "$protected_bin" ] || \
               [ "$(stat -c '%u' "$protected_bin" 2>/dev/null || true)" != "0" ] || \
               ! [[ "$protected_mode" =~ ^[0-7]{3,4}$ ]] || \
               [ $((8#$protected_mode & 0022)) -ne 0 ]; then
              echo "::error::protected process boundary is unavailable: $protected_bin"; exit 2
            fi
          done
          pkill_target="$(readlink -f -- "$pkill_bin" 2>/dev/null || true)"
          pkill_parent="$(dirname "$pkill_bin")"
          pkill_parent_mode="$(stat -c '%a' "$pkill_parent" 2>/dev/null || true)"
          if [ -L "$pkill_bin" ]; then
            if [ "$pkill_target" != "$pgrep_bin" ] || \
               [ "$(stat -c '%u' "$pkill_bin" 2>/dev/null || true)" != "0" ] || \
               [ "$(stat -c '%u' "$pkill_parent" 2>/dev/null || true)" != "0" ] || \
               ! [[ "$pkill_parent_mode" =~ ^[0-7]{3,4}$ ]] || \
               [ $((8#$pkill_parent_mode & 0022)) -ne 0 ]; then
              echo "::error::protected pkill boundary is unavailable: $pkill_bin"; exit 2
            fi
          else
            pkill_mode="$(stat -c '%a' "$pkill_bin" 2>/dev/null || true)"
            if [ ! -f "$pkill_bin" ] || [ ! -x "$pkill_bin" ] || \
               [ "$(stat -c '%u' "$pkill_bin" 2>/dev/null || true)" != "0" ] || \
               ! [[ "$pkill_mode" =~ ^[0-7]{3,4}$ ]] || \
               [ $((8#$pkill_mode & 0022)) -ne 0 ]; then
              echo "::error::protected pkill boundary is unavailable: $pkill_bin"; exit 2
            fi
          fi
          [ -d /run/systemd/system ] || {
            echo "::error::runner systemd manager is unavailable"; exit 2;
          }
          "$sudo_bin" -n true || {
            echo "::error::runner cannot establish the privileged process boundary"; exit 2;
          }
          "$sudo_bin" -n -- "$systemctl_bin" show --property=Version --value >/dev/null || {
            echo "::error::runner systemd manager is unavailable"; exit 2;
          }
          "$systemd_run_bin" --help | grep -F -- '--expand-environment=' >/dev/null || {
            echo "::error::runner systemd cannot preserve exact Brew arguments"; exit 2;
          }
          if id "$build_user" >/dev/null 2>&1; then
            echo "::error::reserved Formula build user already exists"; exit 2
          fi
          "$sudo_bin" -n -- "$useradd_bin" --system --user-group --create-home \
            --home-dir "$build_home" --shell /usr/sbin/nologin "$build_user"
          echo "created=true" >> "$GITHUB_OUTPUT"
          [ "$(id -u "$build_user")" != "$(id -u)" ] || {
            echo "::error::Formula build identity is not isolated"; exit 2;
          }
          if "$sudo_bin" -n -u "$build_user" -- "$sudo_bin" -n true >/dev/null 2>&1; then
            echo "::error::Formula build identity unexpectedly has sudo access"; exit 2
          fi
          shared_temp="$(mktemp -d /tmp/kandelo-homebrew.XXXXXX)"
          "$sudo_bin" chown root:root "$shared_temp"
          "$sudo_bin" chmod 1777 "$shared_temp"
          mkdir "$shared_temp/cache" "$shared_temp/tmp"
          {
            echo "KANDELO_HOMEBREW_BUILD_USER=$build_user"
            echo "KANDELO_HOMEBREW_SHARED_TEMP=$shared_temp"
            echo "KANDELO_HOMEBREW_SUDO_BIN=$sudo_bin"
            echo "KANDELO_HOMEBREW_SYSTEMD_RUN_BIN=$systemd_run_bin"
            echo "KANDELO_HOMEBREW_SYSTEMCTL_BIN=$systemctl_bin"
            echo "KANDELO_HOMEBREW_GETENT_BIN=$getent_bin"
            echo "KANDELO_HOMEBREW_PGREP_BIN=$pgrep_bin"
            echo "KANDELO_HOMEBREW_PKILL_BIN=$pkill_bin"
            echo "HOMEBREW_CACHE=$shared_temp/cache"
            echo "HOMEBREW_TEMP=$shared_temp/tmp"
          } >> "$GITHUB_ENV"

      - name: Provision Formula browser runtime
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/kandelo"
          bash scripts/dev-shell.sh env \
            KANDELO_HOMEBREW_SHARED_TEMP="$KANDELO_HOMEBREW_SHARED_TEMP" \
            KANDELO_HOMEBREW_BUILD_USER="$KANDELO_HOMEBREW_BUILD_USER" \
            KANDELO_HOMEBREW_SUDO_BIN="$KANDELO_HOMEBREW_SUDO_BIN" \
            bash -c '
              set -euo pipefail
              node_bin="$(command -v node)"
              case "$node_bin" in
                /nix/store/*/bin/node) ;;
                *)
                  echo "Formula browser provisioning resolved an undeclared Node: $node_bin" >&2
                  exit 2
                  ;;
              esac
              bash scripts/homebrew-provision-formula-browser.sh \
                --shared-temp "$KANDELO_HOMEBREW_SHARED_TEMP" \
                --build-user "$KANDELO_HOMEBREW_BUILD_USER" \
                --sudo-bin "$KANDELO_HOMEBREW_SUDO_BIN" \
                --node-bin "$node_bin" \
                --browser-app "$PWD/apps/browser-demos"
            '

      - name: Build and test Homebrew bottle without publisher credentials
        shell: bash
        env:
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_ARCH: ${{ matrix.arch }}
          KANDELO_HOMEBREW_BOTTLE_ROOT_URL: ${{ needs.plan.outputs.bottle-root-prefix }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
          WASM_POSIX_XTASK_BIN: ${{ steps.formula-runtime.outputs.xtask-bin }}
        run: |
          set -euo pipefail
          for secret_name in GH_TOKEN GITHUB_TOKEN HOMEBREW_GITHUB_API_TOKEN \
            HOMEBREW_GITHUB_PACKAGES_TOKEN HOMEBREW_DOCKER_REGISTRY_TOKEN; do
            [ -z "${!secret_name:-}" ] || {
              echo "::error::unprivileged bottle build received $secret_name"; exit 2;
            }
          done
          [ "$(readlink -f "$HOMEBREW_BREW_FILE")" = \
            "$GITHUB_WORKSPACE/homebrew-prefix/Homebrew/bin/brew" ] || {
            echo "::error::absolute Homebrew executable differs from the reviewed checkout"; exit 2;
          }
          [ "$(git -C "$("$HOMEBREW_BREW_FILE" --repository)" rev-parse HEAD)" = \
            "$HOMEBREW_BREW_COMMIT" ] || {
            echo "::error::active Homebrew checkout differs from the reviewed commit"; exit 2;
          }
          bottle_out="$RUNNER_TEMP/homebrew-bottle"
          mkdir -p "$bottle_out"
          cd "$GITHUB_WORKSPACE/kandelo"

          workflow_command_token="$(/usr/bin/od -An -N32 -tx1 /dev/urandom | \
            /usr/bin/tr -d ' \n')"
          [[ "$workflow_command_token" =~ ^[0-9a-f]{64}$ ]] || {
            echo "::error::could not create the workflow-command boundary"; exit 2;
          }
          workflow_commands_stopped=0
          resume_workflow_commands() {
            if [ "$workflow_commands_stopped" = "1" ]; then
              printf '::%s::\n' "$workflow_command_token"
              workflow_commands_stopped=0
            fi
          }
          restore_workflow_commands_on_exit() {
            status="$?"
            set +e
            resume_workflow_commands
            exit "$status"
          }
          trap restore_workflow_commands_on_exit EXIT
          workflow_commands_stopped=1
          printf '::stop-commands::%s\n' "$workflow_command_token"
          bash scripts/dev-shell.sh env \
            WASM_POSIX_XTASK_BIN="$WASM_POSIX_XTASK_BIN" \
            KANDELO_HOMEBREW_RESOLVED_TAPS_FILE="$KANDELO_HOMEBREW_RESOLVED_TAPS_FILE" \
            bash scripts/homebrew-bottle-build.sh \
            --tap-root "$GITHUB_WORKSPACE/tap" \
            --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY" \
            --tap-name "$KANDELO_HOMEBREW_TAP_NAME" \
            --formula "$KANDELO_HOMEBREW_FORMULA" \
            --arch "$KANDELO_HOMEBREW_ARCH" \
            --out "$bottle_out" \
            --bottle-root-url "$KANDELO_HOMEBREW_BOTTLE_ROOT_URL"
          resume_workflow_commands
          trap - EXIT

      - name: Retire isolated Formula execution identity
        if: ${{ always() && steps.formula-identity.outputs.created == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          build_user="kandelo-homebrew-build"
          build_uid="$(id -u "$build_user")"
          sudo_bin="/usr/bin/sudo"
          systemctl_bin="/usr/bin/systemctl"
          pgrep_bin="/usr/bin/pgrep"
          pkill_bin="/usr/bin/pkill"
          userdel_bin="/usr/sbin/userdel"
          slice="kandelo-homebrew-build-${build_uid}.slice"

          uid_has_processes() {
            local status
            if "$sudo_bin" -n -- "$pgrep_bin" -u "$build_uid" >/dev/null 2>&1; then
              return 0
            else
              status="$?"
            fi
            [ "$status" -eq 1 ] && return 1
            echo "::error::could not inspect Formula build identity processes"
            return 2
          }

          "$sudo_bin" -n -- "$systemctl_bin" stop "$slice" >/dev/null 2>&1 || true
          "$sudo_bin" -n -- "$pkill_bin" -TERM -u "$build_uid" >/dev/null 2>&1 || true
          for ((attempt = 0; attempt < 50; attempt++)); do
            if uid_has_processes; then
              sleep 0.1
              continue
            else
              status="$?"
            fi
            [ "$status" -eq 1 ] && break
            exit "$status"
          done
          if uid_has_processes; then
            "$sudo_bin" -n -- "$pkill_bin" -KILL -u "$build_uid" >/dev/null 2>&1 || true
            sleep 1
          else
            status="$?"
            [ "$status" -eq 1 ] || exit "$status"
          fi
          if uid_has_processes; then
            echo "::error::Formula build identity still owns live processes"
            exit 1
          else
            status="$?"
            [ "$status" -eq 1 ] || exit "$status"
          fi
          "$sudo_bin" -n -- "$userdel_bin" -r "$build_user"
          if id "$build_user" >/dev/null 2>&1; then
            echo "::error::Formula build identity still exists after retirement"
            exit 1
          fi

      - name: Checkout exact post-build Kandelo validator source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ inputs.kandelo-repository }}
          ref: ${{ needs.plan.outputs.kandelo-sha }}
          path: kandelo-postbuild
          submodules: false

      - name: Checkout exact post-build tap source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ inputs.tap-repository }}
          ref: ${{ needs.plan.outputs.tap-sha }}
          path: tap-reviewed

      - name: Checkout exact post-build core dependency tap source
        if: ${{ needs.plan.outputs.core-dependency-tap-sha != '' }}
        shell: bash
        env:
          CORE_TAP_SHA: ${{ needs.plan.outputs.core-dependency-tap-sha }}
        run: |
          /usr/bin/bash kandelo-postbuild/scripts/homebrew-checkout-public-tap.sh \
            kandelo-dev/homebrew-tap-core "$CORE_TAP_SHA" \
            "$GITHUB_WORKSPACE/dependency-taps/core-reviewed"

      - name: Recheck reviewed sources after Formula execution
        shell: bash
        env:
          CORE_TAP_SHA: ${{ needs.plan.outputs.core-dependency-tap-sha }}
          FORMULA: ${{ matrix.formula }}
          HOMEBREW_BREW_COMMIT: 34c40c18ffa2029b611b61c73273e32c003d0842
          KANDELO_SHA: ${{ needs.plan.outputs.kandelo-sha }}
          TAP_NAME: ${{ inputs.tap-name }}
          TAP_REPOSITORY: ${{ inputs.tap-repository }}
          TAP_SHA: ${{ needs.plan.outputs.tap-sha }}
        run: |
          set -euo pipefail
          [ "$(git -C "$GITHUB_WORKSPACE/kandelo-postbuild" rev-parse HEAD)" = "$KANDELO_SHA" ] || {
            echo "::error::post-build Kandelo validator differs from the plan"; exit 2;
          }
          [ "$(git -C "$GITHUB_WORKSPACE/tap-reviewed" rev-parse HEAD)" = "$TAP_SHA" ] || {
            echo "::error::post-build tap source differs from the plan"; exit 2;
          }
          dependency_args=()
          if [ -n "$CORE_TAP_SHA" ]; then
            for root in "$GITHUB_WORKSPACE/dependency-taps/core" \
              "$GITHUB_WORKSPACE/dependency-taps/core-reviewed"; do
              [ "$(git -C "$root" rev-parse HEAD)" = "$CORE_TAP_SHA" ] || {
                echo "::error::post-build core dependency tap differs from the lock"; exit 2;
              }
              [ -z "$(git -C "$root" status --short --untracked-files=no)" ] || {
                echo "::error::Formula execution modified the core dependency tap"; exit 2;
              }
            done
            dependency_args+=(--dependency-root \
              "kandelo-dev/tap-core=$GITHUB_WORKSPACE/dependency-taps/core-reviewed")
          fi
          resolved="$RUNNER_TEMP/homebrew-resolved-taps-postbuild.json"
          python3 "$GITHUB_WORKSPACE/kandelo-postbuild/scripts/homebrew-dependency-taps.py" resolve \
            --tap-root "$GITHUB_WORKSPACE/tap-reviewed" \
            --tap-name "$TAP_NAME" \
            --tap-repository "$TAP_REPOSITORY" \
            --tap-commit "$TAP_SHA" \
            "${dependency_args[@]}" \
            --out "$resolved"
          echo "KANDELO_HOMEBREW_RESOLVED_TAPS_FILE=$resolved" >> "$GITHUB_ENV"
          brew_repository="$GITHUB_WORKSPACE/homebrew-prefix/Homebrew"
          [ "$(git -C "$brew_repository" rev-parse HEAD)" = "$HOMEBREW_BREW_COMMIT" ] || {
            echo "::error::Homebrew moved during formula execution"; exit 2;
          }
          [ -z "$(git -C "$brew_repository" status --short --untracked-files=no)" ] || {
            echo "::error::formula execution modified reviewed Homebrew tracked files"; exit 2;
          }
          cd "$GITHUB_WORKSPACE/kandelo-postbuild"
          bash scripts/dev-shell.sh env \
            KANDELO_HOMEBREW_RESOLVED_TAPS_FILE="$KANDELO_HOMEBREW_RESOLVED_TAPS_FILE" \
            bash scripts/homebrew-validate-formula-source-closure.sh \
            --tap-root "$GITHUB_WORKSPACE/tap" \
            --tap-repository "$TAP_REPOSITORY" \
            --tap-name "$TAP_NAME" \
            --formula "$FORMULA" \
            --base-ref "$TAP_SHA" \
            --reviewed-tap-root "$GITHUB_WORKSPACE/tap-reviewed"

      - name: Create strict bottle data handoff
        shell: bash
        env:
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_ARCH: ${{ matrix.arch }}
          KANDELO_HOMEBREW_BOTTLE_ROOT_URL: ${{ needs.plan.outputs.bottle-root-prefix }}
          KANDELO_HOMEBREW_RELEASE_TAG: ${{ needs.plan.outputs.release-tag }}
          KANDELO_HOMEBREW_KANDELO_COMMIT: ${{ needs.plan.outputs.kandelo-sha }}
          KANDELO_HOMEBREW_TAP_COMMIT: ${{ needs.plan.outputs.tap-sha }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/kandelo-postbuild"
          # shellcheck disable=SC1091
          . "$RUNNER_TEMP/homebrew-bottle/build.env"
          bash scripts/dev-shell.sh env \
            KANDELO_HOMEBREW_RESOLVED_TAPS_FILE="$KANDELO_HOMEBREW_RESOLVED_TAPS_FILE" \
            bash scripts/homebrew-create-build-handoff.sh \
            --formula "$KANDELO_HOMEBREW_FORMULA" \
            --arch "$KANDELO_HOMEBREW_ARCH" \
            --release-tag "$KANDELO_HOMEBREW_RELEASE_TAG" \
            --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY" \
            --tap-name "$KANDELO_HOMEBREW_TAP_NAME" \
            --tap-commit "$KANDELO_HOMEBREW_TAP_COMMIT" \
            --kandelo-commit "$KANDELO_HOMEBREW_KANDELO_COMMIT" \
            --bottle-root-url "$KANDELO_HOMEBREW_BOTTLE_ROOT_URL" \
            --bottle "$BOTTLE_ARCHIVE" \
            --bottle-json "$BOTTLE_JSON" \
            --dependency-provenance "$DEPENDENCY_PROVENANCE" \
            --forbidden-root "$GITHUB_WORKSPACE" \
            --forbidden-root "$(dirname "$GITHUB_WORKSPACE")" \
            --forbidden-root "$RUNNER_TEMP" \
            --forbidden-root "$KANDELO_HOMEBREW_SHARED_TEMP" \
            --forbidden-root "$HOMEBREW_TEMP" \
            --forbidden-root "$NATIVE_BUILD_ROOT" \
            --forbidden-root "/home/$KANDELO_HOMEBREW_BUILD_USER" \
            --out "$RUNNER_TEMP/homebrew-build-handoff"

      - name: Upload strict bottle build handoff
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: homebrew-build-handoff-${{ matrix.formula }}-${{ matrix.arch }}-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/homebrew-build-handoff
          compression-level: 0
          if-no-files-found: error
          retention-days: 2

      - name: Compose deterministic Homebrew OCI child without credentials
        shell: bash
        env:
          KANDELO_HOMEBREW_ABI: ${{ needs.plan.outputs.abi }}
          KANDELO_HOMEBREW_ARCH: ${{ matrix.arch }}
          KANDELO_HOMEBREW_BOTTLE_ROOT_URL: ${{ needs.plan.outputs.bottle-root-prefix }}
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_KANDELO_COMMIT: ${{ needs.plan.outputs.kandelo-sha }}
          KANDELO_HOMEBREW_RELEASE_TAG: ${{ needs.plan.outputs.release-tag }}
          KANDELO_HOMEBREW_TAP_COMMIT: ${{ needs.plan.outputs.tap-sha }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
        run: |
          set -euo pipefail
          for secret_name in GH_TOKEN GITHUB_TOKEN HOMEBREW_GITHUB_API_TOKEN \
            HOMEBREW_GITHUB_PACKAGES_TOKEN HOMEBREW_DOCKER_REGISTRY_TOKEN; do
            [ -z "${!secret_name:-}" ] || {
              echo "::error::credential-free OCI composer received $secret_name"; exit 2;
            }
          done
          validated="$RUNNER_TEMP/homebrew-oci-validated"
          artifact="$RUNNER_TEMP/homebrew-oci-child"
          mkdir -p "$validated" "$artifact"
          cd "$GITHUB_WORKSPACE/kandelo-postbuild"
          validation_args=(
            --handoff "$RUNNER_TEMP/homebrew-build-handoff"
            --formula "$KANDELO_HOMEBREW_FORMULA"
            --arch "$KANDELO_HOMEBREW_ARCH"
            --release-tag "$KANDELO_HOMEBREW_RELEASE_TAG"
            --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY"
            --tap-name "$KANDELO_HOMEBREW_TAP_NAME"
            --tap-commit "$KANDELO_HOMEBREW_TAP_COMMIT"
            --kandelo-commit "$KANDELO_HOMEBREW_KANDELO_COMMIT"
            --bottle-root-url "$KANDELO_HOMEBREW_BOTTLE_ROOT_URL"
            --tap-root "$GITHUB_WORKSPACE/tap-reviewed"
            --forbidden-root "$GITHUB_WORKSPACE"
            --forbidden-root "$(dirname "$GITHUB_WORKSPACE")"
            --forbidden-root "$RUNNER_TEMP"
            --forbidden-root "/home/kandelo-homebrew-build"
            --out-env "$validated/build.env"
            --out-bottle-json "$validated/bottle.json"
          )
          bash scripts/dev-shell.sh env \
            KANDELO_HOMEBREW_RESOLVED_TAPS_FILE="$KANDELO_HOMEBREW_RESOLVED_TAPS_FILE" \
            bash scripts/homebrew-validate-build-handoff.sh \
            "${validation_args[@]}"
          # shellcheck disable=SC1091
          . "$validated/build.env"
          bash scripts/dev-shell.sh python3 scripts/homebrew-oci-layout.py build-child \
            --formula "$FORMULA" \
            --arch "$ARCH" \
            --abi "$KANDELO_HOMEBREW_ABI" \
            --tap-repository "$TAP_REPOSITORY" \
            --tap-name "$TAP_NAME" \
            --tap-commit "$TAP_COMMIT" \
            --kandelo-commit "$KANDELO_COMMIT" \
            --bottle-root-url "$BOTTLE_ROOT_URL" \
            --bottle "$BOTTLE_ARCHIVE" \
            --bottle-json "$validated/bottle.json" \
            --kandelo-root "$GITHUB_WORKSPACE/kandelo-postbuild" \
            --tap-root "$GITHUB_WORKSPACE/tap-reviewed" \
            --out-layout "$artifact/layout" \
            --out-receipt "$artifact/receipt.json"

      - name: Upload deterministic Homebrew OCI child
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: homebrew-oci-child-${{ matrix.formula }}-${{ matrix.arch }}-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/homebrew-oci-child
          compression-level: 0
          if-no-files-found: error
          retention-days: 2

      - name: Upload unprivileged build diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: homebrew-build-diagnostics-${{ matrix.formula }}-${{ matrix.arch }}-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/homebrew-bottle/bottles/**
          if-no-files-found: ignore
          retention-days: 14

  upload-bottle:
    needs: [plan, build-and-test]
    if: ${{ always() && !cancelled() && !inputs.dry-run && needs.plan.result == 'success' && needs.plan.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout exact Kandelo validator source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ inputs.kandelo-repository }}
          ref: ${{ needs.plan.outputs.kandelo-sha }}
          path: kandelo
          submodules: false

      - name: Checkout exact tap source for upload validation
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ inputs.tap-repository }}
          ref: ${{ needs.plan.outputs.tap-sha }}
          path: tap

      - name: Checkout exact public core dependency tap for upload validation
        if: ${{ needs.plan.outputs.core-dependency-tap-sha != '' }}
        shell: bash
        env:
          CORE_TAP_SHA: ${{ needs.plan.outputs.core-dependency-tap-sha }}
        run: |
          /usr/bin/bash kandelo/scripts/homebrew-checkout-public-tap.sh \
            kandelo-dev/homebrew-tap-core "$CORE_TAP_SHA" \
            "$GITHUB_WORKSPACE/dependency-taps/core"

      - name: Verify uploader source snapshot
        shell: bash
        env:
          KANDELO_SHA: ${{ needs.plan.outputs.kandelo-sha }}
        run: |
          set -euo pipefail
          [[ "$KANDELO_SHA" =~ ^[0-9a-f]{40}$ ]] || {
            echo "::error::invalid planned Kandelo commit"; exit 2;
          }
          [ "$(git -C kandelo rev-parse HEAD)" = "$KANDELO_SHA" ] || {
            echo "::error::uploader source differs from the validated plan"; exit 2;
          }

      - name: Materialize immutable dependency tap map for upload validation
        shell: bash
        env:
          CORE_TAP_SHA: ${{ needs.plan.outputs.core-dependency-tap-sha }}
          TAP_NAME: ${{ inputs.tap-name }}
          TAP_REPOSITORY: ${{ inputs.tap-repository }}
          TAP_SHA: ${{ needs.plan.outputs.tap-sha }}
        run: |
          set -euo pipefail
          resolved="$RUNNER_TEMP/homebrew-resolved-taps.json"
          dependency_args=()
          if [ -n "$CORE_TAP_SHA" ]; then
            dependency_args+=(--dependency-root \
              "kandelo-dev/tap-core=$GITHUB_WORKSPACE/dependency-taps/core")
          fi
          python3 kandelo/scripts/homebrew-dependency-taps.py resolve \
            --tap-root "$GITHUB_WORKSPACE/tap" \
            --tap-name "$TAP_NAME" \
            --tap-repository "$TAP_REPOSITORY" \
            --tap-commit "$TAP_SHA" \
            "${dependency_args[@]}" \
            --out "$resolved"
          echo "KANDELO_HOMEBREW_RESOLVED_TAPS_FILE=$resolved" >> "$GITHUB_ENV"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          github-token: ""

      - name: Warm Kandelo dev shell
        shell: bash
        run: |
          cd kandelo
          bash scripts/dev-shell.sh true

      - name: Download strict build handoff
        id: build-handoff
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: homebrew-build-handoff-${{ matrix.formula }}-${{ matrix.arch }}-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/homebrew-build-handoff

      - name: Download deterministic Homebrew OCI child
        id: oci-child
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: homebrew-oci-child-${{ matrix.formula }}-${{ matrix.arch }}-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/homebrew-oci-child

      - name: Validate build data before exposing upload credentials
        id: validate-build
        if: ${{ steps.build-handoff.outcome == 'success' && steps.oci-child.outcome == 'success' }}
        shell: bash
        env:
          KANDELO_HOMEBREW_ARCH: ${{ matrix.arch }}
          KANDELO_HOMEBREW_BOTTLE_ROOT_URL: ${{ needs.plan.outputs.bottle-root-prefix }}
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_KANDELO_COMMIT: ${{ needs.plan.outputs.kandelo-sha }}
          KANDELO_HOMEBREW_RELEASE_TAG: ${{ needs.plan.outputs.release-tag }}
          KANDELO_HOMEBREW_TAP_COMMIT: ${{ needs.plan.outputs.tap-sha }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
        run: |
          set -euo pipefail
          cd kandelo
          validation_args=(
            --handoff "$RUNNER_TEMP/homebrew-build-handoff"
            --formula "$KANDELO_HOMEBREW_FORMULA"
            --arch "$KANDELO_HOMEBREW_ARCH"
            --release-tag "$KANDELO_HOMEBREW_RELEASE_TAG"
            --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY"
            --tap-name "$KANDELO_HOMEBREW_TAP_NAME"
            --tap-commit "$KANDELO_HOMEBREW_TAP_COMMIT"
            --kandelo-commit "$KANDELO_HOMEBREW_KANDELO_COMMIT"
            --bottle-root-url "$KANDELO_HOMEBREW_BOTTLE_ROOT_URL"
            --forbidden-root "$GITHUB_WORKSPACE"
            --forbidden-root "$(dirname "$GITHUB_WORKSPACE")"
            --forbidden-root "$RUNNER_TEMP"
            --forbidden-root "/home/kandelo-homebrew-build"
            --out-env "$RUNNER_TEMP/homebrew-validated-build.env"
          )
          bash scripts/dev-shell.sh env \
            KANDELO_HOMEBREW_RESOLVED_TAPS_FILE="$KANDELO_HOMEBREW_RESOLVED_TAPS_FILE" \
            bash scripts/homebrew-validate-build-handoff.sh "${validation_args[@]}"
          # shellcheck disable=SC1091
          . "$RUNNER_TEMP/homebrew-validated-build.env"
          bash scripts/dev-shell.sh python3 scripts/homebrew-oci-layout.py validate-child \
            --layout "$RUNNER_TEMP/homebrew-oci-child/layout" \
            --receipt "$RUNNER_TEMP/homebrew-oci-child/receipt.json"
          jq -e \
            --arg formula "$FORMULA" \
            --arg arch "$ARCH" \
            --arg abi "${RELEASE_TAG#bottles-abi-v}" \
            --arg tap_repository "$TAP_REPOSITORY" \
            --arg tap_name "$TAP_NAME" \
            --arg tap_commit "$TAP_COMMIT" \
            --arg kandelo_commit "$KANDELO_COMMIT" \
            --arg sha256 "$BOTTLE_SHA256" \
            --arg bytes "$BOTTLE_BYTES" '
              .kind == "child" and .formula == $formula and .arch == $arch and
              .abi == ($abi | tonumber) and
              (.tap_repository | ascii_downcase) == ($tap_repository | ascii_downcase) and
              .tap_name == $tap_name and
              .tap_commit == $tap_commit and .kandelo_commit == $kandelo_commit and
              .bottle.sha256 == $sha256 and .bottle.bytes == ($bytes | tonumber)
            ' "$RUNNER_TEMP/homebrew-oci-child/receipt.json" >/dev/null

      - name: Upload validated bottle in isolated ORAS auth state
        id: upload
        if: ${{ steps.validate-build.outcome == 'success' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
        run: |
          set -euo pipefail
          cd kandelo
          upload_args=(
            --layout "$RUNNER_TEMP/homebrew-oci-child/layout"
            --layout-receipt "$RUNNER_TEMP/homebrew-oci-child/receipt.json"
            --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY"
            --tap-name "$KANDELO_HOMEBREW_TAP_NAME"
            --formula "$KANDELO_HOMEBREW_FORMULA"
            --auth-mode github-token
            --require-pat false
            --destination-mode repository
            --out-json "$RUNNER_TEMP/homebrew-upload-receipt/receipt.json"
          )
          bash scripts/dev-shell.sh bash scripts/homebrew-ghcr-upload.sh "${upload_args[@]}"

      - name: Revalidate upload receipt as data
        shell: bash
        env:
          KANDELO_HOMEBREW_ARCH: ${{ matrix.arch }}
          KANDELO_HOMEBREW_BOTTLE_ROOT_URL: ${{ needs.plan.outputs.bottle-root-prefix }}
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_KANDELO_COMMIT: ${{ needs.plan.outputs.kandelo-sha }}
          KANDELO_HOMEBREW_RELEASE_TAG: ${{ needs.plan.outputs.release-tag }}
          KANDELO_HOMEBREW_TAP_COMMIT: ${{ needs.plan.outputs.tap-sha }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
        run: |
          set -euo pipefail
          cd kandelo
          receipt_args=(
            --receipt "$RUNNER_TEMP/homebrew-upload-receipt/receipt.json"
            --handoff "$RUNNER_TEMP/homebrew-build-handoff"
            --formula "$KANDELO_HOMEBREW_FORMULA"
            --arch "$KANDELO_HOMEBREW_ARCH"
            --release-tag "$KANDELO_HOMEBREW_RELEASE_TAG"
            --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY"
            --tap-name "$KANDELO_HOMEBREW_TAP_NAME"
            --tap-commit "$KANDELO_HOMEBREW_TAP_COMMIT"
            --kandelo-commit "$KANDELO_HOMEBREW_KANDELO_COMMIT"
            --bottle-root-url "$KANDELO_HOMEBREW_BOTTLE_ROOT_URL"
            --forbidden-root "$GITHUB_WORKSPACE"
            --forbidden-root "$(dirname "$GITHUB_WORKSPACE")"
            --forbidden-root "$RUNNER_TEMP"
            --forbidden-root "/home/kandelo-homebrew-build"
          )
          bash scripts/dev-shell.sh env \
            KANDELO_HOMEBREW_RESOLVED_TAPS_FILE="$KANDELO_HOMEBREW_RESOLVED_TAPS_FILE" \
            bash scripts/homebrew-validate-upload-receipt.sh "${receipt_args[@]}"

      - name: Upload strict upload receipt
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: homebrew-upload-receipt-${{ matrix.formula }}-${{ matrix.arch }}-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/homebrew-upload-receipt/receipt.json
          if-no-files-found: error
          retention-days: 2

      - name: Fail when the matching immutable handoff is absent
        if: ${{ always() && (steps.build-handoff.outcome != 'success' || steps.oci-child.outcome != 'success') }}
        shell: bash
        run: |
          echo "::error::the matching build or OCI child handoff was not produced"
          exit 1

  publish-bottle-index:
    needs: [plan, build-and-test, upload-bottle]
    if: ${{ always() && !cancelled() && !inputs.dry-run && needs.plan.result == 'success' && needs.build-and-test.result == 'success' && needs.upload-bottle.result == 'success' && needs.plan.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: kandelo-homebrew-bottle-index-${{ inputs.tap-repository }}-${{ matrix.formula }}
      cancel-in-progress: false
    permissions:
      actions: read
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.formula-matrix) }}
    steps:
      - name: Checkout exact Kandelo index publisher source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ inputs.kandelo-repository }}
          ref: ${{ needs.plan.outputs.kandelo-sha }}
          path: kandelo
          submodules: false

      - name: Checkout exact tap source for index validation
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ inputs.tap-repository }}
          ref: ${{ needs.plan.outputs.tap-sha }}
          path: tap

      - name: Checkout exact public core dependency tap for index validation
        if: ${{ needs.plan.outputs.core-dependency-tap-sha != '' }}
        shell: bash
        env:
          CORE_TAP_SHA: ${{ needs.plan.outputs.core-dependency-tap-sha }}
        run: |
          /usr/bin/bash kandelo/scripts/homebrew-checkout-public-tap.sh \
            kandelo-dev/homebrew-tap-core "$CORE_TAP_SHA" \
            "$GITHUB_WORKSPACE/dependency-taps/core"

      - name: Materialize immutable dependency tap map for index validation
        shell: bash
        env:
          CORE_TAP_SHA: ${{ needs.plan.outputs.core-dependency-tap-sha }}
          TAP_NAME: ${{ inputs.tap-name }}
          TAP_REPOSITORY: ${{ inputs.tap-repository }}
          TAP_SHA: ${{ needs.plan.outputs.tap-sha }}
        run: |
          set -euo pipefail
          resolved="$RUNNER_TEMP/homebrew-resolved-taps.json"
          dependency_args=()
          if [ -n "$CORE_TAP_SHA" ]; then
            dependency_args+=(--dependency-root \
              "kandelo-dev/tap-core=$GITHUB_WORKSPACE/dependency-taps/core")
          fi
          python3 kandelo/scripts/homebrew-dependency-taps.py resolve \
            --tap-root "$GITHUB_WORKSPACE/tap" \
            --tap-name "$TAP_NAME" \
            --tap-repository "$TAP_REPOSITORY" \
            --tap-commit "$TAP_SHA" \
            "${dependency_args[@]}" \
            --out "$resolved"
          echo "KANDELO_HOMEBREW_RESOLVED_TAPS_FILE=$resolved" >> "$GITHUB_ENV"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          github-token: ""

      - name: Warm Kandelo dev shell
        shell: bash
        run: |
          cd kandelo
          bash scripts/dev-shell.sh true

      - name: Download immutable OCI child layouts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: homebrew-oci-child-${{ matrix.formula }}-*-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/homebrew-oci-children
          merge-multiple: false

      - name: Download public child publication receipts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: homebrew-upload-receipt-${{ matrix.formula }}-*-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/homebrew-child-publications
          merge-multiple: false

      - name: Validate child layouts and public publication evidence without credentials
        shell: bash
        env:
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
        run: |
          set -euo pipefail
          for secret_name in GH_TOKEN GITHUB_TOKEN HOMEBREW_GITHUB_API_TOKEN \
            HOMEBREW_GITHUB_PACKAGES_TOKEN HOMEBREW_DOCKER_REGISTRY_TOKEN; do
            [ -z "${!secret_name:-}" ] || {
              echo "::error::credential-free index input validator received $secret_name"; exit 2;
            }
          done
          cd kandelo
          child_root="$RUNNER_TEMP/homebrew-oci-children"
          publication_root="$RUNNER_TEMP/homebrew-child-publications"
          child_paths="$RUNNER_TEMP/homebrew-index-child-paths.txt"
          publication_paths="$RUNNER_TEMP/homebrew-index-publication-paths.txt"
          bash scripts/homebrew-index-artifact-paths.sh \
            --root "$child_root" --kind child \
            --formula "$KANDELO_HOMEBREW_FORMULA" \
            --run-attempt "$GITHUB_RUN_ATTEMPT" --out "$child_paths"
          bash scripts/homebrew-index-artifact-paths.sh \
            --root "$publication_root" --kind publication \
            --formula "$KANDELO_HOMEBREW_FORMULA" \
            --run-attempt "$GITHUB_RUN_ATTEMPT" --out "$publication_paths"
          mapfile -d '' -t child_receipts <"$child_paths"
          mapfile -d '' -t publication_receipts <"$publication_paths"
          [ "${#child_receipts[@]}" -eq "${#publication_receipts[@]}" ] || {
            echo "::error::OCI child and public receipt counts differ"; exit 1;
          }
          declare -A downloaded_publications=()
          declare -A used_publications=()
          for publication in "${publication_receipts[@]}"; do
            downloaded_publications["$publication"]=1
          done
          : >"$RUNNER_TEMP/homebrew-index-child-args.txt"
          for receipt in "${child_receipts[@]}"; do
            child_root="$(dirname "$receipt")"
            bash scripts/dev-shell.sh python3 scripts/homebrew-oci-layout.py validate-child \
              --layout "$child_root/layout" --receipt "$receipt"
            arch="$(jq -er '.arch' "$receipt")"
            if [ "$receipt" != "$RUNNER_TEMP/homebrew-oci-children/receipt.json" ]; then
              expected_receipt="$RUNNER_TEMP/homebrew-oci-children/homebrew-oci-child-${KANDELO_HOMEBREW_FORMULA}-${arch}-attempt-${GITHUB_RUN_ATTEMPT}/receipt.json"
              [ "$receipt" = "$expected_receipt" ] || {
                echo "::error::OCI child receipt path disagrees with its validated architecture"; exit 1;
              }
            fi
            publication_candidates=()
            for candidate in \
              "$RUNNER_TEMP/homebrew-child-publications/receipt.json" \
              "$RUNNER_TEMP/homebrew-child-publications/homebrew-upload-receipt-${KANDELO_HOMEBREW_FORMULA}-${arch}-attempt-${GITHUB_RUN_ATTEMPT}/receipt.json"; do
              [ -n "${downloaded_publications[$candidate]+x}" ] && \
                publication_candidates+=("$candidate")
            done
            [ "${#publication_candidates[@]}" -eq 1 ] || {
              echo "::error::missing or ambiguous public child publication receipt for $arch"; exit 1;
            }
            publication="${publication_candidates[0]}"
            [ -z "${used_publications[$publication]+x}" ] || {
              echo "::error::public child publication receipt was reused"; exit 1;
            }
            used_publications["$publication"]=1
            bash scripts/dev-shell.sh python3 scripts/homebrew-oci-layout.py \
              validate-publication-receipt \
              --receipt "$publication" \
              --layout-receipt "$receipt" \
              --kind child \
              --formula "$KANDELO_HOMEBREW_FORMULA" \
              --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY" \
              --tap-name "$KANDELO_HOMEBREW_TAP_NAME"
            printf '%s\0%s\0' "$child_root/layout" "$receipt" \
              >>"$RUNNER_TEMP/homebrew-index-child-args.txt"
          done
          [ "${#used_publications[@]}" -eq "${#publication_receipts[@]}" ] || {
            echo "::error::an unmatched public child publication receipt was downloaded"; exit 1;
          }

      - name: Import the existing public Homebrew version index anonymously
        id: existing-index
        shell: bash
        env:
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
        run: |
          set -euo pipefail
          for secret_name in GH_TOKEN GITHUB_TOKEN HOMEBREW_GITHUB_API_TOKEN \
            HOMEBREW_GITHUB_PACKAGES_TOKEN HOMEBREW_DOCKER_REGISTRY_TOKEN; do
            [ -z "${!secret_name:-}" ] || {
              echo "::error::anonymous index import received $secret_name"; exit 2;
            }
          done
          cd kandelo
          exec 3<"$RUNNER_TEMP/homebrew-index-child-args.txt"
          IFS= read -r -d '' _first_layout <&3 && \
            IFS= read -r -d '' first_receipt <&3 || {
              exec 3<&-
              echo "::error::missing first validated child receipt"; exit 1;
            }
          exec 3<&-
          top_ref="$(jq -er '.top_ref' "$first_receipt")"
          tap_repository="$(printf '%s' "$KANDELO_HOMEBREW_TAP_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          remote="ghcr.io/${tap_repository}/${KANDELO_HOMEBREW_FORMULA}"
          anonymous_config="$RUNNER_TEMP/homebrew-anonymous-oras.json"
          printf '{"auths":{}}\n' >"$anonymous_config"
          existing="$RUNNER_TEMP/homebrew-existing-index"
          result="$RUNNER_TEMP/homebrew-existing-index-result.json"
          bash scripts/dev-shell.sh env -u GH_TOKEN -u GITHUB_TOKEN \
            -u HOMEBREW_GITHUB_API_TOKEN -u HOMEBREW_GITHUB_PACKAGES_TOKEN \
            -u HOMEBREW_DOCKER_REGISTRY_TOKEN python3 \
            scripts/homebrew-oci-layout.py import-public-index \
            --remote "$remote" --reference "$top_ref" \
            --registry-config "$anonymous_config" --out-layout "$existing" \
            --out-result "$result"
          case "$(jq -er '.status' "$result")" in
            present)
              jq -e --arg layout "$existing" '
                keys == ["digest", "layout", "schema", "status"] and
                .schema == 1 and .status == "present" and .layout == $layout and
                (.digest | type == "string" and test("^sha256:[0-9a-f]{64}$"))
              ' "$result" >/dev/null
              echo "layout=$existing" >>"$GITHUB_OUTPUT"
              ;;
            missing)
              jq -e 'keys == ["schema", "status"] and .schema == 1 and .status == "missing"' \
                "$result" >/dev/null
              echo "layout=" >>"$GITHUB_OUTPUT"
              ;;
            *) echo "::error::invalid anonymous Homebrew index import result"; exit 1 ;;
          esac

      - name: Compose one complete Homebrew version index without credentials
        shell: bash
        env:
          KANDELO_HOMEBREW_EXISTING_INDEX: ${{ steps.existing-index.outputs.layout }}
          KANDELO_HOMEBREW_FORCE: ${{ inputs.force }}
        run: |
          set -euo pipefail
          for secret_name in GH_TOKEN GITHUB_TOKEN HOMEBREW_GITHUB_API_TOKEN \
            HOMEBREW_GITHUB_PACKAGES_TOKEN HOMEBREW_DOCKER_REGISTRY_TOKEN; do
            [ -z "${!secret_name:-}" ] || {
              echo "::error::credential-free index composer received $secret_name"; exit 2;
            }
          done
          cd kandelo
          args=()
          while IFS= read -r -d '' layout && IFS= read -r -d '' receipt; do
            args+=(--child-layout "$layout" --child-receipt "$receipt")
          done <"$RUNNER_TEMP/homebrew-index-child-args.txt"
          [ "${#args[@]}" -gt 0 ] || { echo "::error::no validated OCI children"; exit 1; }
          existing="$KANDELO_HOMEBREW_EXISTING_INDEX"
          [ -z "$existing" ] || args+=(--existing-layout "$existing")
          if [ "$KANDELO_HOMEBREW_FORCE" = "true" ]; then
            args+=(--recover-unfinalized-tap-root "$GITHUB_WORKSPACE/tap")
          fi
          bash scripts/dev-shell.sh python3 scripts/homebrew-oci-layout.py merge-index \
            "${args[@]}" \
            --out-layout "$RUNNER_TEMP/homebrew-complete-index/layout" \
            --out-receipt "$RUNNER_TEMP/homebrew-complete-index/layout-receipt.json"

      - name: Publish the complete Homebrew version index in isolated ORAS auth state
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
        run: |
          set -euo pipefail
          cd kandelo
          bash scripts/dev-shell.sh bash scripts/homebrew-ghcr-upload.sh \
            --layout "$RUNNER_TEMP/homebrew-complete-index/layout" \
            --layout-receipt "$RUNNER_TEMP/homebrew-complete-index/layout-receipt.json" \
            --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY" \
            --tap-name "$KANDELO_HOMEBREW_TAP_NAME" \
            --formula "$KANDELO_HOMEBREW_FORMULA" \
            --auth-mode github-token \
            --require-pat false \
            --destination-mode repository \
            --out-json "$RUNNER_TEMP/homebrew-complete-index/transport-receipt.json"

      - name: Upload public Homebrew version-index evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: homebrew-index-publication-${{ matrix.formula }}-attempt-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/homebrew-complete-index/layout-receipt.json
            ${{ runner.temp }}/homebrew-complete-index/transport-receipt.json
          compression-level: 0
          if-no-files-found: error
          retention-days: 2

  verify-bottle:
    needs: [plan, build-and-test, upload-bottle, publish-bottle-index]
    if: ${{ always() && !cancelled() && needs.plan.result == 'success' && needs.build-and-test.result == 'success' && (inputs.dry-run || (needs.upload-bottle.result == 'success' && needs.publish-bottle-index.result == 'success')) && needs.plan.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 1440
    permissions:
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.matrix) }}
    steps:
      - name: Checkout exact Kandelo verifier source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ inputs.kandelo-repository }}
          ref: ${{ needs.plan.outputs.kandelo-sha }}
          path: kandelo
          submodules: false

      - name: Checkout exact Kandelo sysroot build source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ inputs.kandelo-repository }}
          ref: ${{ needs.plan.outputs.kandelo-sha }}
          path: kandelo-sysroot-build
          submodules: false

      - name: Checkout exact tap source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ inputs.tap-repository }}
          ref: ${{ needs.plan.outputs.tap-sha }}
          path: tap

      - name: Checkout exact public core dependency tap for verification
        if: ${{ needs.plan.outputs.core-dependency-tap-sha != '' }}
        shell: bash
        env:
          CORE_TAP_SHA: ${{ needs.plan.outputs.core-dependency-tap-sha }}
        run: |
          /usr/bin/bash kandelo/scripts/homebrew-checkout-public-tap.sh \
            kandelo-dev/homebrew-tap-core "$CORE_TAP_SHA" \
            "$GITHUB_WORKSPACE/dependency-taps/core"

      - name: Verify fresh verifier source snapshots
        shell: bash
        env:
          KANDELO_SHA: ${{ needs.plan.outputs.kandelo-sha }}
          TAP_SHA: ${{ needs.plan.outputs.tap-sha }}
        run: |
          set -euo pipefail
          for sha in "$KANDELO_SHA" "$TAP_SHA"; do
            [[ "$sha" =~ ^[0-9a-f]{40}$ ]] || {
              echo "::error::invalid planned source commit"; exit 2;
            }
          done
          [ "$(git -C kandelo rev-parse HEAD)" = "$KANDELO_SHA" ] || {
            echo "::error::Kandelo verifier source differs from the plan"; exit 2;
          }
          [ "$(git -C tap rev-parse HEAD)" = "$TAP_SHA" ] || {
            echo "::error::tap verifier source differs from the plan"; exit 2;
          }

      - name: Materialize immutable dependency tap map for verification
        shell: bash
        env:
          CORE_TAP_SHA: ${{ needs.plan.outputs.core-dependency-tap-sha }}
          TAP_NAME: ${{ inputs.tap-name }}
          TAP_REPOSITORY: ${{ inputs.tap-repository }}
          TAP_SHA: ${{ needs.plan.outputs.tap-sha }}
        run: |
          set -euo pipefail
          resolved="$RUNNER_TEMP/homebrew-resolved-taps.json"
          dependency_args=()
          if [ -n "$CORE_TAP_SHA" ]; then
            dependency_args+=(--dependency-root \
              "kandelo-dev/tap-core=$GITHUB_WORKSPACE/dependency-taps/core")
          fi
          python3 kandelo/scripts/homebrew-dependency-taps.py resolve \
            --tap-root "$GITHUB_WORKSPACE/tap" \
            --tap-name "$TAP_NAME" \
            --tap-repository "$TAP_REPOSITORY" \
            --tap-commit "$TAP_SHA" \
            "${dependency_args[@]}" \
            --out "$resolved"
          echo "KANDELO_HOMEBREW_RESOLVED_TAPS_FILE=$resolved" >> "$GITHUB_ENV"

      - name: Checkout reviewed Homebrew implementation for bottle verification
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: Homebrew/brew
          ref: 34c40c18ffa2029b611b61c73273e32c003d0842
          path: homebrew-prefix/Homebrew

      - name: Activate reviewed Homebrew implementation for bottle verification
        shell: bash
        env:
          ARCH: ${{ matrix.arch }}
          FORMULA: ${{ matrix.formula }}
          HOMEBREW_BREW_COMMIT: 34c40c18ffa2029b611b61c73273e32c003d0842
        run: |
          set -euo pipefail
          [[ "$HOMEBREW_BREW_COMMIT" =~ ^[0-9a-f]{40}$ ]] || {
            echo "::error::invalid pinned Homebrew commit"; exit 2;
          }
          brew_prefix="/home/linuxbrew/.linuxbrew"
          brew_repository="$GITHUB_WORKSPACE/homebrew-prefix/Homebrew"
          [ "$(git -C "$brew_repository" rev-parse HEAD)" = "$HOMEBREW_BREW_COMMIT" ] || {
            echo "::error::Homebrew verifier checkout differs from the reviewed commit"; exit 2;
          }
          [ -z "$(git -C "$brew_repository" status --short --untracked-files=no)" ] || {
            echo "::error::reviewed Homebrew verifier checkout has tracked modifications"; exit 2;
          }
          mkdir -p "$brew_prefix/bin"
          rm -f "$brew_prefix/bin/brew"
          ln -s "$brew_repository/bin/brew" "$brew_prefix/bin/brew"
          brew_bin="$brew_prefix/bin/brew"
          [ "$(readlink -f "$brew_bin")" = "$brew_repository/bin/brew" ] || {
            echo "::error::Homebrew verifier executable differs from the reviewed checkout"; exit 2;
          }
          homebrew_cache="$RUNNER_TEMP/homebrew-verify-cache-${FORMULA}-${ARCH}"
          homebrew_temp="$RUNNER_TEMP/homebrew-verify-temp-${FORMULA}-${ARCH}"
          mkdir -p "$homebrew_cache" "$homebrew_temp"
          {
            echo "HOMEBREW_BREW_FILE=$brew_bin"
            echo "HOMEBREW_BREW_COMMIT=$HOMEBREW_BREW_COMMIT"
            echo "HOMEBREW_CACHE=$homebrew_cache"
            echo "HOMEBREW_TEMP=$homebrew_temp"
            echo "HOMEBREW_NO_AUTO_UPDATE=1"
            echo "HOMEBREW_NO_INSTALL_CLEANUP=1"
            echo "HOMEBREW_NO_ANALYTICS=1"
            echo "HOMEBREW_DEVELOPER=1"
          } >> "$GITHUB_ENV"
          export HOMEBREW_BREW_FILE="$brew_bin"
          export HOMEBREW_CACHE="$homebrew_cache"
          export HOMEBREW_TEMP="$homebrew_temp"
          export HOMEBREW_NO_AUTO_UPDATE=1
          export HOMEBREW_NO_INSTALL_CLEANUP=1
          export HOMEBREW_NO_ANALYTICS=1
          export HOMEBREW_DEVELOPER=1
          "$brew_bin" --version
          [ "$("$brew_bin" --prefix)" = "$brew_prefix" ] || {
            echo "::error::Homebrew verifier prefix is not canonical"; exit 2;
          }
          [ "$("$brew_bin" --cellar)" = "$brew_prefix/Cellar" ] || {
            echo "::error::Homebrew verifier cellar is not canonical"; exit 2;
          }

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          github-token: ""

      - name: Cache Nix store + flake eval
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
        with:
          use-gha-cache: false
          use-flakehub: false

      - name: Warm Kandelo dev shell
        shell: bash
        run: |
          cd kandelo
          bash scripts/dev-shell.sh true

      - name: Download sealed prepublication package generation
        if: ${{ inputs.prepublication-staging-tag != '' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: homebrew-prepublication-generation-${{ github.run_id }}-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/homebrew-prepublication-generation

      - name: Activate sealed prepublication package generation
        if: ${{ inputs.prepublication-staging-tag != '' }}
        shell: bash
        env:
          KANDELO_ABI: ${{ needs.plan.outputs.abi }}
          KANDELO_SHA: ${{ needs.plan.outputs.kandelo-sha }}
          GENERATION_SHA: ${{ inputs.prepublication-staging-kandelo-sha }}
          STAGING_TAG: ${{ inputs.prepublication-staging-tag }}
        run: |
          bash kandelo/.github/scripts/activate-homebrew-prepublication-generation.sh \
            --bundle "$RUNNER_TEMP/homebrew-prepublication-generation" \
            --expected-tag "$STAGING_TAG" \
            --expected-generation-sha "$GENERATION_SHA" \
            --expected-consumer-sha "$KANDELO_SHA" \
            --expected-abi "$KANDELO_ABI" \
            --github-env "$GITHUB_ENV"

      - name: Download strict build handoff
        id: build-handoff
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: homebrew-build-handoff-${{ matrix.formula }}-${{ matrix.arch }}-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/homebrew-build-handoff

      - name: Download deterministic Homebrew OCI child for dry-run validation
        id: oci-child
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: homebrew-oci-child-${{ matrix.formula }}-${{ matrix.arch }}-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/homebrew-oci-child

      - name: Download strict upload receipt
        id: upload-receipt
        if: ${{ !inputs.dry-run }}
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: homebrew-upload-receipt-${{ matrix.formula }}-${{ matrix.arch }}-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/homebrew-upload-receipt

      - name: Download public Homebrew version-index evidence
        id: index-publication
        if: ${{ !inputs.dry-run }}
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: homebrew-index-publication-${{ matrix.formula }}-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/homebrew-index-publication

      - name: Validate build handoff and reconstruct canonical bottle JSON
        if: ${{ steps.build-handoff.outcome == 'success' }}
        shell: bash
        env:
          KANDELO_HOMEBREW_ARCH: ${{ matrix.arch }}
          KANDELO_HOMEBREW_BOTTLE_ROOT_URL: ${{ needs.plan.outputs.bottle-root-prefix }}
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_KANDELO_COMMIT: ${{ needs.plan.outputs.kandelo-sha }}
          KANDELO_HOMEBREW_RELEASE_TAG: ${{ needs.plan.outputs.release-tag }}
          KANDELO_HOMEBREW_TAP_COMMIT: ${{ needs.plan.outputs.tap-sha }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/homebrew-verified-input"
          cd kandelo
          validation_args=(
            --handoff "$RUNNER_TEMP/homebrew-build-handoff"
            --formula "$KANDELO_HOMEBREW_FORMULA"
            --arch "$KANDELO_HOMEBREW_ARCH"
            --release-tag "$KANDELO_HOMEBREW_RELEASE_TAG"
            --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY"
            --tap-name "$KANDELO_HOMEBREW_TAP_NAME"
            --tap-commit "$KANDELO_HOMEBREW_TAP_COMMIT"
            --kandelo-commit "$KANDELO_HOMEBREW_KANDELO_COMMIT"
            --bottle-root-url "$KANDELO_HOMEBREW_BOTTLE_ROOT_URL"
            --tap-root "$GITHUB_WORKSPACE/tap"
            --forbidden-root "$GITHUB_WORKSPACE"
            --forbidden-root "$(dirname "$GITHUB_WORKSPACE")"
            --forbidden-root "$RUNNER_TEMP"
            --forbidden-root "/home/kandelo-homebrew-build"
            --out-env "$RUNNER_TEMP/homebrew-verified-input/build.env"
            --out-bottle-json "$RUNNER_TEMP/homebrew-verified-input/bottle.json"
          )
          bash scripts/dev-shell.sh env \
            KANDELO_HOMEBREW_RESOLVED_TAPS_FILE="$KANDELO_HOMEBREW_RESOLVED_TAPS_FILE" \
            bash scripts/homebrew-validate-build-handoff.sh "${validation_args[@]}"

      - name: Create local dry-run upload receipt
        if: ${{ inputs.dry-run && steps.build-handoff.outcome == 'success' && steps.oci-child.outcome == 'success' }}
        shell: bash
        env:
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
        run: |
          set -euo pipefail
          cd kandelo
          upload_args=(
            --layout "$RUNNER_TEMP/homebrew-oci-child/layout"
            --layout-receipt "$RUNNER_TEMP/homebrew-oci-child/receipt.json"
            --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY"
            --tap-name "$KANDELO_HOMEBREW_TAP_NAME"
            --formula "$KANDELO_HOMEBREW_FORMULA"
            --auth-mode automatic
            --require-pat false
            --destination-mode repository
            --out-json "$RUNNER_TEMP/homebrew-upload-receipt/receipt.json"
            --dry-run
          )
          bash scripts/dev-shell.sh bash scripts/homebrew-ghcr-upload.sh "${upload_args[@]}"

      - name: Validate receipt against exact bottle bytes
        if: ${{ inputs.dry-run || steps.upload-receipt.outcome == 'success' }}
        shell: bash
        env:
          KANDELO_HOMEBREW_ARCH: ${{ matrix.arch }}
          KANDELO_HOMEBREW_DRY_RUN: ${{ inputs.dry-run }}
          KANDELO_HOMEBREW_BOTTLE_ROOT_URL: ${{ needs.plan.outputs.bottle-root-prefix }}
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_KANDELO_COMMIT: ${{ needs.plan.outputs.kandelo-sha }}
          KANDELO_HOMEBREW_RELEASE_TAG: ${{ needs.plan.outputs.release-tag }}
          KANDELO_HOMEBREW_TAP_COMMIT: ${{ needs.plan.outputs.tap-sha }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
        run: |
          set -euo pipefail
          cd kandelo
          receipt_args=(
            --receipt "$RUNNER_TEMP/homebrew-upload-receipt/receipt.json"
            --handoff "$RUNNER_TEMP/homebrew-build-handoff"
            --formula "$KANDELO_HOMEBREW_FORMULA"
            --arch "$KANDELO_HOMEBREW_ARCH"
            --release-tag "$KANDELO_HOMEBREW_RELEASE_TAG"
            --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY"
            --tap-name "$KANDELO_HOMEBREW_TAP_NAME"
            --tap-commit "$KANDELO_HOMEBREW_TAP_COMMIT"
            --kandelo-commit "$KANDELO_HOMEBREW_KANDELO_COMMIT"
            --bottle-root-url "$KANDELO_HOMEBREW_BOTTLE_ROOT_URL"
            --forbidden-root "$GITHUB_WORKSPACE"
            --forbidden-root "$(dirname "$GITHUB_WORKSPACE")"
            --forbidden-root "$RUNNER_TEMP"
            --forbidden-root "/home/kandelo-homebrew-build"
            --out-env "$RUNNER_TEMP/homebrew-verified-input/receipt.env"
            --out-bottle-json "$RUNNER_TEMP/homebrew-verified-input/bottle.json"
          )
          if [ "$KANDELO_HOMEBREW_DRY_RUN" = "true" ]; then
            receipt_args+=(--allow-dry-run)
          fi
          bash scripts/dev-shell.sh env \
            KANDELO_HOMEBREW_RESOLVED_TAPS_FILE="$KANDELO_HOMEBREW_RESOLVED_TAPS_FILE" \
            bash scripts/homebrew-validate-upload-receipt.sh "${receipt_args[@]}"

      - name: Validate exact public Homebrew index traversal without credentials
        if: ${{ !inputs.dry-run && steps.index-publication.outcome == 'success' }}
        shell: bash
        env:
          KANDELO_HOMEBREW_ARCH: ${{ matrix.arch }}
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
        run: |
          set -euo pipefail
          for secret_name in GH_TOKEN GITHUB_TOKEN HOMEBREW_GITHUB_API_TOKEN \
            HOMEBREW_GITHUB_PACKAGES_TOKEN HOMEBREW_DOCKER_REGISTRY_TOKEN; do
            [ -z "${!secret_name:-}" ] || {
              echo "::error::public Homebrew index verifier received $secret_name"; exit 2;
            }
          done
          cd kandelo
          layout_receipt="$RUNNER_TEMP/homebrew-index-publication/layout-receipt.json"
          transport_receipt="$RUNNER_TEMP/homebrew-index-publication/transport-receipt.json"
          bash scripts/dev-shell.sh python3 scripts/homebrew-oci-layout.py \
            validate-index-receipt --receipt "$layout_receipt"
          bash scripts/dev-shell.sh python3 scripts/homebrew-oci-layout.py \
            validate-publication-receipt \
            --receipt "$transport_receipt" \
            --layout-receipt "$layout_receipt" \
            --kind index \
            --formula "$KANDELO_HOMEBREW_FORMULA" \
            --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY" \
            --tap-name "$KANDELO_HOMEBREW_TAP_NAME"
          tap_repository="$(printf '%s' "$KANDELO_HOMEBREW_TAP_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          remote="ghcr.io/${tap_repository}/${KANDELO_HOMEBREW_FORMULA}"
          jq -e \
            --slurpfile layout "$layout_receipt" \
            --slurpfile child "$RUNNER_TEMP/homebrew-oci-child/receipt.json" \
            --arg arch "$KANDELO_HOMEBREW_ARCH" \
            '
              ([$layout[0].children[] | select(.arch == $arch)] | length) == 1 and
              ($layout[0].children[] | select(.arch == $arch) |
                .bottle_sha256 == $child[0].bottle.sha256 and
                .manifest_digest == $child[0].oci.manifest.digest and
                .homebrew_ref == $child[0].oci.homebrew_ref)
            ' "$layout_receipt" >/dev/null
          anonymous_config="$RUNNER_TEMP/homebrew-index-anonymous-oras.json"
          printf '{"auths":{}}\n' >"$anonymous_config"
          top_ref="$(jq -er '.top.ref' "$layout_receipt")"
          imported="$RUNNER_TEMP/homebrew-public-index"
          bash scripts/dev-shell.sh env -u GH_TOKEN -u GITHUB_TOKEN \
            -u HOMEBREW_GITHUB_API_TOKEN -u HOMEBREW_GITHUB_PACKAGES_TOKEN \
            -u HOMEBREW_DOCKER_REGISTRY_TOKEN oras cp \
            --from-registry-config "$anonymous_config" --to-oci-layout \
            "$remote:$top_ref" "$imported:$top_ref"
          bash scripts/dev-shell.sh python3 scripts/homebrew-oci-layout.py validate-index \
            --layout "$imported" --receipt "$layout_receipt"

      - name: Fail when a required handoff is absent
        if: ${{ always() && (steps.build-handoff.outcome != 'success' || steps.oci-child.outcome != 'success' || (!inputs.dry-run && (steps.upload-receipt.outcome != 'success' || steps.index-publication.outcome != 'success'))) }}
        shell: bash
        run: |
          echo "::error::the build handoff or upload receipt for this matrix entry is absent"
          exit 1

      - name: Build Kandelo sysroot for sidecar evidence
        shell: bash
        env:
          KANDELO_HOMEBREW_ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail
          expected_sha="$(git -C kandelo rev-parse HEAD)"
          [ "$(git -C kandelo-sysroot-build rev-parse HEAD)" = "$expected_sha" ] || {
            echo "::error::Kandelo sysroot build source differs from the verifier source"; exit 2;
          }
          [ -z "$(git -C kandelo-sysroot-build status --short)" ] || {
            echo "::error::Kandelo sysroot build source is dirty before the build"; exit 2;
          }
          cd kandelo-sysroot-build
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git config submodule.musl.url "https://github.com/ifduyue/musl.git"
          fetched=0
          for attempt in 1 2 3; do
            if timeout 180s git submodule update --init --depth 1 libc/musl; then
              fetched=1
              break
            fi
            echo "::warning::libc/musl fetch failed (attempt ${attempt}/3)"
            rm -f .git/index.lock
            find .git/modules -type f -name '*.lock' -delete 2>/dev/null || true
            sleep 10
          done
          [ "$fetched" = "1" ] || {
            echo "::error::failed to fetch libc/musl"; exit 1;
          }
          bash scripts/dev-shell.sh bash scripts/build-musl.sh
          case "$KANDELO_HOMEBREW_ARCH" in
            wasm32) ;;
            wasm64)
              bash scripts/dev-shell.sh bash scripts/build-musl.sh --arch wasm64posix
              ;;
            *)
              echo "::error::unsupported Kandelo Homebrew architecture: $KANDELO_HOMEBREW_ARCH"
              exit 2
              ;;
          esac

      - name: Build Kandelo wasm64 sysroot for the interactive browser graph
        if: ${{ matrix.arch == 'wasm32' && ((matrix.formula == 'file-formula' && inputs.prepublication-staging-tag == '') || (!inputs.defer-vfs-acceptance-until-postpublication && !inputs.dry-run && matrix.formula == needs.plan.outputs.vfs-acceptance-formula)) }}
        shell: bash
        run: |
          set -euo pipefail
          cd kandelo-sysroot-build
          bash scripts/dev-shell.sh bash scripts/build-musl.sh --arch wasm64posix
          [ -f sysroot64/lib/libc.a ] || {
            echo "::error::interactive browser graph wasm64 sysroot is incomplete"; exit 1;
          }

      - name: Build exact Kandelo kernel
        shell: bash
        run: |
          cd kandelo
          bash scripts/dev-shell.sh bash packages/registry/kernel/build-kernel.sh

      - name: Build exact fork-instrument host tool for bottle tests
        shell: bash
        run: |
          cd kandelo
          bash scripts/dev-shell.sh bash scripts/build-fork-instrument-tool.sh

      - name: Install JavaScript dependencies
        shell: bash
        run: |
          cd kandelo
          bash scripts/dev-shell.sh bash -c '
            set -euo pipefail
            PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund
            cd host
            PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund
            cd ../apps/browser-demos
            PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1 npm ci --no-audit --no-fund
          '

      - name: Prepare the supported interactive browser demo graph
        if: ${{ matrix.arch == 'wasm32' && (matrix.formula == 'file-formula' || (!inputs.defer-vfs-acceptance-until-postpublication && !inputs.dry-run && matrix.formula == needs.plan.outputs.vfs-acceptance-formula)) }}
        shell: bash
        env:
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          PREPUBLICATION_STAGING_TAG: ${{ inputs.prepublication-staging-tag }}
        run: |
          set -euo pipefail
          if [ -n "$PREPUBLICATION_STAGING_TAG" ] &&
             [ "$KANDELO_HOMEBREW_FORMULA" = "file-formula" ]; then
            # WHY: the root browser route statically imports the full demo
            # graph, including post-T42 packages this bootstrap exists to
            # publish. The focused Homebrew VFS page imports only the exact
            # local kernel and the externally supplied test VFS, so build its
            # host without resolving unrelated demo packages. Postpublication
            # main-shell Chromium acceptance closes the full UI integration.
            cd kandelo
            bash scripts/dev-shell.sh ./run.sh build host
            exit 0
          fi
          for sysroot_name in sysroot sysroot64; do
            sysroot_source="$GITHUB_WORKSPACE/kandelo-sysroot-build/$sysroot_name"
            sysroot_destination="$GITHUB_WORKSPACE/kandelo/$sysroot_name"
            [ -d "$sysroot_source" ] && [ ! -L "$sysroot_source" ] && \
              [ -f "$sysroot_source/lib/libc.a" ] || {
              echo "::error::exact browser $sysroot_name handoff is missing or invalid"; exit 1;
            }
            [ ! -e "$sysroot_destination" ] && [ ! -L "$sysroot_destination" ] || {
              echo "::error::browser verifier $sysroot_name destination already exists"; exit 1;
            }
            cp -a -- "$sysroot_source" "$sysroot_destination"
            [ -f "$sysroot_destination/lib/libc.a" ] || {
              echo "::error::browser verifier $sysroot_name handoff is incomplete"; exit 1;
            }
          done
          cd kandelo
          bash scripts/dev-shell.sh ./run.sh --fetch-only prepare-browser

      - name: Materialize Formula verification platform runtime
        id: formula-verification-runtime
        shell: bash
        run: |
          set -euo pipefail
          cd kandelo
          bash scripts/dev-shell.sh bash -c '
            set -euo pipefail
            host="$(rustc -vV | sed -n "s/^host: //p")"
            [ -n "$host" ] || {
              echo "unable to resolve the Rust host target" >&2
              exit 2
            }
            cargo build --release -p xtask --target "$host" --quiet
            xtask="$PWD/target/$host/release/xtask"
            [ -f "$xtask" ] && [ ! -L "$xtask" ] && [ -x "$xtask" ] &&
              [ "$(realpath -- "$xtask")" = "$xtask" ] || {
              echo "prepared Formula verification xtask is not an exact executable" >&2
              exit 2
            }
            # Verification has the same Cargo hardlink boundary as the build.
            # Use the shared byte-for-byte seal so both isolated Formula paths
            # receive the same single-link authority.
            sealed_xtask="$(
              bash scripts/seal-homebrew-formula-checker.sh \
                --root "$PWD" \
                --checker "$xtask"
            )"
            [ "$sealed_xtask" = "$xtask" ] || {
              echo "Formula verification checker seal selected another executable" >&2
              exit 2
            }
            printf "xtask-bin=%s\n" "$xtask" >>"$GITHUB_OUTPUT"
            for package in dash coreutils grep sed rootfs; do
              "$xtask" \
                build-deps --arch wasm32 \
                --binaries-dir "$PWD/binaries" --fetch-only resolve "$package"
            done
            cache_root="$("$xtask" build-deps cache-root)"
            case "$cache_root" in
              /*) ;;
              *) echo "Formula verification cache root is not absolute" >&2; exit 2 ;;
            esac
            # WHY: prepare-browser also resolves packages into binaries/.
            # Materialize after that last writer so the read-only Formula
            # identity receives one coherent portable generation snapshot.
            bash scripts/materialize-resolver-binaries.sh \
              "$PWD/binaries" "$cache_root"
          '

      - name: Compose only reconstructed bottle metadata into the fresh tap
        shell: bash
        run: |
          set -euo pipefail
          cd kandelo
          # shellcheck disable=SC1091
          . "$RUNNER_TEMP/homebrew-verified-input/receipt.env"
          merged_tap="$RUNNER_TEMP/homebrew-merged-tap"
          rm -rf "$merged_tap"
          cp -a "$GITHUB_WORKSPACE/tap" "$merged_tap"
          merge_args=(
            --tap-root "$merged_tap"
            --tap-repository "$TAP_REPOSITORY"
            --tap-name "$TAP_NAME"
            --formula "$FORMULA"
            --arch "$ARCH"
            --release-tag "$RELEASE_TAG"
            --bottle-json "$BOTTLE_JSON"
            --expected-sha256 "$BOTTLE_SHA256"
            --expected-root-url "$BOTTLE_ROOT_URL"
            --expected-cellar "$BOTTLE_RELOCATION_CELLAR"
          )
          bash scripts/dev-shell.sh bash scripts/homebrew-merge-bottle-json.sh "${merge_args[@]}"
          changed="$(git -C "$merged_tap" diff --name-only)"
          case "$changed" in
            ""|"Formula/$FORMULA.rb") ;;
            *) echo "::error::bottle merge changed files outside Formula/$FORMULA.rb"; exit 1 ;;
          esac
          [ -z "$(git -C "$GITHUB_WORKSPACE/tap" status --short)" ] || {
            echo "::error::bottle merge modified the archived source tap"; exit 1;
          }

      - name: Select exact anonymous bottle bytes for runtime validation
        shell: bash
        env:
          KANDELO_HOMEBREW_DRY_RUN: ${{ inputs.dry-run }}
        run: |
          set -euo pipefail
          cd kandelo
          # shellcheck disable=SC1091
          . "$RUNNER_TEMP/homebrew-verified-input/receipt.env"
          bottle_cache="$RUNNER_TEMP/homebrew-bottle-cache"
          runtime_bottle="$bottle_cache/$BOTTLE_FILENAME"
          selection_receipt="$RUNNER_TEMP/homebrew-verified-input/selection-receipt.json"
          mkdir -p "$bottle_cache"
          if [ "$KANDELO_HOMEBREW_DRY_RUN" = "true" ]; then
            cp "$BOTTLE_ARCHIVE" "$runtime_bottle"
            selection_mode="local-dry-run"
            fetch_record="selected local dry-run bottle sha256:$BOTTLE_SHA256"
          else
            verifier_args=(
              --url "$BOTTLE_URL"
              --sha256 "$BOTTLE_SHA256"
              --bytes "$BOTTLE_BYTES"
              --out "$runtime_bottle"
            )
            bash scripts/dev-shell.sh npx tsx scripts/homebrew-verify-public-bottle.ts "${verifier_args[@]}"
            selection_mode="anonymous-public-readback"
            fetch_record="anonymously downloaded $BOTTLE_URL with sha256:$BOTTLE_SHA256"
          fi
          actual_sha="$(sha256sum "$runtime_bottle" | awk '{print $1}')"
          actual_bytes="$(wc -c <"$runtime_bottle" | tr -d '[:space:]')"
          [ "$actual_sha" = "$BOTTLE_SHA256" ] && [ "$actual_bytes" = "$BOTTLE_BYTES" ] || {
            echo "::error::selected runtime bottle differs from the validated receipt"; exit 1;
          }
          jq -nS \
            --arg mode "$selection_mode" \
            --arg url "$BOTTLE_URL" \
            --arg sha256 "$BOTTLE_SHA256" \
            --argjson bytes "$BOTTLE_BYTES" \
            --arg fetch "$fetch_record" \
            '{schema: 1, status: "success", bottle: {
              mode: $mode, url: $url, sha256: $sha256, bytes: $bytes
            }, fetch: [$fetch]}' >"$selection_receipt"
          {
            printf 'RUNTIME_BOTTLE=%q\n' "$runtime_bottle"
            printf 'BOTTLE_CACHE=%q\n' "$bottle_cache"
            printf 'SELECTION_RECEIPT=%q\n' "$selection_receipt"
          } >"$RUNNER_TEMP/homebrew-verified-input/runtime.env"

      - name: Create isolated bottle verification identity
        id: verifier-identity
        shell: bash
        run: |
          set -euo pipefail
          build_user="kandelo-homebrew-verify"
          build_home="/home/$build_user"
          sudo_bin="/usr/bin/sudo"
          systemd_run_bin="/usr/bin/systemd-run"
          systemctl_bin="/usr/bin/systemctl"
          getent_bin="/usr/bin/getent"
          findmnt_bin="/usr/bin/findmnt"
          pgrep_bin="/usr/bin/pgrep"
          pkill_bin="/usr/bin/pkill"
          useradd_bin="/usr/sbin/useradd"
          sudo_mode="$(stat -c '%a' "$sudo_bin" 2>/dev/null || true)"
          if [ ! -f "$sudo_bin" ] || [ -L "$sudo_bin" ] || [ ! -x "$sudo_bin" ] || \
             [ "$(stat -c '%u' "$sudo_bin" 2>/dev/null || true)" != "0" ] || \
             ! [[ "$sudo_mode" =~ ^[0-7]{3,4}$ ]] || \
             [ $((8#$sudo_mode & 0022)) -ne 0 ]; then
            echo "::error::runner sudo boundary is unavailable"; exit 2
          fi
          for protected_bin in "$systemd_run_bin" "$systemctl_bin" "$getent_bin" "$findmnt_bin" "$pgrep_bin" \
            "$useradd_bin"; do
            protected_mode="$(stat -c '%a' "$protected_bin" 2>/dev/null || true)"
            if [ ! -f "$protected_bin" ] || [ -L "$protected_bin" ] || \
               [ ! -x "$protected_bin" ] || \
               [ "$(stat -c '%u' "$protected_bin" 2>/dev/null || true)" != "0" ] || \
               ! [[ "$protected_mode" =~ ^[0-7]{3,4}$ ]] || \
               [ $((8#$protected_mode & 0022)) -ne 0 ]; then
              echo "::error::protected verifier process boundary is unavailable: $protected_bin"; exit 2
            fi
          done
          pkill_target="$(readlink -f -- "$pkill_bin" 2>/dev/null || true)"
          pkill_parent="$(dirname "$pkill_bin")"
          pkill_parent_mode="$(stat -c '%a' "$pkill_parent" 2>/dev/null || true)"
          if [ -L "$pkill_bin" ]; then
            if [ "$pkill_target" != "$pgrep_bin" ] || \
               [ "$(stat -c '%u' "$pkill_bin" 2>/dev/null || true)" != "0" ] || \
               [ "$(stat -c '%u' "$pkill_parent" 2>/dev/null || true)" != "0" ] || \
               ! [[ "$pkill_parent_mode" =~ ^[0-7]{3,4}$ ]] || \
               [ $((8#$pkill_parent_mode & 0022)) -ne 0 ]; then
              echo "::error::protected verifier pkill boundary is unavailable"; exit 2
            fi
          else
            pkill_mode="$(stat -c '%a' "$pkill_bin" 2>/dev/null || true)"
            if [ ! -f "$pkill_bin" ] || [ ! -x "$pkill_bin" ] || \
               [ "$(stat -c '%u' "$pkill_bin" 2>/dev/null || true)" != "0" ] || \
               ! [[ "$pkill_mode" =~ ^[0-7]{3,4}$ ]] || \
               [ $((8#$pkill_mode & 0022)) -ne 0 ]; then
              echo "::error::protected verifier pkill boundary is unavailable"; exit 2
            fi
          fi
          [ -d /run/systemd/system ] || {
            echo "::error::runner systemd manager is unavailable"; exit 2;
          }
          "$sudo_bin" -n true || {
            echo "::error::runner cannot establish the privileged verifier boundary"; exit 2;
          }
          "$sudo_bin" -n -- "$systemctl_bin" show --property=Version --value >/dev/null || {
            echo "::error::runner systemd manager is unavailable"; exit 2;
          }
          "$systemd_run_bin" --help | grep -F -- '--expand-environment=' >/dev/null || {
            echo "::error::runner systemd cannot preserve exact Brew arguments"; exit 2;
          }
          if id "$build_user" >/dev/null 2>&1; then
            echo "::error::reserved bottle verifier user already exists"; exit 2
          fi
          "$sudo_bin" -n -- "$useradd_bin" --system --user-group --create-home \
            --home-dir "$build_home" --shell /usr/sbin/nologin "$build_user"
          echo "created=true" >> "$GITHUB_OUTPUT"
          [ "$(id -u "$build_user")" != "$(id -u)" ] || {
            echo "::error::bottle verifier identity is not isolated"; exit 2;
          }
          if "$sudo_bin" -n -u "$build_user" -- "$sudo_bin" -n true >/dev/null 2>&1; then
            echo "::error::bottle verifier identity unexpectedly has sudo access"; exit 2
          fi
          shared_temp="$(mktemp -d /tmp/kandelo-homebrew-verify.XXXXXX)"
          "$sudo_bin" chown root:root "$shared_temp"
          "$sudo_bin" chmod 1777 "$shared_temp"
          mkdir "$shared_temp/cache" "$shared_temp/tmp"
          {
            echo "KANDELO_HOMEBREW_BUILD_USER=$build_user"
            echo "KANDELO_HOMEBREW_SHARED_TEMP=$shared_temp"
            echo "KANDELO_HOMEBREW_SUDO_BIN=$sudo_bin"
            echo "KANDELO_HOMEBREW_SYSTEMD_RUN_BIN=$systemd_run_bin"
            echo "KANDELO_HOMEBREW_SYSTEMCTL_BIN=$systemctl_bin"
            echo "KANDELO_HOMEBREW_GETENT_BIN=$getent_bin"
            echo "KANDELO_HOMEBREW_PGREP_BIN=$pgrep_bin"
            echo "KANDELO_HOMEBREW_PKILL_BIN=$pkill_bin"
            echo "HOMEBREW_CACHE=$shared_temp/cache"
            echo "HOMEBREW_TEMP=$shared_temp/tmp"
          } >> "$GITHUB_ENV"

      - name: Provision Formula browser runtime for bottle verification
        shell: bash
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/kandelo"
          bash scripts/dev-shell.sh env \
            KANDELO_HOMEBREW_SHARED_TEMP="$KANDELO_HOMEBREW_SHARED_TEMP" \
            KANDELO_HOMEBREW_BUILD_USER="$KANDELO_HOMEBREW_BUILD_USER" \
            KANDELO_HOMEBREW_SUDO_BIN="$KANDELO_HOMEBREW_SUDO_BIN" \
            bash -c '
              set -euo pipefail
              node_bin="$(command -v node)"
              case "$node_bin" in
                /nix/store/*/bin/node) ;;
                *)
                  echo "Formula browser provisioning resolved an undeclared Node: $node_bin" >&2
                  exit 2
                  ;;
              esac
              bash scripts/homebrew-provision-formula-browser.sh \
                --shared-temp "$KANDELO_HOMEBREW_SHARED_TEMP" \
                --build-user "$KANDELO_HOMEBREW_BUILD_USER" \
                --sudo-bin "$KANDELO_HOMEBREW_SUDO_BIN" \
                --node-bin "$node_bin" \
                --browser-app "$PWD/apps/browser-demos"
            '

      - name: Force-pour and test the exact selected bottle without credentials
        shell: bash
        env:
          KANDELO_HOMEBREW_ARCH: ${{ matrix.arch }}
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_RELEASE_ABI: ${{ needs.plan.outputs.abi }}
          KANDELO_HOMEBREW_TAP_COMMIT: ${{ needs.plan.outputs.tap-sha }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
          WASM_POSIX_XTASK_BIN: ${{ steps.formula-verification-runtime.outputs.xtask-bin }}
        run: |
          set -euo pipefail
          for secret_name in GH_TOKEN GITHUB_TOKEN HOMEBREW_GITHUB_API_TOKEN \
            HOMEBREW_GITHUB_PACKAGES_TOKEN HOMEBREW_DOCKER_REGISTRY_TOKEN; do
            [ -z "${!secret_name:-}" ] || {
              echo "::error::credential-free bottle verifier received $secret_name"; exit 2;
            }
          done
          cd kandelo
          # shellcheck disable=SC1091
          . "$RUNNER_TEMP/homebrew-verified-input/receipt.env"
          # shellcheck disable=SC1091
          . "$RUNNER_TEMP/homebrew-verified-input/runtime.env"
          runtime_evidence="$RUNNER_TEMP/homebrew-runtime-evidence/runtime-evidence.json"
          workflow_command_token="$(/usr/bin/od -An -N32 -tx1 /dev/urandom | /usr/bin/tr -d ' \n')"
          [[ "$workflow_command_token" =~ ^[0-9a-f]{64}$ ]] || {
            echo "::error::could not create the verifier workflow-command boundary"; exit 2;
          }
          workflow_commands_stopped=0
          resume_workflow_commands() {
            if [ "$workflow_commands_stopped" = "1" ]; then
              printf '::%s::\n' "$workflow_command_token"
              workflow_commands_stopped=0
            fi
          }
          restore_workflow_commands_on_exit() {
            status="$?"
            set +e
            resume_workflow_commands
            exit "$status"
          }
          trap restore_workflow_commands_on_exit EXIT
          workflow_commands_stopped=1
          printf '::stop-commands::%s\n' "$workflow_command_token"
          bash scripts/dev-shell.sh env \
            WASM_POSIX_XTASK_BIN="$WASM_POSIX_XTASK_BIN" \
            KANDELO_HOMEBREW_RESOLVED_TAPS_FILE="$KANDELO_HOMEBREW_RESOLVED_TAPS_FILE" \
            bash scripts/homebrew-verify-poured-bottle.sh \
            --tap-root "$RUNNER_TEMP/homebrew-merged-tap" \
            --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY" \
            --tap-name "$KANDELO_HOMEBREW_TAP_NAME" \
            --tap-commit "$KANDELO_HOMEBREW_TAP_COMMIT" \
            --formula "$KANDELO_HOMEBREW_FORMULA" \
            --arch "$KANDELO_HOMEBREW_ARCH" \
            --abi "$KANDELO_HOMEBREW_RELEASE_ABI" \
            --bottle "$RUNTIME_BOTTLE" \
            --bottle-json "$RUNNER_TEMP/homebrew-verified-input/bottle.json" \
            --bottle-url "$BOTTLE_URL" \
            --bottle-sha256 "$BOTTLE_SHA256" \
            --bottle-bytes "$BOTTLE_BYTES" \
            --bottle-root-url "$BOTTLE_ROOT_URL" \
            --dependency-provenance "$DEPENDENCY_PROVENANCE" \
            --selection-receipt "$SELECTION_RECEIPT" \
            --sysroot-build-root "$GITHUB_WORKSPACE/kandelo-sysroot-build" \
            --out "$runtime_evidence"
          resume_workflow_commands
          trap - EXIT

      - name: Retire isolated bottle verification identity
        if: ${{ always() && steps.verifier-identity.outputs.created == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          build_user="kandelo-homebrew-verify"
          build_uid="$(id -u "$build_user")"
          sudo_bin="/usr/bin/sudo"
          systemctl_bin="/usr/bin/systemctl"
          pgrep_bin="/usr/bin/pgrep"
          pkill_bin="/usr/bin/pkill"
          userdel_bin="/usr/sbin/userdel"
          slice="kandelo-homebrew-build-${build_uid}.slice"
          uid_has_processes() {
            local status
            if "$sudo_bin" -n -- "$pgrep_bin" -u "$build_uid" >/dev/null 2>&1; then
              return 0
            else
              status="$?"
            fi
            [ "$status" -eq 1 ] && return 1
            echo "::error::could not inspect bottle verifier processes"
            return 2
          }
          "$sudo_bin" -n -- "$systemctl_bin" stop "$slice" >/dev/null 2>&1 || true
          "$sudo_bin" -n -- "$pkill_bin" -TERM -u "$build_uid" >/dev/null 2>&1 || true
          for ((attempt = 0; attempt < 50; attempt++)); do
            if uid_has_processes; then sleep 0.1; continue; else status="$?"; fi
            [ "$status" -eq 1 ] && break
            exit "$status"
          done
          if uid_has_processes; then
            "$sudo_bin" -n -- "$pkill_bin" -KILL -u "$build_uid" >/dev/null 2>&1 || true
            sleep 1
          else
            status="$?"; [ "$status" -eq 1 ] || exit "$status"
          fi
          if uid_has_processes; then
            echo "::error::bottle verifier identity still owns live processes"; exit 1
          else
            status="$?"; [ "$status" -eq 1 ] || exit "$status"
          fi
          "$sudo_bin" -n -- "$userdel_bin" -r "$build_user"
          if id "$build_user" >/dev/null 2>&1; then
            echo "::error::bottle verifier identity still exists after retirement"; exit 1
          fi

      - name: Checkout exact post-verification Kandelo generator source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ inputs.kandelo-repository }}
          ref: ${{ needs.plan.outputs.kandelo-sha }}
          path: kandelo-postverify
          submodules: false

      - name: Checkout exact post-verification tap source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ inputs.tap-repository }}
          ref: ${{ needs.plan.outputs.tap-sha }}
          path: tap-postverify

      - name: Checkout exact post-verification core dependency tap source
        if: ${{ needs.plan.outputs.core-dependency-tap-sha != '' }}
        shell: bash
        env:
          CORE_TAP_SHA: ${{ needs.plan.outputs.core-dependency-tap-sha }}
        run: |
          /usr/bin/bash kandelo-postverify/scripts/homebrew-checkout-public-tap.sh \
            kandelo-dev/homebrew-tap-core "$CORE_TAP_SHA" \
            "$GITHUB_WORKSPACE/dependency-taps/core-postverify"

      - name: Reconstruct the verified Formula with fresh trusted generators
        shell: bash
        env:
          CORE_TAP_SHA: ${{ needs.plan.outputs.core-dependency-tap-sha }}
          HOMEBREW_BREW_COMMIT: 34c40c18ffa2029b611b61c73273e32c003d0842
          KANDELO_SHA: ${{ needs.plan.outputs.kandelo-sha }}
          TAP_NAME: ${{ inputs.tap-name }}
          TAP_REPOSITORY: ${{ inputs.tap-repository }}
          TAP_SHA: ${{ needs.plan.outputs.tap-sha }}
        run: |
          set -euo pipefail
          [ "$(git -C kandelo-postverify rev-parse HEAD)" = "$KANDELO_SHA" ] || {
            echo "::error::post-verification Kandelo generator differs from the plan"; exit 2;
          }
          [ -z "$(git -C kandelo-postverify status --short)" ] || {
            echo "::error::post-verification Kandelo generator checkout is dirty"; exit 2;
          }
          [ "$(git -C tap-postverify rev-parse HEAD)" = "$TAP_SHA" ] || {
            echo "::error::post-verification tap differs from the plan"; exit 2;
          }
          [ -z "$(git -C tap-postverify status --short)" ] || {
            echo "::error::post-verification tap checkout is dirty"; exit 2;
          }
          dependency_args=()
          if [ -n "$CORE_TAP_SHA" ]; then
            for root in dependency-taps/core dependency-taps/core-postverify; do
              [ "$(git -C "$root" rev-parse HEAD)" = "$CORE_TAP_SHA" ] || {
                echo "::error::post-verification core dependency tap differs from the lock"; exit 2;
              }
              [ -z "$(git -C "$root" status --short --untracked-files=no)" ] || {
                echo "::error::runtime verification modified the core dependency tap"; exit 2;
              }
            done
            dependency_args+=(--dependency-root \
              "kandelo-dev/tap-core=$GITHUB_WORKSPACE/dependency-taps/core-postverify")
          fi
          resolved="$RUNNER_TEMP/homebrew-resolved-taps-postverify.json"
          python3 kandelo-postverify/scripts/homebrew-dependency-taps.py resolve \
            --tap-root "$GITHUB_WORKSPACE/tap-postverify" \
            --tap-name "$TAP_NAME" \
            --tap-repository "$TAP_REPOSITORY" \
            --tap-commit "$TAP_SHA" \
            "${dependency_args[@]}" \
            --out "$resolved"
          echo "KANDELO_HOMEBREW_RESOLVED_TAPS_FILE=$resolved" >> "$GITHUB_ENV"
          brew_repository="$GITHUB_WORKSPACE/homebrew-prefix/Homebrew"
          [ "$(git -C "$brew_repository" rev-parse HEAD)" = "$HOMEBREW_BREW_COMMIT" ] || {
            echo "::error::Homebrew moved during exact-bottle verification"; exit 2;
          }
          [ -z "$(git -C "$brew_repository" status --short --untracked-files=no)" ] || {
            echo "::error::exact-bottle verification modified reviewed Homebrew source"; exit 2;
          }
          cd kandelo-postverify
          # shellcheck disable=SC1091
          . "$RUNNER_TEMP/homebrew-verified-input/receipt.env"
          merged_tap="$RUNNER_TEMP/homebrew-merged-tap-postverify"
          rm -rf "$merged_tap"
          cp -a "$GITHUB_WORKSPACE/tap-postverify" "$merged_tap"
          bash scripts/dev-shell.sh bash scripts/homebrew-merge-bottle-json.sh \
            --tap-root "$merged_tap" \
            --tap-repository "$TAP_REPOSITORY" \
            --tap-name "$TAP_NAME" \
            --formula "$FORMULA" \
            --arch "$ARCH" \
            --release-tag "$RELEASE_TAG" \
            --bottle-json "$BOTTLE_JSON" \
            --expected-sha256 "$BOTTLE_SHA256" \
            --expected-root-url "$BOTTLE_ROOT_URL" \
            --expected-cellar "$BOTTLE_RELOCATION_CELLAR"
          cmp "$merged_tap/Formula/$FORMULA.rb" \
            "$RUNNER_TEMP/homebrew-merged-tap/Formula/$FORMULA.rb" || {
              echo "::error::fresh generator reconstructed different Formula bytes"; exit 1;
            }

      - name: Generate sidecars from the selected bottle
        shell: bash
        env:
          CORE_TAP_SHA: ${{ needs.plan.outputs.core-dependency-tap-sha }}
          HOMEBREW_BREW_COMMIT: 34c40c18ffa2029b611b61c73273e32c003d0842
        run: |
          set -euo pipefail
          cd kandelo-postverify
          # shellcheck disable=SC1091
          . "$RUNNER_TEMP/homebrew-verified-input/receipt.env"
          # shellcheck disable=SC1091
          . "$RUNNER_TEMP/homebrew-verified-input/runtime.env"
          export KANDELO_HOMEBREW_TAP_ROOT="$RUNNER_TEMP/homebrew-merged-tap-postverify"
          export KANDELO_HOMEBREW_FORMULA_SOURCE_ROOT="$GITHUB_WORKSPACE/tap-postverify"
          export KANDELO_HOMEBREW_BUILD_ROOT="$GITHUB_WORKSPACE/kandelo-sysroot-build"
          export KANDELO_HOMEBREW_SIDECAR_ROOT="$RUNNER_TEMP/homebrew-sidecars"
          export KANDELO_HOMEBREW_FORMULA="$FORMULA"
          export KANDELO_HOMEBREW_ARCH="$ARCH"
          export KANDELO_HOMEBREW_RELEASE_TAG="$RELEASE_TAG"
          export KANDELO_HOMEBREW_TAP_REPOSITORY="$TAP_REPOSITORY"
          export KANDELO_HOMEBREW_TAP_NAME="$TAP_NAME"
          export KANDELO_HOMEBREW_BOTTLE_ARCHIVE="$RUNTIME_BOTTLE"
          export KANDELO_HOMEBREW_BOTTLE_JSON="$RUNNER_TEMP/homebrew-verified-input/bottle.json"
          export KANDELO_HOMEBREW_BOTTLE_ROOT_URL="$BOTTLE_ROOT_URL"
          export KANDELO_HOMEBREW_BOTTLE_URL="$BOTTLE_URL"
          export KANDELO_HOMEBREW_BOTTLE_SHA256="$BOTTLE_SHA256"
          export KANDELO_HOMEBREW_BOTTLE_BYTES="$BOTTLE_BYTES"
          export KANDELO_HOMEBREW_DEPENDENCY_PROVENANCE="$DEPENDENCY_PROVENANCE"
          export KANDELO_HOMEBREW_RUNTIME_EVIDENCE="$RUNNER_TEMP/homebrew-runtime-evidence/runtime-evidence.json"
          export KANDELO_HOMEBREW_FORBIDDEN_ROOTS_JSON="$(jq -cn \
            --arg github_workspace "$GITHUB_WORKSPACE" \
            --arg runner_workspace "$(dirname "$GITHUB_WORKSPACE")" \
            --arg runner_temp "$RUNNER_TEMP" \
            --arg build_home "/home/kandelo-homebrew-build" \
            '[$github_workspace, $runner_workspace, $runner_temp, $build_home]')"
          bash scripts/dev-shell.sh env \
            KANDELO_HOMEBREW_RESOLVED_TAPS_FILE="$KANDELO_HOMEBREW_RESOLVED_TAPS_FILE" \
            KANDELO_HOMEBREW_TAP_NAME="$KANDELO_HOMEBREW_TAP_NAME" \
            KANDELO_HOMEBREW_FORBIDDEN_ROOTS_JSON="$KANDELO_HOMEBREW_FORBIDDEN_ROOTS_JSON" \
            bash scripts/homebrew-generate-sidecars-from-env.sh

      - name: Build and strictly smoke the file-formula browser image
        if: ${{ matrix.formula == 'file-formula' && matrix.arch == 'wasm32' }}
        shell: bash
        env:
          HOMEBREW_BREW_COMMIT: 34c40c18ffa2029b611b61c73273e32c003d0842
          PREPUBLICATION_STAGING_TAG: ${{ inputs.prepublication-staging-tag }}
        run: |
          set -euo pipefail
          cd kandelo
          # shellcheck disable=SC1091
          . "$RUNNER_TEMP/homebrew-verified-input/receipt.env"
          # shellcheck disable=SC1091
          . "$RUNNER_TEMP/homebrew-verified-input/runtime.env"
          export KANDELO_HOMEBREW_TAP_ROOT="$RUNNER_TEMP/homebrew-merged-tap-postverify"
          export KANDELO_HOMEBREW_FORMULA_SOURCE_ROOT="$GITHUB_WORKSPACE/tap-postverify"
          export KANDELO_HOMEBREW_BUILD_ROOT="$GITHUB_WORKSPACE/kandelo-sysroot-build"
          export KANDELO_HOMEBREW_SIDECAR_ROOT="$RUNNER_TEMP/homebrew-sidecars"
          export KANDELO_HOMEBREW_FORMULA="$FORMULA"
          export KANDELO_HOMEBREW_ARCH="$ARCH"
          export KANDELO_HOMEBREW_RELEASE_TAG="$RELEASE_TAG"
          export KANDELO_HOMEBREW_TAP_REPOSITORY="$TAP_REPOSITORY"
          export KANDELO_HOMEBREW_TAP_NAME="$TAP_NAME"
          export KANDELO_HOMEBREW_BOTTLE_ARCHIVE="$RUNTIME_BOTTLE"
          export KANDELO_HOMEBREW_BOTTLE_JSON="$RUNNER_TEMP/homebrew-verified-input/bottle.json"
          export KANDELO_HOMEBREW_BOTTLE_ROOT_URL="$BOTTLE_ROOT_URL"
          export KANDELO_HOMEBREW_BOTTLE_URL="$BOTTLE_URL"
          export KANDELO_HOMEBREW_BOTTLE_SHA256="$BOTTLE_SHA256"
          export KANDELO_HOMEBREW_BOTTLE_BYTES="$BOTTLE_BYTES"
          export KANDELO_HOMEBREW_DEPENDENCY_PROVENANCE="$DEPENDENCY_PROVENANCE"
          export KANDELO_HOMEBREW_RUNTIME_EVIDENCE="$RUNNER_TEMP/homebrew-runtime-evidence/runtime-evidence.json"
          export KANDELO_HOMEBREW_FORBIDDEN_ROOTS_JSON="$(jq -cn \
            --arg github_workspace "$GITHUB_WORKSPACE" \
            --arg runner_workspace "$(dirname "$GITHUB_WORKSPACE")" \
            --arg runner_temp "$RUNNER_TEMP" \
            --arg build_home "/home/kandelo-homebrew-build" \
            '[$github_workspace, $runner_workspace, $runner_temp, $build_home]')"
          (
            cd apps/browser-demos
            npx playwright install chromium --with-deps
          )
          bash scripts/dev-shell.sh env \
            KANDELO_HOMEBREW_RESOLVED_TAPS_FILE="$KANDELO_HOMEBREW_RESOLVED_TAPS_FILE" \
            KANDELO_HOMEBREW_TAP_NAME="$KANDELO_HOMEBREW_TAP_NAME" \
            KANDELO_HOMEBREW_FORBIDDEN_ROOTS_JSON="$KANDELO_HOMEBREW_FORBIDDEN_ROOTS_JSON" \
            PREPUBLICATION_STAGING_TAG="$PREPUBLICATION_STAGING_TAG" \
            bash -s <<'KANDELO_HOMEBREW_BROWSER_SMOKE'
            set -euo pipefail
            browser_vfs_root="$RUNNER_TEMP/homebrew-browser-vfs"
            browser_gallery_root="$RUNNER_TEMP/homebrew-browser-gallery"
            browser_public_dir="$GITHUB_WORKSPACE/kandelo/apps/browser-demos/public/__kandelo-smoke"
            browser_port="${KANDELO_PLAYWRIGHT_PORT:-5401}"
            browser_vfs="$browser_vfs_root/homebrew-file-formula.vfs.zst"
            browser_report="$browser_vfs_root/homebrew-file-formula.vfs-report.json"
            playwright_report="$browser_vfs_root/playwright-report.json"
            browser_url="http://127.0.0.1:${browser_port}/__kandelo-smoke/homebrew-file-formula.vfs.zst"
            mkdir -p "$browser_vfs_root" "$browser_gallery_root" "$browser_public_dir"

            vfs_args=(
              --metadata "$KANDELO_HOMEBREW_SIDECAR_ROOT/Kandelo/metadata.json"
              --tap-root "$KANDELO_HOMEBREW_SIDECAR_ROOT"
              --package file-formula
              --arch wasm32
              --runtime node
              --out "$browser_vfs"
              --report "$browser_report"
              --bottle-cache "$RUNNER_TEMP/homebrew-bottle-cache"
              --write-profile
            )
            npx tsx images/vfs/scripts/build-homebrew-vfs-image.ts "${vfs_args[@]}"
            cp "$browser_vfs" "$browser_public_dir/homebrew-file-formula.vfs.zst"

            if [ -n "$PREPUBLICATION_STAGING_TAG" ]; then
              kernel_wasm="$GITHUB_WORKSPACE/kandelo/local-binaries/kernel.wasm"
              [ -f "$browser_vfs" ] && [ ! -L "$browser_vfs" ] || {
                echo "::error::sealed Homebrew browser VFS must be a regular non-symlink file"; exit 2;
              }
              [ -f "$kernel_wasm" ] && [ ! -L "$kernel_wasm" ] || {
                echo "::error::sealed Homebrew browser kernel must be a regular non-symlink file"; exit 2;
              }
              image_sha256="$(sha256sum "$browser_vfs" | awk '{print $1}')"
              kernel_sha256="$(sha256sum "$kernel_wasm" | awk '{print $1}')"
              (
                cd apps/browser-demos
                # WHY: the main browser route imports packages that this
                # sealed bootstrap has not published yet. This focused route
                # is narrower UI coverage, but it is a stronger execution
                # binding: Chromium receives the exact generated VFS, exact
                # local kernel, executable, argv, and expected output.
                # Post-T42 main-shell Chromium acceptance closes the full UI
                # integration after those bottles become canonical.
                playwright_args=(
                  test test/homebrew-brewfile-vfs.spec.ts
                  --project=chromium
                  --grep "the exact dependency-bearing Brewfile VFS boots in Chromium$"
                  --reporter=json
                )
                KANDELO_PLAYWRIGHT_PORT="$browser_port" \
                  KANDELO_BROWSER_DEMO_INPUTS=homebrew-vfs-test \
                  KANDELO_HOMEBREW_ACCEPTANCE_VFS_URL="$browser_url" \
                  KANDELO_HOMEBREW_ACCEPTANCE_VFS_SHA256="$image_sha256" \
                  KANDELO_HOMEBREW_ACCEPTANCE_KERNEL_SHA256="$kernel_sha256" \
                  KANDELO_HOMEBREW_ACCEPTANCE_EXECUTABLE=/home/linuxbrew/.linuxbrew/bin/file \
                  KANDELO_HOMEBREW_ACCEPTANCE_ARGV_JSON='["file","--version"]' \
                  KANDELO_HOMEBREW_ACCEPTANCE_EXPECTED_STDOUT=file-5.45 \
                  npx playwright "${playwright_args[@]}" >"$playwright_report"
              )
            else
              (
                cd apps/browser-demos
                playwright_args=(
                  test test/kandelo-homebrew.spec.ts
                  --project=chromium
                  --grep "Homebrew file-formula VFS image boots in browser and runs file --version$"
                  --reporter=json
                )
                KANDELO_PLAYWRIGHT_PORT="$browser_port" \
                  KANDELO_BROWSER_FILE_FORMULA_VFS_URL="$browser_url" \
                  KANDELO_HOMEBREW_STRICT_PUBLISHER_SMOKE=1 \
                  npx playwright "${playwright_args[@]}" >"$playwright_report"
              )
            fi
            jq -e "
              .stats.expected == 1 and
              .stats.unexpected == 0 and
              .stats.flaky == 0 and
              .stats.skipped == 0
            " "$playwright_report" >/dev/null || {
              echo "::error::strict Homebrew browser smoke did not report exactly one pass"; exit 1;
            }

            browser_evidence="$browser_vfs_root/browser-evidence.json"
            jq -nS \
              --arg formula "$KANDELO_HOMEBREW_FORMULA" \
              --arg arch "$KANDELO_HOMEBREW_ARCH" \
              --arg bottle_sha256 "$KANDELO_HOMEBREW_BOTTLE_SHA256" \
              --arg bottle_url "$KANDELO_HOMEBREW_BOTTLE_URL" \
              --arg command "/home/linuxbrew/.linuxbrew/bin/file --version" \
              '{schema: 1, formula: $formula, arch: $arch,
                bottle_sha256: $bottle_sha256, bottle_url: $bottle_url,
                runtime: "browser", engine: "chromium", status: "success",
                command: $command}' >"$browser_evidence"
            export KANDELO_HOMEBREW_BROWSER_EVIDENCE="$browser_evidence"
            export KANDELO_HOMEBREW_VFS_IMAGE="$browser_vfs"
            export KANDELO_HOMEBREW_VFS_REPORT="$browser_report"
            export KANDELO_HOMEBREW_GALLERY_ROOT="$browser_gallery_root"
            export KANDELO_HOMEBREW_BROWSER_SMOKE_URL="$browser_url"
            rm -rf "$KANDELO_HOMEBREW_SIDECAR_ROOT"
            bash "$GITHUB_WORKSPACE/kandelo-postverify/scripts/homebrew-generate-sidecars-from-env.sh"

            gallery_args=(
              --metadata "$KANDELO_HOMEBREW_SIDECAR_ROOT/Kandelo/metadata.json"
              --image "$browser_vfs"
              --report "$browser_report"
              --out "$browser_gallery_root"
              --formula file-formula
              --title "file Homebrew VFS"
              --description "file poured from the published $KANDELO_HOMEBREW_TAP_NAME bottle into a browser-smoked Kandelo VFS image."
            )
            bash scripts/homebrew-create-browser-gallery.sh "${gallery_args[@]}"
            gallery_validation_args=(
              --gallery "$browser_gallery_root/gallery.json"
              --index "$browser_gallery_root/index.toml"
            )
            node scripts/validate-software-gallery.mjs "${gallery_validation_args[@]}"
          KANDELO_HOMEBREW_BROWSER_SMOKE

      - name: Boot an exact dependency-bearing Brewfile image on Node and Chromium
        if: ${{ !inputs.defer-vfs-acceptance-until-postpublication }}
        shell: bash
        env:
          KANDELO_HOMEBREW_ACCEPTANCE_ARCH: ${{ matrix.arch }}
          KANDELO_HOMEBREW_ACCEPTANCE_DRY_RUN: ${{ inputs.dry-run }}
          KANDELO_HOMEBREW_ACCEPTANCE_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_ACCEPTANCE_REQUIRED: ${{ inputs.require-vfs-acceptance }}
        run: |
          set -euo pipefail
          case "$KANDELO_HOMEBREW_ACCEPTANCE_REQUIRED" in
            true|false) ;;
            *) echo "::error::require-vfs-acceptance must be true or false"; exit 2 ;;
          esac
          tap_root="$(realpath "$GITHUB_WORKSPACE/tap-postverify")"
          policy_dir="$GITHUB_WORKSPACE/tap-postverify/Kandelo"
          if [ -L "$policy_dir" ] || { [ -e "$policy_dir" ] && [ ! -d "$policy_dir" ]; }; then
            echo "::error::tap Kandelo policy path must be a real directory"; exit 2
          fi
          config_candidate="$policy_dir/vfs-acceptance.json"
          if [ ! -e "$config_candidate" ] && [ ! -L "$config_candidate" ]; then
            if [ "$KANDELO_HOMEBREW_ACCEPTANCE_REQUIRED" = "true" ]; then
              echo "::error::required dependency-bearing VFS acceptance selection disappeared after planning"
              exit 1
            fi
            echo "::notice::tap has no dependency-bearing VFS acceptance selection; no closure acceptance evidence was produced"
            exit 0
          fi
          [ -f "$config_candidate" ] && [ ! -L "$config_candidate" ] || {
            echo "::error::tap VFS acceptance configuration must be a regular non-symlink file"; exit 2;
          }
          config="$(realpath "$config_candidate")"
          case "$config" in
            "$tap_root"/*) ;;
            *) echo "::error::tap VFS acceptance configuration resolved outside the exact tap checkout"; exit 2 ;;
          esac
          jq -e '
            type == "object" and
            (
              (.schema == 1 and
                keys == ["argv", "brewfile", "executable", "expected_stdout", "formula", "schema"]) or
              (.schema == 2 and
                keys == ["argv", "brewfile", "executable", "expected_stdout", "formula", "schema", "shell_config"] and
                (.shell_config | type == "string" and length > 0 and length <= 255))
            ) and
            (.formula | type == "string" and test("^[a-z0-9][a-z0-9._-]*$")) and
            (.brewfile | type == "string" and length > 0 and length <= 255) and
            (.executable | type == "string" and test("^/([A-Za-z0-9._@%+=:-]+/)*[A-Za-z0-9._@%+=:-]+$")) and
            (.argv | type == "array" and length > 0 and length <= 64 and all(.[];
              type == "string" and length > 0 and length <= 4096 and contains("\u0000") == false) and
              (tojson | utf8bytelength <= 16384)) and
            (.expected_stdout | type == "string" and length > 0 and length <= 4096 and
              contains("\u0000") == false and contains("\u000a") == false and
              contains("\u000d") == false)
          ' "$config" >/dev/null || {
            echo "::error::tap VFS acceptance configuration is invalid"; exit 2;
          }
          selected_formula="$(jq -er '.formula' "$config")"
          if [ "$selected_formula" != "$KANDELO_HOMEBREW_ACCEPTANCE_FORMULA" ] || \
             [ "$KANDELO_HOMEBREW_ACCEPTANCE_ARCH" != "wasm32" ]; then
            echo "VFS acceptance belongs to ${selected_formula}/wasm32, not this matrix entry."
            exit 0
          fi
          if [ "$KANDELO_HOMEBREW_ACCEPTANCE_DRY_RUN" = "true" ]; then
            if [ "$KANDELO_HOMEBREW_ACCEPTANCE_REQUIRED" = "true" ]; then
              echo "::error::required dependency-bearing VFS acceptance cannot run in dry-run mode"
              exit 1
            fi
            echo "::notice::dependency-bearing VFS acceptance requires anonymous reads of published GHCR bottles; no closure acceptance evidence was produced"
            exit 0
          fi

          cd kandelo
          rm -rf host/dist
          acceptance_root="$RUNNER_TEMP/homebrew-vfs-acceptance"
          acceptance_tap="$acceptance_root/tap"
          public_dir="$GITHUB_WORKSPACE/kandelo/apps/browser-demos/public/__kandelo-acceptance"
          image="$acceptance_root/homebrew-brewfile.vfs.zst"
          report="$acceptance_root/homebrew-brewfile-report.json"
          runtime_layer_policy="$PWD/homebrew/runtime-layer-policy.json"
          lazy_layer="$acceptance_root/kandelo-homebrew-${selected_formula}-layer.bin"
          lazy_layer_descriptor="$acceptance_root/kandelo-homebrew-${selected_formula}-layer.json"
          node_evidence="$acceptance_root/node-evidence.json"
          browser_evidence="$acceptance_root/browser-evidence.json"
          playwright_report="$acceptance_root/playwright-report.json"
          shell_playwright_report="$acceptance_root/shell-playwright-report.json"
          mkdir -p "$acceptance_root" "$public_dir"
          cp -a "$GITHUB_WORKSPACE/tap-postverify" "$acceptance_tap"
          rsync -a "$RUNNER_TEMP/homebrew-sidecars/Formula/" "$acceptance_tap/Formula/"
          rsync -a "$RUNNER_TEMP/homebrew-sidecars/Kandelo/" "$acceptance_tap/Kandelo/"

          brewfile_rel="$(jq -er '.brewfile' "$config")"
          case "$brewfile_rel" in
            /*|../*|*/../*|*/..) echo "::error::Brewfile path escapes the tap"; exit 2 ;;
          esac
          brewfile_candidate="$GITHUB_WORKSPACE/tap-postverify/$brewfile_rel"
          [ -f "$brewfile_candidate" ] && [ ! -L "$brewfile_candidate" ] || {
            echo "::error::tap VFS acceptance Brewfile must be a regular non-symlink file"; exit 2;
          }
          brewfile="$(realpath "$brewfile_candidate")"
          case "$brewfile" in
            "$tap_root"/*) ;;
            *) echo "::error::Brewfile resolved outside the exact tap checkout"; exit 2 ;;
          esac
          shell_config=""
          if [ "$(jq -r '.schema' "$config")" = "2" ]; then
            shell_config_rel="$(jq -er '.shell_config' "$config")"
            case "$shell_config_rel" in
              /*|../*|*/../*|*/..) echo "::error::default-shell config path escapes the tap"; exit 2 ;;
            esac
            shell_config_candidate="$GITHUB_WORKSPACE/tap-postverify/$shell_config_rel"
            [ -f "$shell_config_candidate" ] && [ ! -L "$shell_config_candidate" ] || {
              echo "::error::tap default-shell config must be a regular non-symlink file"; exit 2;
            }
            shell_config="$(realpath "$shell_config_candidate")"
            case "$shell_config" in
              "$tap_root"/*) ;;
              *) echo "::error::default-shell config resolved outside the exact tap checkout"; exit 2 ;;
            esac
            shell_config_bytes="$(wc -c <"$shell_config" | tr -d '[:space:]')"
            if [ "$shell_config_bytes" -le 0 ] || [ "$shell_config_bytes" -gt 65536 ]; then
              echo "::error::default-shell config must contain 1 to 65536 bytes"; exit 2
            fi
            jq -e '
              type == "object" and keys == ["argv", "path", "version"] and
              .version == 1 and
              (.path | type == "string" and
                test("^/home/linuxbrew/\\.linuxbrew/(bin|sbin)/[A-Za-z0-9._@%+=:-]+$") and
                utf8bytelength <= 4096) and
              (.argv | type == "array" and length > 0 and length <= 64 and
                all(.[]; type == "string" and length > 0 and
                  utf8bytelength <= 4096 and contains("\u0000") == false) and
                (.[0] | test("^[A-Za-z0-9][A-Za-z0-9._@%+=:-]*$")) and
                (tojson | utf8bytelength <= 65536))
            ' "$shell_config" >/dev/null || {
              echo "::error::tap default-shell config is invalid"; exit 2;
            }
          fi

          resolver_paths="$acceptance_root/resolved-platform-artifacts.txt"
          [ ! -e "$resolver_paths" ] && [ ! -L "$resolver_paths" ] || {
            echo "::error::platform resolver output path already exists"; exit 2;
          }
          bash scripts/dev-shell.sh bash -c '
            set -euo pipefail
            bash scripts/resolve-binary.sh programs/rootfs.vfs >"$1"
            bash scripts/resolve-binary.sh kernel.wasm >>"$1"
          ' bash "$resolver_paths"
          [ -f "$resolver_paths" ] && [ ! -L "$resolver_paths" ] || {
            echo "::error::platform resolver output is not a regular file"; exit 2;
          }
          resolver_paths_bytes="$(wc -c <"$resolver_paths" | tr -d '[:space:]')"
          if [ "$resolver_paths_bytes" -le 0 ] || [ "$resolver_paths_bytes" -gt 8192 ]; then
            echo "::error::platform resolver output exceeds its size contract"; exit 2
          fi
          mapfile -t resolved_platform_artifacts <"$resolver_paths"
          [ "${#resolved_platform_artifacts[@]}" -eq 2 ] || {
            echo "::error::platform resolver did not return exactly two artifacts"; exit 2;
          }
          base_image="${resolved_platform_artifacts[0]}"
          kernel="${resolved_platform_artifacts[1]}"
          case "$base_image" in
            "$PWD/binaries"/*) ;;
            *) echo "::error::platform base did not resolve from the Kandelo package registry tree"; exit 2 ;;
          esac
          case "$kernel" in
            "$PWD/local-binaries"/*) ;;
            *) echo "::error::verification kernel did not resolve from the exact worktree build"; exit 2 ;;
          esac

          shell_package_image="$acceptance_root/shell.vfs.zst"
          shell_package_source="$acceptance_root/shell-package-output.json"
          bash scripts/dev-shell.sh bash -c '
              set -euo pipefail
              host="$(rustc -vV | sed -n "s/^host: //p")"
              [ -n "$host" ] || {
                echo "unable to resolve the Rust host target" >&2
                exit 2
              }
              xtask="target/$host/release/xtask"
              [ -x "$xtask" ] || {
                echo "exact package materializer is missing: $xtask" >&2
                exit 2
              }
              "$xtask" materialize-package-output \
                --package "$PWD/packages/registry/shell" \
                --arch wasm32 \
                --output-name shell \
                --out "$1" \
                --receipt "$2"
            ' kandelo-shell-package "$shell_package_image" "$shell_package_source"

          dependency_tap_args=()
          while IFS=$'\t' read -r dependency_tap dependency_root; do
            [ -n "$dependency_tap" ] && [ -n "$dependency_root" ] || continue
            dependency_tap_args+=(--dependency-tap-root \
              "$dependency_tap=$dependency_root")
          done < <(jq -r '.dependencies[] | [.tap_name, .root] | @tsv' \
            "$KANDELO_HOMEBREW_RESOLVED_TAPS_FILE")

          vfs_args=(
            --metadata "$acceptance_tap/Kandelo/metadata.json"
            --tap-root "$acceptance_tap"
            --brewfile "$brewfile"
            --arch wasm32
            --runtime node
            --base-image "$base_image"
            --out "$image"
            --report "$report"
            --bottle-cache "$RUNNER_TEMP/homebrew-bottle-cache"
            --max-bytes 256MiB
            --no-fallback
            --lazy-layer-out "$lazy_layer"
            --lazy-layer-descriptor "$lazy_layer_descriptor"
            --lazy-layer-base-image "$shell_package_image"
            --lazy-layer-base-package-source "$shell_package_source"
            --runtime-layer-id "$selected_formula"
            --runtime-layer-policy "$runtime_layer_policy"
          )
          vfs_args+=("${dependency_tap_args[@]}")
          if [ -n "$shell_config" ]; then
            vfs_args+=(--write-profile --shell-config "$shell_config")
          fi
          bash scripts/dev-shell.sh npx tsx \
            images/vfs/scripts/build-homebrew-vfs-image.ts "${vfs_args[@]}"

          executable="$(jq -er '.executable' "$config")"
          argv_json="$(jq -c '.argv' "$config")"
          expected_stdout="$(jq -er '.expected_stdout' "$config")"
          node_args=(
            --metadata "$acceptance_tap/Kandelo/metadata.json"
            --tap-root "$acceptance_tap"
            --brewfile "$brewfile"
            --base-image "$base_image"
            --base-origin kandelo-package-registry
            --image "$image"
            --report "$report"
            --kernel "$kernel"
            --kernel-origin worktree-build
            --formula "$selected_formula"
            --executable "$executable"
            --argv-json "$argv_json"
            --expect-stdout "$expected_stdout"
            --evidence "$node_evidence"
          )
          node_args+=("${dependency_tap_args[@]}")
          if [ -n "$shell_config" ]; then
            node_args+=(--shell-config "$shell_config")
          fi
          bash scripts/dev-shell.sh npx tsx \
            scripts/homebrew-vfs-acceptance-smoke.ts "${node_args[@]}"

          image_sha256="$(sha256sum "$image" | awk '{print $1}')"
          kernel_sha256="$(sha256sum "$kernel" | awk '{print $1}')"
          [ "$(jq -er '.image.sha256' "$node_evidence")" = "$image_sha256" ] || {
            echo "::error::Node evidence did not bind the composed image"; exit 1;
          }
          cp "$image" "$public_dir/homebrew-brewfile.vfs.zst"
          browser_port="${KANDELO_PLAYWRIGHT_PORT:-5401}"
          browser_url="http://127.0.0.1:${browser_port}/__kandelo-acceptance/homebrew-brewfile.vfs.zst"
          (
            cd apps/browser-demos
            npx playwright install chromium --with-deps
            export KANDELO_PLAYWRIGHT_PORT="$browser_port"
            export KANDELO_HOMEBREW_ACCEPTANCE_VFS_URL="$browser_url"
            export KANDELO_HOMEBREW_ACCEPTANCE_VFS_SHA256="$image_sha256"
            export KANDELO_HOMEBREW_ACCEPTANCE_KERNEL_SHA256="$kernel_sha256"
            export KANDELO_HOMEBREW_ACCEPTANCE_EXECUTABLE="$executable"
            export KANDELO_HOMEBREW_ACCEPTANCE_ARGV_JSON="$argv_json"
            export KANDELO_HOMEBREW_ACCEPTANCE_EXPECTED_STDOUT="$expected_stdout"
            export KANDELO_BROWSER_DEMO_INPUTS="homebrew-vfs-test"
            bash ../../scripts/dev-shell.sh env \
              KANDELO_PLAYWRIGHT_PORT="$KANDELO_PLAYWRIGHT_PORT" \
              KANDELO_HOMEBREW_ACCEPTANCE_VFS_URL="$KANDELO_HOMEBREW_ACCEPTANCE_VFS_URL" \
              KANDELO_HOMEBREW_ACCEPTANCE_VFS_SHA256="$KANDELO_HOMEBREW_ACCEPTANCE_VFS_SHA256" \
              KANDELO_HOMEBREW_ACCEPTANCE_KERNEL_SHA256="$KANDELO_HOMEBREW_ACCEPTANCE_KERNEL_SHA256" \
              KANDELO_HOMEBREW_ACCEPTANCE_EXECUTABLE="$KANDELO_HOMEBREW_ACCEPTANCE_EXECUTABLE" \
              KANDELO_HOMEBREW_ACCEPTANCE_ARGV_JSON="$KANDELO_HOMEBREW_ACCEPTANCE_ARGV_JSON" \
              KANDELO_HOMEBREW_ACCEPTANCE_EXPECTED_STDOUT="$KANDELO_HOMEBREW_ACCEPTANCE_EXPECTED_STDOUT" \
              KANDELO_BROWSER_DEMO_INPUTS="$KANDELO_BROWSER_DEMO_INPUTS" \
              bash -c '
                set -euo pipefail
                npx playwright test test/homebrew-brewfile-vfs.spec.ts \
                  --project=chromium --reporter=json >"$1"
              ' kandelo-homebrew-vfs-playwright "$playwright_report"
          )
          jq -e '
            .stats.expected == 1 and .stats.unexpected == 0 and
            .stats.flaky == 0 and .stats.skipped == 0
          ' "$playwright_report" >/dev/null || {
            echo "::error::exact-byte Chromium Homebrew VFS smoke did not report one pass"; exit 1;
          }
          if [ -n "$shell_config" ]; then
            shell_path="$(jq -er '.path' "$shell_config")"
            shell_argv0="$(jq -er '.argv[0]' "$shell_config")"
            (
              cd apps/browser-demos
              export KANDELO_PLAYWRIGHT_PORT="$browser_port"
              export KANDELO_HOMEBREW_DEFAULT_SHELL_VFS_URL="$browser_url"
              export KANDELO_HOMEBREW_DEFAULT_SHELL_PATH="$shell_path"
              export KANDELO_HOMEBREW_DEFAULT_SHELL_ARGV0="$shell_argv0"
              export KANDELO_BROWSER_DEMO_INPUTS="main,kandelo"
              bash ../../scripts/dev-shell.sh env \
                KANDELO_PLAYWRIGHT_PORT="$KANDELO_PLAYWRIGHT_PORT" \
                KANDELO_HOMEBREW_DEFAULT_SHELL_VFS_URL="$KANDELO_HOMEBREW_DEFAULT_SHELL_VFS_URL" \
                KANDELO_HOMEBREW_DEFAULT_SHELL_PATH="$KANDELO_HOMEBREW_DEFAULT_SHELL_PATH" \
                KANDELO_HOMEBREW_DEFAULT_SHELL_ARGV0="$KANDELO_HOMEBREW_DEFAULT_SHELL_ARGV0" \
                KANDELO_BROWSER_DEMO_INPUTS="$KANDELO_BROWSER_DEMO_INPUTS" \
                bash -c '
                  set -euo pipefail
                  npx playwright test test/kandelo-homebrew.spec.ts \
                    --project=chromium \
                    --grep "an image-owned Homebrew shell boots without legacy shell downloads$" \
                    --reporter=json >"$1"
                ' kandelo-homebrew-shell-playwright "$shell_playwright_report"
            )
            jq -e '
              .stats.expected == 1 and .stats.unexpected == 0 and
              .stats.flaky == 0 and .stats.skipped == 0
            ' "$shell_playwright_report" >/dev/null || {
              echo "::error::exact-image Homebrew default-shell smoke did not report one pass"; exit 1;
            }
          fi
          jq -nS \
            --arg image_sha256 "$image_sha256" \
            --arg kernel_sha256 "$kernel_sha256" \
            --arg executable "$executable" \
            --argjson argv "$argv_json" \
            '{schema: 1, status: "success", runtime: "browser", engine: "chromium",
              image_sha256: $image_sha256, kernel_sha256: $kernel_sha256,
              executable: $executable, argv: $argv}' >"$browser_evidence"
          if [ -n "$shell_config" ]; then
            jq -S \
              --arg path "$shell_path" \
              --argjson argv "$(jq -c '.argv' "$shell_config")" \
              '.default_shell = {
                path: $path, argv: $argv, interactive: true,
                legacy_shell_downloads: 0
              }' "$browser_evidence" >"$browser_evidence.tmp"
            mv "$browser_evidence.tmp" "$browser_evidence"
          fi

      - name: Recheck trusted verifier sources after runtime execution
        shell: bash
        env:
          CORE_TAP_SHA: ${{ needs.plan.outputs.core-dependency-tap-sha }}
          HOMEBREW_BREW_COMMIT: 34c40c18ffa2029b611b61c73273e32c003d0842
          KANDELO_SHA: ${{ needs.plan.outputs.kandelo-sha }}
          TAP_SHA: ${{ needs.plan.outputs.tap-sha }}
        run: |
          set -euo pipefail
          [ "$(git -C kandelo rev-parse HEAD)" = "$KANDELO_SHA" ] || {
            echo "::error::Kandelo verifier source moved during runtime validation"; exit 1;
          }
          [ -z "$(git -C kandelo status --short --untracked-files=no)" ] || {
            echo "::error::runtime validation modified reviewed Kandelo tracked files"; exit 1;
          }
          [ "$(git -C kandelo-sysroot-build rev-parse HEAD)" = "$KANDELO_SHA" ] || {
            echo "::error::Kandelo sysroot build source moved during runtime validation"; exit 1;
          }
          [ -z "$(git -C kandelo-sysroot-build status --short --untracked-files=no --ignore-submodules=all)" ] || {
            echo "::error::runtime validation modified Kandelo sysroot build files outside musl"; exit 1;
          }
          expected_musl_sha="$(git -C kandelo-sysroot-build rev-parse HEAD:libc/musl)"
          [ "$(git -C kandelo-sysroot-build/libc/musl rev-parse HEAD)" = "$expected_musl_sha" ] || {
            echo "::error::Kandelo sysroot build moved the reviewed musl commit"; exit 1;
          }
          [ "$(git -C tap rev-parse HEAD)" = "$TAP_SHA" ] || {
            echo "::error::tap verifier source moved during runtime validation"; exit 1;
          }
          [ -z "$(git -C tap status --short --untracked-files=no)" ] || {
            echo "::error::runtime validation modified reviewed tap tracked files"; exit 1;
          }
          [ "$(git -C kandelo-postverify rev-parse HEAD)" = "$KANDELO_SHA" ] || {
            echo "::error::fresh Kandelo generator source moved during runtime validation"; exit 1;
          }
          [ -z "$(git -C kandelo-postverify status --short --untracked-files=no)" ] || {
            echo "::error::runtime validation modified fresh Kandelo generator files"; exit 1;
          }
          [ "$(git -C tap-postverify rev-parse HEAD)" = "$TAP_SHA" ] || {
            echo "::error::fresh tap source moved during runtime validation"; exit 1;
          }
          [ -z "$(git -C tap-postverify status --short --untracked-files=no)" ] || {
            echo "::error::runtime validation modified fresh tap files"; exit 1;
          }
          if [ -n "$CORE_TAP_SHA" ]; then
            for root in dependency-taps/core dependency-taps/core-postverify; do
              [ "$(git -C "$root" rev-parse HEAD)" = "$CORE_TAP_SHA" ] || {
                echo "::error::core dependency tap moved during runtime validation"; exit 1;
              }
              [ -z "$(git -C "$root" status --short --untracked-files=no)" ] || {
                echo "::error::runtime validation modified core dependency tap files"; exit 1;
              }
            done
          fi
          brew_repository="$GITHUB_WORKSPACE/homebrew-prefix/Homebrew"
          [ "$(git -C "$brew_repository" rev-parse HEAD)" = "$HOMEBREW_BREW_COMMIT" ] || {
            echo "::error::reviewed Homebrew source moved during runtime validation"; exit 1;
          }
          [ -z "$(git -C "$brew_repository" status --short --untracked-files=no)" ] || {
            echo "::error::runtime validation modified reviewed Homebrew source"; exit 1;
          }

      - name: Prepare exact browser-proven VFS release handoff
        if: ${{ !inputs.defer-vfs-acceptance-until-postpublication && !inputs.dry-run && inputs.require-vfs-acceptance && matrix.arch == 'wasm32' && matrix.formula == needs.plan.outputs.vfs-acceptance-formula }}
        shell: bash
        env:
          KANDELO_HOMEBREW_ABI: ${{ needs.plan.outputs.abi }}
          KANDELO_HOMEBREW_BOTTLE_RELEASE_TAG: ${{ needs.plan.outputs.release-tag }}
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_KANDELO_COMMIT: ${{ needs.plan.outputs.kandelo-sha }}
          KANDELO_HOMEBREW_TAP_COMMIT: ${{ needs.plan.outputs.tap-sha }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
        run: |
          set -euo pipefail
          acceptance_root="$RUNNER_TEMP/homebrew-vfs-acceptance"
          runtime_layer="$acceptance_root/kandelo-homebrew-${KANDELO_HOMEBREW_FORMULA}-layer.bin"
          runtime_layer_descriptor="$acceptance_root/kandelo-homebrew-${KANDELO_HOMEBREW_FORMULA}-layer.json"
          dependency_tap_args=()
          while IFS=$'\t' read -r dependency_tap dependency_root; do
            [ -n "$dependency_tap" ] && [ -n "$dependency_root" ] || continue
            dependency_tap_args+=(--dependency-tap-root \
              "$dependency_tap=$dependency_root")
          done < <(jq -r '.dependencies[] | [.tap_name, .root] | @tsv' \
            "$KANDELO_HOMEBREW_RESOLVED_TAPS_FILE")
          python3 kandelo-postverify/scripts/homebrew-vfs-release.py prepare \
            --image "$acceptance_root/homebrew-brewfile.vfs.zst" \
            --report "$acceptance_root/homebrew-brewfile-report.json" \
            --node-evidence "$acceptance_root/node-evidence.json" \
            --browser-evidence "$acceptance_root/browser-evidence.json" \
            --lazy-layer "$runtime_layer" \
            --lazy-layer-descriptor "$runtime_layer_descriptor" \
            --tap-root "$GITHUB_WORKSPACE/tap-postverify" \
            "${dependency_tap_args[@]}" \
            --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY" \
            --tap-name "$KANDELO_HOMEBREW_TAP_NAME" \
            --tap-commit "$KANDELO_HOMEBREW_TAP_COMMIT" \
            --formula "$KANDELO_HOMEBREW_FORMULA" \
            --kandelo-commit "$KANDELO_HOMEBREW_KANDELO_COMMIT" \
            --abi "$KANDELO_HOMEBREW_ABI" \
            --bottle-release-tag "$KANDELO_HOMEBREW_BOTTLE_RELEASE_TAG" \
            --out "$RUNNER_TEMP/homebrew-vfs-release-handoff"

      - name: Upload exact browser-proven VFS release handoff
        if: ${{ !inputs.defer-vfs-acceptance-until-postpublication && !inputs.dry-run && inputs.require-vfs-acceptance && matrix.arch == 'wasm32' && matrix.formula == needs.plan.outputs.vfs-acceptance-formula }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: homebrew-vfs-release-handoff-${{ matrix.formula }}-wasm32-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/homebrew-vfs-release-handoff
          compression-level: 0
          if-no-files-found: error
          retention-days: 2

      - name: Package validated data-only publication handoff
        shell: bash
        env:
          KANDELO_HOMEBREW_ARCH: ${{ matrix.arch }}
          KANDELO_HOMEBREW_BOTTLE_ROOT_URL: ${{ needs.plan.outputs.bottle-root-prefix }}
          KANDELO_HOMEBREW_DRY_RUN: ${{ inputs.dry-run }}
          KANDELO_HOMEBREW_FORMULA: ${{ matrix.formula }}
          KANDELO_HOMEBREW_KANDELO_COMMIT: ${{ needs.plan.outputs.kandelo-sha }}
          KANDELO_HOMEBREW_RELEASE_TAG: ${{ needs.plan.outputs.release-tag }}
          KANDELO_HOMEBREW_TAP_COMMIT: ${{ needs.plan.outputs.tap-sha }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
        run: |
          set -euo pipefail
          publish_handoff="$RUNNER_TEMP/homebrew-publish-handoff"
          # shellcheck disable=SC1091
          . "$RUNNER_TEMP/homebrew-verified-input/receipt.env"
          # shellcheck disable=SC1091
          . "$RUNNER_TEMP/homebrew-verified-input/runtime.env"
          mkdir -p "$publish_handoff/build" "$publish_handoff/composition"
          cp "$RUNNER_TEMP/homebrew-build-handoff/manifest.json" "$publish_handoff/build/manifest.json"
          cp "$RUNNER_TEMP/homebrew-build-handoff/bottle.json" "$publish_handoff/build/bottle.json"
          cp "$RUNNER_TEMP/homebrew-build-handoff/dependency-provenance.json" \
            "$publish_handoff/build/dependency-provenance.json"
          cp "$RUNTIME_BOTTLE" "$publish_handoff/build/bottle.tar.gz"
          cp "$RUNNER_TEMP/homebrew-upload-receipt/receipt.json" "$publish_handoff/receipt.json"
          jq -e '
            (.packages | length) == 1 and
            (.packages[0].bottles | length) == 1
          ' "$RUNNER_TEMP/homebrew-sidecars/sidecars-input.json" >/dev/null
          jq -S '
            .packages[0].bottles[0].bottle_file = "../build/bottle.tar.gz"
          ' "$RUNNER_TEMP/homebrew-sidecars/sidecars-input.json" \
            >"$publish_handoff/composition/sidecars-input.json"
          cd kandelo-postverify
          payload_args=(
            --handoff "$publish_handoff"
            --tap-root "$GITHUB_WORKSPACE/tap-postverify"
            --formula "$KANDELO_HOMEBREW_FORMULA"
            --arch "$KANDELO_HOMEBREW_ARCH"
            --release-tag "$KANDELO_HOMEBREW_RELEASE_TAG"
            --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY"
            --tap-name "$KANDELO_HOMEBREW_TAP_NAME"
            --tap-commit "$KANDELO_HOMEBREW_TAP_COMMIT"
            --kandelo-commit "$KANDELO_HOMEBREW_KANDELO_COMMIT"
            --bottle-root-url "$KANDELO_HOMEBREW_BOTTLE_ROOT_URL"
            --forbidden-root "$GITHUB_WORKSPACE"
            --forbidden-root "$(dirname "$GITHUB_WORKSPACE")"
            --forbidden-root "$RUNNER_TEMP"
            --forbidden-root "/home/kandelo-homebrew-build"
            --defer-whole-tap-validation
          )
          if [ "$KANDELO_HOMEBREW_DRY_RUN" = "true" ]; then
            payload_args+=(--allow-dry-run)
          fi
          bash scripts/dev-shell.sh env \
            KANDELO_HOMEBREW_RESOLVED_TAPS_FILE="$KANDELO_HOMEBREW_RESOLVED_TAPS_FILE" \
            bash scripts/homebrew-validate-publish-handoff.sh "${payload_args[@]}"

      - name: Upload validated publication handoff
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: homebrew-publish-handoff-${{ matrix.formula }}-${{ matrix.arch }}-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/homebrew-publish-handoff
          compression-level: 0
          if-no-files-found: error
          retention-days: 2

      - name: Upload read-only verification diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: homebrew-verification-diagnostics-${{ matrix.formula }}-${{ matrix.arch }}-attempt-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/homebrew-browser-gallery/**
            ${{ runner.temp }}/homebrew-browser-vfs/**
            ${{ runner.temp }}/homebrew-vfs-acceptance/**
            ${{ runner.temp }}/homebrew-sidecars/Kandelo/**
          if-no-files-found: ignore
          retention-days: 14

  finalize-tap:
    needs: [plan, build-and-test, upload-bottle, verify-bottle]
    if: ${{ always() && !cancelled() && !inputs.dry-run && needs.plan.result == 'success' && needs.plan.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout exact Kandelo finalizer source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ inputs.kandelo-repository }}
          ref: ${{ needs.plan.outputs.kandelo-sha }}
          path: kandelo
          submodules: false

      - name: Checkout exact base tap without credentials
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ inputs.tap-repository }}
          ref: ${{ needs.plan.outputs.tap-sha }}
          path: tap-base

      - name: Checkout exact public core dependency tap for finalization
        if: ${{ needs.plan.outputs.core-dependency-tap-sha != '' }}
        shell: bash
        env:
          CORE_TAP_SHA: ${{ needs.plan.outputs.core-dependency-tap-sha }}
        run: |
          /usr/bin/bash kandelo/scripts/homebrew-checkout-public-tap.sh \
            kandelo-dev/homebrew-tap-core "$CORE_TAP_SHA" \
            "$GITHUB_WORKSPACE/dependency-taps/core"

      - name: Verify finalizer source snapshots
        shell: bash
        env:
          KANDELO_SHA: ${{ needs.plan.outputs.kandelo-sha }}
          TAP_SHA: ${{ needs.plan.outputs.tap-sha }}
        run: |
          set -euo pipefail
          [ "$(git -C kandelo rev-parse HEAD)" = "$KANDELO_SHA" ] || {
            echo "::error::Kandelo finalizer source differs from the plan"; exit 2;
          }
          [ "$(git -C tap-base rev-parse HEAD)" = "$TAP_SHA" ] || {
            echo "::error::tap finalizer base differs from the plan"; exit 2;
          }

      - name: Materialize immutable dependency tap map for finalization
        shell: bash
        env:
          CORE_TAP_SHA: ${{ needs.plan.outputs.core-dependency-tap-sha }}
          TAP_NAME: ${{ inputs.tap-name }}
          TAP_REPOSITORY: ${{ inputs.tap-repository }}
          TAP_SHA: ${{ needs.plan.outputs.tap-sha }}
        run: |
          set -euo pipefail
          resolved="$RUNNER_TEMP/homebrew-resolved-taps.json"
          dependency_args=()
          if [ -n "$CORE_TAP_SHA" ]; then
            dependency_args+=(--dependency-root \
              "kandelo-dev/tap-core=$GITHUB_WORKSPACE/dependency-taps/core")
          fi
          python3 kandelo/scripts/homebrew-dependency-taps.py resolve \
            --tap-root "$GITHUB_WORKSPACE/tap-base" \
            --tap-name "$TAP_NAME" \
            --tap-repository "$TAP_REPOSITORY" \
            --tap-commit "$TAP_SHA" \
            "${dependency_args[@]}" \
            --out "$resolved"
          echo "KANDELO_HOMEBREW_RESOLVED_TAPS_FILE=$resolved" >> "$GITHUB_ENV"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with:
          github-token: ""

      - name: Warm Kandelo dev shell
        shell: bash
        run: |
          cd kandelo
          bash scripts/dev-shell.sh true

      - name: Download the complete validated publication handoff set
        id: publish-handoffs
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: homebrew-publish-handoff-*-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/homebrew-publish-handoffs
          merge-multiple: false

      - name: Validate the exact package-scoped publication handoff set
        id: validate-payload
        if: ${{ steps.publish-handoffs.outcome == 'success' }}
        continue-on-error: true
        shell: bash
        env:
          KANDELO_HOMEBREW_BOTTLE_ROOT_URL: ${{ needs.plan.outputs.bottle-root-prefix }}
          KANDELO_HOMEBREW_KANDELO_COMMIT: ${{ needs.plan.outputs.kandelo-sha }}
          KANDELO_HOMEBREW_RELEASE_TAG: ${{ needs.plan.outputs.release-tag }}
          KANDELO_HOMEBREW_TAP_COMMIT: ${{ needs.plan.outputs.tap-sha }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
          KANDELO_HOMEBREW_PLANNED_MATRIX: ${{ needs.plan.outputs.matrix }}
          KANDELO_HOMEBREW_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail
          error_file="$RUNNER_TEMP/homebrew-finalize-validation-error.txt"
          handoff_paths="$RUNNER_TEMP/homebrew-publish-handoff-paths.bin"
          : >"$error_file"
          set +e
          (
            set -euo pipefail
            cd kandelo
            handoff_root="$RUNNER_TEMP/homebrew-publish-handoffs"
            bash scripts/dev-shell.sh env \
              bash scripts/homebrew-publish-handoff-paths.sh \
                --root "$handoff_root" \
                --planned-matrix "$KANDELO_HOMEBREW_PLANNED_MATRIX" \
                --run-attempt "$KANDELO_HOMEBREW_RUN_ATTEMPT" \
                --out "$handoff_paths"
            while IFS= read -r -d '' formula &&
                  IFS= read -r -d '' arch &&
                  IFS= read -r -d '' handoff; do
              payload_args=(
                --handoff "$handoff"
                --tap-root "$GITHUB_WORKSPACE/tap-base"
                --formula "$formula"
                --arch "$arch"
                --release-tag "$KANDELO_HOMEBREW_RELEASE_TAG"
                --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY"
                --tap-name "$KANDELO_HOMEBREW_TAP_NAME"
                --tap-commit "$KANDELO_HOMEBREW_TAP_COMMIT"
                --kandelo-commit "$KANDELO_HOMEBREW_KANDELO_COMMIT"
                --bottle-root-url "$KANDELO_HOMEBREW_BOTTLE_ROOT_URL"
                --forbidden-root "$GITHUB_WORKSPACE"
                --forbidden-root "$(dirname "$GITHUB_WORKSPACE")"
                --forbidden-root "$RUNNER_TEMP"
                --forbidden-root "/home/kandelo-homebrew-build"
                --defer-whole-tap-validation
              )
              bash scripts/dev-shell.sh env \
                KANDELO_HOMEBREW_RESOLVED_TAPS_FILE="$KANDELO_HOMEBREW_RESOLVED_TAPS_FILE" \
                bash scripts/homebrew-validate-publish-handoff.sh "${payload_args[@]}"
            done <"$handoff_paths"
          ) 2>"$error_file"
          validation_status=$?
          set -e
          if [ -s "$error_file" ]; then
            sed 's/^/Finalizer validation stderr: /' "$error_file" >&2
          fi
          if [ "$validation_status" -ne 0 ]; then
            echo "::error::Homebrew publication handoff validation failed"
          fi
          exit "$validation_status"

      - name: Checkout tap publication branch after payload validation
        if: ${{ steps.validate-payload.outcome == 'success' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.tap-repository }}
          ref: main
          path: tap-publish
          fetch-depth: 0

      - name: Atomically compose and publish all sidecars under one tap state lock
        id: publish
        if: ${{ steps.validate-payload.outcome == 'success' }}
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          KANDELO_HOMEBREW_KANDELO_COMMIT: ${{ needs.plan.outputs.kandelo-sha }}
          KANDELO_HOMEBREW_RELEASE_TAG: ${{ needs.plan.outputs.release-tag }}
          KANDELO_HOMEBREW_TAP_COMMIT: ${{ needs.plan.outputs.tap-sha }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
          STATE_LOCK_OWNER_DETAIL: coordinated bottle batch
        run: |
          set -euo pipefail
          error_file="$RUNNER_TEMP/homebrew-finalize-publish-error.txt"
          handoff_paths="$RUNNER_TEMP/homebrew-publish-handoff-paths.bin"
          : >"$error_file"
          set +e
          (
            set -euo pipefail
            cd kandelo
            [ -f "$handoff_paths" ] && [ ! -L "$handoff_paths" ] || {
              echo "normalized publication handoff manifest is missing or unsafe" >&2
              exit 1
            }
            publish_args=(
              --tap-root "$GITHUB_WORKSPACE/tap-publish"
              --release-tag "$KANDELO_HOMEBREW_RELEASE_TAG"
              --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY"
              --tap-name "$KANDELO_HOMEBREW_TAP_NAME"
              --status success
              --kandelo-commit "$KANDELO_HOMEBREW_KANDELO_COMMIT"
              --tap-commit "$KANDELO_HOMEBREW_TAP_COMMIT"
            )
            while IFS= read -r -d '' formula &&
                  IFS= read -r -d '' arch &&
                  IFS= read -r -d '' handoff; do
              publish_args+=(--publication "$formula" "$arch" "$handoff")
            done <"$handoff_paths"
            bash scripts/dev-shell.sh env \
              KANDELO_HOMEBREW_RESOLVED_TAPS_FILE="$KANDELO_HOMEBREW_RESOLVED_TAPS_FILE" \
              bash scripts/homebrew-publish-sidecars.sh "${publish_args[@]}"
          ) 2>"$error_file"
          publish_status=$?
          set -e
          if [ -s "$error_file" ]; then
            sed 's/^/Finalizer publication stderr: /' "$error_file" >&2
          fi
          if [ "$publish_status" -ne 0 ]; then
            echo "::error::Homebrew tap publication failed"
          fi
          exit "$publish_status"

      - name: Checkout clean tap for a failed-attempt report
        if: ${{ always() && (steps.publish-handoffs.outcome != 'success' || steps.validate-payload.outcome != 'success' || steps.publish.outcome != 'success') }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.tap-repository }}
          ref: main
          path: tap-report
          fetch-depth: 0

      - name: Record failed attempt without replacing last-green metadata
        if: ${{ always() && (steps.publish-handoffs.outcome != 'success' || steps.validate-payload.outcome != 'success' || steps.publish.outcome != 'success') }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          KANDELO_HOMEBREW_KANDELO_COMMIT: ${{ needs.plan.outputs.kandelo-sha }}
          KANDELO_HOMEBREW_RELEASE_TAG: ${{ needs.plan.outputs.release-tag }}
          KANDELO_HOMEBREW_TAP_COMMIT: ${{ needs.plan.outputs.tap-sha }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
          KANDELO_HOMEBREW_PLANNED_MATRIX: ${{ needs.plan.outputs.matrix }}
          PUBLISH_HANDOFF_OUTCOME: ${{ steps.publish-handoffs.outcome }}
          PUBLISH_OUTCOME: ${{ steps.publish.outcome }}
          STATE_LOCK_OWNER_DETAIL: coordinated bottle batch failure reports
          VALIDATE_PAYLOAD_OUTCOME: ${{ steps.validate-payload.outcome }}
        run: |
          set -euo pipefail
          error_text="publish-handoff=$PUBLISH_HANDOFF_OUTCOME; validate-payload=$VALIDATE_PAYLOAD_OUTCOME; publish=$PUBLISH_OUTCOME"
          validation_error_file="$RUNNER_TEMP/homebrew-finalize-validation-error.txt"
          publication_error_file="$RUNNER_TEMP/homebrew-finalize-publish-error.txt"
          error_detail_file=""
          if [ "$VALIDATE_PAYLOAD_OUTCOME" != "success" ]; then
            error_detail_file="$validation_error_file"
          elif [ "$PUBLISH_OUTCOME" != "success" ]; then
            error_detail_file="$publication_error_file"
          fi
          if [ -n "$error_detail_file" ] &&
             { [ -e "$error_detail_file" ] || [ -L "$error_detail_file" ]; }; then
            [ -f "$error_detail_file" ] && [ ! -L "$error_detail_file" ] || {
              echo "::error::captured finalizer error is not a regular file"
              exit 1
            }
          else
            error_detail_file=""
          fi
          cd kandelo
          while IFS=$'\t' read -r formula arch; do
            report_args=(
              --tap-root "$GITHUB_WORKSPACE/tap-report"
              --formula "$formula"
              --arch "$arch"
              --release-tag "$KANDELO_HOMEBREW_RELEASE_TAG"
              --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY"
              --tap-name "$KANDELO_HOMEBREW_TAP_NAME"
              --status failed
              --error "$error_text"
              --kandelo-commit "$KANDELO_HOMEBREW_KANDELO_COMMIT"
              --tap-commit "$KANDELO_HOMEBREW_TAP_COMMIT"
            )
            if [ -n "$error_detail_file" ]; then
              report_args+=(--error-detail-file "$error_detail_file")
            fi
            bash scripts/dev-shell.sh env \
              bash scripts/homebrew-publish-sidecars.sh "${report_args[@]}"
          done < <(jq -er '.[] | [.formula, .arch] | @tsv' \
            <<<"$KANDELO_HOMEBREW_PLANNED_MATRIX")

      - name: Fail after reporting an unsuccessful coordinated publication
        if: ${{ always() && (steps.publish-handoffs.outcome != 'success' || steps.validate-payload.outcome != 'success' || steps.publish.outcome != 'success') }}
        shell: bash
        run: exit 1

  publish-vfs-release:
    needs: [plan, verify-bottle, finalize-tap]
    if: ${{ always() && !cancelled() && !inputs.defer-vfs-acceptance-until-postpublication && !inputs.dry-run && inputs.require-vfs-acceptance && needs.plan.result == 'success' && needs.verify-bottle.result == 'success' && needs.finalize-tap.result == 'success' && needs.plan.outputs.vfs-acceptance-formula != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: read
      contents: write
    steps:
      - name: Checkout exact Kandelo VFS release source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ inputs.kandelo-repository }}
          ref: ${{ needs.plan.outputs.kandelo-sha }}
          path: kandelo
          submodules: false

      - name: Checkout exact VFS source tap without credentials
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          repository: ${{ inputs.tap-repository }}
          ref: ${{ needs.plan.outputs.tap-sha }}
          path: tap-base
          fetch-depth: 0

      - name: Checkout exact public core dependency tap for VFS publication
        if: ${{ needs.plan.outputs.core-dependency-tap-sha != '' }}
        shell: bash
        env:
          CORE_TAP_SHA: ${{ needs.plan.outputs.core-dependency-tap-sha }}
        run: |
          /usr/bin/bash kandelo/scripts/homebrew-checkout-public-tap.sh \
            kandelo-dev/homebrew-tap-core "$CORE_TAP_SHA" \
            "$GITHUB_WORKSPACE/dependency-taps/core"

      - name: Verify VFS release source snapshots
        shell: bash
        env:
          CORE_TAP_SHA: ${{ needs.plan.outputs.core-dependency-tap-sha }}
          KANDELO_SHA: ${{ needs.plan.outputs.kandelo-sha }}
          TAP_SHA: ${{ needs.plan.outputs.tap-sha }}
        run: |
          set -euo pipefail
          [ "$(git -C kandelo rev-parse HEAD)" = "$KANDELO_SHA" ] || {
            echo "::error::Kandelo VFS release source differs from the plan"; exit 2;
          }
          [ -z "$(git -C kandelo status --short --untracked-files=all)" ] || {
            echo "::error::Kandelo VFS release source is dirty"; exit 2;
          }
          [ "$(git -C tap-base rev-parse HEAD)" = "$TAP_SHA" ] || {
            echo "::error::VFS source tap differs from the plan"; exit 2;
          }
          [ -z "$(git -C tap-base status --short --untracked-files=all)" ] || {
            echo "::error::VFS source tap is dirty"; exit 2;
          }
          if [ -n "$CORE_TAP_SHA" ]; then
            [ "$(git -C dependency-taps/core rev-parse HEAD)" = "$CORE_TAP_SHA" ] || {
              echo "::error::VFS core dependency tap differs from the plan"; exit 2;
            }
            [ -z "$(git -C dependency-taps/core status --short --untracked-files=all)" ] || {
              echo "::error::VFS core dependency tap is dirty"; exit 2;
            }
          fi

      - name: Download exact browser-proven VFS release handoff
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: homebrew-vfs-release-handoff-${{ needs.plan.outputs.vfs-acceptance-formula }}-wasm32-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/homebrew-vfs-release-handoff

      - name: Validate VFS release handoff without credentials
        id: validate-vfs-release
        shell: bash
        env:
          CORE_TAP_SHA: ${{ needs.plan.outputs.core-dependency-tap-sha }}
          KANDELO_HOMEBREW_ABI: ${{ needs.plan.outputs.abi }}
          KANDELO_HOMEBREW_BOTTLE_RELEASE_TAG: ${{ needs.plan.outputs.release-tag }}
          KANDELO_HOMEBREW_FORMULA: ${{ needs.plan.outputs.vfs-acceptance-formula }}
          KANDELO_HOMEBREW_KANDELO_COMMIT: ${{ needs.plan.outputs.kandelo-sha }}
          KANDELO_HOMEBREW_TAP_COMMIT: ${{ needs.plan.outputs.tap-sha }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
        run: |
          set -euo pipefail
          [ -z "${GH_TOKEN:-}" ] && [ -z "${GITHUB_TOKEN:-}" ] || {
            echo "::error::a credential reached VFS handoff validation"; exit 2;
          }
          dependency_tap_args=()
          if [ -n "$CORE_TAP_SHA" ]; then
            dependency_tap_args+=(--dependency-tap-root \
              "kandelo-dev/tap-core=$GITHUB_WORKSPACE/dependency-taps/core")
          fi
          python3 kandelo/scripts/homebrew-vfs-release.py validate \
            --handoff "$RUNNER_TEMP/homebrew-vfs-release-handoff" \
            --tap-root "$GITHUB_WORKSPACE/tap-base" \
            "${dependency_tap_args[@]}" \
            --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY" \
            --tap-name "$KANDELO_HOMEBREW_TAP_NAME" \
            --tap-commit "$KANDELO_HOMEBREW_TAP_COMMIT" \
            --formula "$KANDELO_HOMEBREW_FORMULA" \
            --kandelo-commit "$KANDELO_HOMEBREW_KANDELO_COMMIT" \
            --abi "$KANDELO_HOMEBREW_ABI" \
            --bottle-release-tag "$KANDELO_HOMEBREW_BOTTLE_RELEASE_TAG"

      - name: Publish and anonymously read back the immutable VFS release
        id: publish-vfs-release
        shell: bash
        env:
          CORE_TAP_SHA: ${{ needs.plan.outputs.core-dependency-tap-sha }}
          KANDELO_HOMEBREW_ABI: ${{ needs.plan.outputs.abi }}
          KANDELO_HOMEBREW_BOTTLE_RELEASE_TAG: ${{ needs.plan.outputs.release-tag }}
          GH_TOKEN: ${{ github.token }}
          KANDELO_HOMEBREW_FORMULA: ${{ needs.plan.outputs.vfs-acceptance-formula }}
          KANDELO_HOMEBREW_KANDELO_COMMIT: ${{ needs.plan.outputs.kandelo-sha }}
          KANDELO_HOMEBREW_TAP_COMMIT: ${{ needs.plan.outputs.tap-sha }}
          KANDELO_HOMEBREW_TAP_NAME: ${{ inputs.tap-name }}
          KANDELO_HOMEBREW_TAP_REPOSITORY: ${{ inputs.tap-repository }}
          STATE_LOCK_OWNER_DETAIL: public VFS release
        run: |
          set -euo pipefail
          dependency_tap_args=()
          if [ -n "$CORE_TAP_SHA" ]; then
            dependency_tap_args+=(--dependency-tap-root \
              "kandelo-dev/tap-core=$GITHUB_WORKSPACE/dependency-taps/core")
          fi
          bash kandelo/scripts/homebrew-publish-vfs-release.sh \
            --handoff "$RUNNER_TEMP/homebrew-vfs-release-handoff" \
            --tap-root "$GITHUB_WORKSPACE/tap-base" \
            "${dependency_tap_args[@]}" \
            --tap-repository "$KANDELO_HOMEBREW_TAP_REPOSITORY" \
            --tap-name "$KANDELO_HOMEBREW_TAP_NAME" \
            --tap-commit "$KANDELO_HOMEBREW_TAP_COMMIT" \
            --formula "$KANDELO_HOMEBREW_FORMULA" \
            --kandelo-commit "$KANDELO_HOMEBREW_KANDELO_COMMIT" \
            --abi "$KANDELO_HOMEBREW_ABI" \
            --bottle-release-tag "$KANDELO_HOMEBREW_BOTTLE_RELEASE_TAG" \
            --receipt "$RUNNER_TEMP/homebrew-vfs-release-receipt.json"
          descriptor_url="$(jq -er '.descriptor_url' "$RUNNER_TEMP/homebrew-vfs-release-receipt.json")"
          image_url="$(jq -er '.image.url' "$RUNNER_TEMP/homebrew-vfs-release-receipt.json")"
          lazy_layer_descriptor_url="$(jq -er '.lazy_layer.descriptor_url' "$RUNNER_TEMP/homebrew-vfs-release-receipt.json")"
          {
            echo "descriptor-url=$descriptor_url"
            echo "image-url=$image_url"
            echo "lazy-layer-descriptor-url=$lazy_layer_descriptor_url"
          } >> "$GITHUB_OUTPUT"
          {
            echo "### Public Homebrew VFS"
            echo
            echo "Descriptor: $descriptor_url"
            echo
            echo "Browser launch input: \`?vfs=$image_url\`"
            echo
            echo "Lazy ${KANDELO_HOMEBREW_FORMULA} runtime layer descriptor: $lazy_layer_descriptor_url"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload public VFS publication receipt
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: homebrew-vfs-release-receipt-${{ needs.plan.outputs.vfs-acceptance-formula }}-wasm32-attempt-${{ github.run_attempt }}
          path: ${{ runner.temp }}/homebrew-vfs-release-receipt.json
          if-no-files-found: error
          retention-days: 14
