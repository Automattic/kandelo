name: Browser Node artifact diagnostic

on:
  workflow_dispatch:
    inputs:
      artifact_run_id:
        description: 'Workflow run id containing a test-workspace artifact.'
        required: true
        type: string
      ref:
        description: 'Git ref to test. Empty = the ref selected for dispatch.'
        required: false
        default: ''
        type: string

jobs:
  browser-node:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    env:
      KANDELO_CI_TEST_WORKSPACE_PREPARED: "true"
      SUITE: browser-node
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref_name }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          github-token: ""

      - name: Cache Nix store + flake eval
        uses: DeterminateSystems/magic-nix-cache-action@v13
        with:
          use-gha-cache: false
          use-flakehub: false

      - name: Download prepared test workspace
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          run-id: ${{ inputs.artifact_run_id }}
          name: test-workspace
          path: ${{ runner.temp }}/test-workspace

      - name: Extract prepared test workspace
        run: |
          tar --zstd -xf "$RUNNER_TEMP/test-workspace/test-workspace.tar.zst"

      - name: Run browser-node suite
        run: |
          bash scripts/dev-shell.sh bash scripts/ci-run-test-suite.sh "$SUITE"
