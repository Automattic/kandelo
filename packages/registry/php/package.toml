kind = "program"
name = "php"
version = "8.3.2"
kernel_abi = 7
depends_on = ["zlib@1.3.1", "openssl@3.3.2", "sqlite@3.49.1", "libxml2@2.13.8", "icu@74.2", "libcxx@21.1.7"]
# wasm32 only. PHP previously declared wasm64 too (per
# memory/wasm64-build-policy.md), but no demo actually consumes
# `programs/wasm64/php/...` — only mariadb needs the 4 GB address
# space its wasm64 build provides. build-php.sh hard-codes the
# wasm32 SDK toolchain; if a wasm64 PHP build is reintroduced later,
# add `--wasm64` dispatch parallel to mariadb's pattern and stage
# opcache.so under `local-binaries/programs/wasm64/php/`.
arches = ["wasm32"]

[source]
url = "https://www.php.net/distributions/php-8.3.2.tar.xz"
sha256 = "4ffa3e44afc9c590e28dc0d2d31fc61f0139f8b335f11880a121b9f9b9f0634e"

[license]
spdx = "PHP-3.01"
url = "https://github.com/php/php-src/blob/master/LICENSE"

[build]
script_path = "packages/registry/php/build-php.sh"

[[outputs]]
name = "php"
wasm = "php.wasm"

# php-fpm shipped as a second output. The CLI + FPM builds were
# previously two parallel scripts (this dir's build-php.sh + the
# now-removed packages/registry/nginx/demo/build-php-fpm.sh) using two separate
# php-src checkouts and a sysroot-copy dance. Build-php.sh now does
# both from one source tree: --enable-cli + --enable-fpm produce
# sapi/cli/php and sapi/fpm/php-fpm; FPM gets fork instrumentation so
# its worker fork() path resumes correctly.
[[outputs]]
name = "php-fpm"
wasm = "php-fpm.wasm"

# opcache shipped as a third output: a Zend extension side module
# (.so) that PHP loads via dlopen at MINIT. Demos that want bytecode
# caching point opcache.optimization_level + extension_dir at the
# directory containing this file and pass `-d zend_extension=opcache`.
# build-php.sh links it directly with `wasm32posix-cc -shared` from
# PIC-compiled `ext/opcache/.libs/*.o` because PHP's bundled libtool
# refuses to emit a shared module on this cross-compile target.
[[outputs]]
name = "opcache"
wasm = "opcache.so"

# intl shipped as a fourth output: a regular PHP extension (.so side module)
# that PHP loads via `extension=intl.so` at MINIT — runtime-optional, so base
# php.wasm carries no ICU. It statically absorbs ICU (icu@74.2) and
# libc++/libc++abi; the ~30 MB ICU common data is NOT embedded but ships
# separately as icu.dat (from the icu package's share/icu.dat), loaded at
# runtime via udata_setCommonData() by intl-icu-data-loader.c. build-php.sh
# links it with `wasm32posix-cc -shared` from ext/intl/**/.libs/*.o for the
# same reason opcache is hand-linked (bundled libtool won't emit a shared
# module on this cross target).
[[outputs]]
name = "intl"
wasm = "intl.so"
