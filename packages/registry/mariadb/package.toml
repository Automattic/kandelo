kind = "program"
name = "mariadb"
version = "10.5.28"
kernel_abi = 7
depends_on = ["pcre2-source@10.44", "libcxx@21.1.7"]
# Opt into wasm64 — see memory/wasm64-build-policy.md.
arches = ["wasm32", "wasm64"]

[source]
url = "https://archive.mariadb.org/mariadb-10.5.28/source/mariadb-10.5.28.tar.gz"
sha256 = "0b5070208da0116640f20bd085f1136527f998cc23268715bcbf352e7b7f3cc1"

[license]
spdx = "GPL-2.0-only"
url = "https://github.com/MariaDB/server/blob/10.5/COPYING"

[build]
script_path = "packages/registry/mariadb/build-mariadb.sh"

# The first CMake stage builds native C/C++ generators. Use the Nix-aware
# wrapper names rather than accepting raw LLVM binaries without host headers.
[[host_tools]]
name = "cc"
version_constraint = ">=21.0"
probe = { args = ["--version"], version_regex = "clang version (\\d+\\.\\d+(?:\\.\\d+)?)" }
install_hints = { darwin = "run through scripts/dev-shell.sh", linux = "run through scripts/dev-shell.sh" }

[[host_tools]]
name = "c++"
version_constraint = ">=21.0"
probe = { args = ["--version"], version_regex = "clang version (\\d+\\.\\d+(?:\\.\\d+)?)" }
install_hints = { darwin = "run through scripts/dev-shell.sh", linux = "run through scripts/dev-shell.sh" }

[[outputs]]
name = "mariadbd"
wasm = "mariadbd.wasm"

[[outputs]]
name = "mysqltest"
wasm = "mysqltest.wasm"
