kind = "program"
name = "cpython"
version = "3.13.3"
kernel_abi = 7
depends_on = ["zlib@1.3.1"]

[source]
url = "https://www.python.org/ftp/python/3.13.3/Python-3.13.3.tar.xz"
sha256 = "40f868bcbdeb8149a3149580bb9bfd407b3321cd48f0be631af955ac92c0e041"

[license]
spdx = "Python-2.0"
url = "https://docs.python.org/3/license.html"

[build]
script_path = "packages/registry/cpython/build-cpython.sh"

[[outputs]]
name = "cpython"
wasm = "python.wasm"

# Python standard library (lib/python3.13/*.py), staged so the shipped runtime
# can import re/json/etc. The Homebrew formula installs this and points
# PYTHONHOME at it. Without it the bare python.wasm has no filesystem stdlib.
[[outputs]]
name = "cpython-stdlib"
wasm = "python-stdlib.zip"
