kind = "program"
name = "cpython"
version = "3.13.3"
kernel_abi = 41
depends_on = ["zlib@1.3.1"]

[source]
url = "https://www.python.org/ftp/python/3.13.3/Python-3.13.3.tar.xz"
sha256 = "40f868bcbdeb8149a3149580bb9bfd407b3321cd48f0be631af955ac92c0e041"

[license]
spdx = "Python-2.0"
url = "https://docs.python.org/3/license.html"

[build]
script_path = "packages/registry/cpython/build-cpython.sh"

[[outputs]]
name = "cpython"
wasm = "python.wasm"

# Pure-Python standard library and license tree. Keeping this non-Wasm runtime
# closure separate from the executable lets Formulae install a normal keg while
# VFS builders consume the same immutable bytes through the resolver contract.
[[runtime_files]]
artifact = "python-runtime.zip"
guest_path = "/usr/share/cpython/python-runtime.zip"
