kind = "program"
name = "ruby"
version = "4.0.5"
kernel_abi = 15
depends_on = ["zlib@1.3.1"]

[source]
url = "https://cache.ruby-lang.org/pub/ruby/4.0/ruby-4.0.5.tar.gz"
sha256 = "7d6149079a63f8ae1d326c9fa65c6019ba2dc3155eae7b39159817911c88958e"

[license]
spdx = "Ruby OR BSD-2-Clause"
url = "https://github.com/ruby/ruby/blob/master/COPYING"

[build]
script_path = "packages/registry/ruby/build-ruby.sh"

[[outputs]]
name = "ruby"
wasm = "ruby.wasm"

# Runtime files use /usr by default for direct package images. Callers such as
# Homebrew may compile the same runtime for their stable guest prefix while the
# archive keeps its portable /usr staging layout. Multi-output layout places
# both outputs under programs/<arch>/ruby/.
[[outputs]]
name = "ruby-runtime"
wasm = "ruby-runtime.zip"
