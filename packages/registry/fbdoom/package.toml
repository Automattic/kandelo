kind = "program"
name = "fbdoom"
version = "0.1.0"
# rev5: coalesce queued PS/2 mouse packets into one Doom mouse event per
# input poll so pointer-lock motion is not lost inside a game tic. rev4 fixed
# fbDOOM's wasm exit path by avoiding an invalid G_CheckDemoStatus ->
# atexit_func_t cast. rev3 dropped the bundled IWAD; the browser demo fetches
# the DOOM shareware `doom1.wad` at page load from a Linux-distro mirror and
# caches it via the Cache API. The archive carries only `fbdoom.wasm`.
kernel_abi = 7
depends_on = []

# Upstream has no release tarball, so this package pins an exact commit archive.
[source]
url = "https://github.com/maximevince/fbDOOM/archive/17280163bc95e5d954d2efaa0633489b763b4cd1.tar.gz"
sha256 = "77f57cee68fed438dffdba96f6070b8975c16652a63ddf4fb967994e5585a38a"

[license]
spdx = "GPL-2.0-or-later"
url = "https://github.com/maximevince/fbDOOM/blob/master/COPYING"

[build]
script_path = "packages/registry/fbdoom/build-fbdoom.sh"

[[outputs]]
name = "fbdoom"
wasm = "fbdoom.wasm"
