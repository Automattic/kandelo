script_path = "packages/registry/libcxx/build-libcxx.sh"
repo_url    = "https://github.com/brandonpayton/kandelo.git"
commit      = "8c53383229fab78f97b098c3207a655159c03041"
# Revision 4: libcxx + libcxxabi + libunwind rebuilt with
# `-mllvm -wasm-use-legacy-eh=false` explicitly set.
# Revision 5: libcxx builds only from flake.nix's exact Nix LLVM
# source derivations, hard-fails on compiler/source version drift, and
# installs headers from the build tree so the header set cannot drift
# from the built library.
revision    = 5

[binary]
index_url = "https://github.com/Automattic/kandelo/releases/download/binaries-abi-v{abi}/index.toml"
