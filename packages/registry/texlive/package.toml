kind = "program"
name = "texlive"
version = "2025"
# rev2: bundle texlive-bundle.json into the package archive (so the
# distribution macros + latex.fmt ride alongside pdftex.wasm). Bumped
# from rev1 to invalidate any cached rev1 archives that only contain
# pdftex.wasm.
kernel_abi = 7
depends_on = ["zlib@1.3.1", "libpng@1.6.43"]

[source]
url = "https://ftp.tu-chemnitz.de/pub/tug/historic/systems/texlive/2025/texlive-20250308-source.tar.xz"
sha256 = "fffdb1a3d143c177a4398a2229a40d6a88f18098e5f6dcfd57648c9f2417490f"

[license]
spdx = "LicenseRef-TeXLive-Various"
url = "https://www.tug.org/texlive/copying.html"

[build]
script_path = "packages/registry/texlive/build-texlive.sh"

# Two outputs: the wasm engine + the runtime distribution bundle.
# `place_binaries_symlinks` places both under
# `binaries/programs/<arch>/texlive/` (multi-output convention: ≥2
# outputs nest under a per-program subdir).
[[outputs]]
name = "pdftex"
wasm = "pdftex.wasm"

[[outputs]]
name = "texlive-bundle"
wasm = "texlive-bundle.json"

# No [binary] in this recipe — binary resolution lives in build.toml.
# The sibling build.toml's [binary] index_url points the resolver at
# the per-release index.toml ledger, which carries the archive URL +
# sha + cache_key for the (name, version, arch) tuple. Source build
# falls through automatically when no index entry matches.
