kind = "program"
name = "spidermonkey"
version = "140.11.0esr"
kernel_abi = 16
depends_on = ["libcxx@21.1.7", "openssl@3.3.2", "zlib@1.3.1"]

[source]
url = "https://ftp.mozilla.org/pub/firefox/releases/140.11.0esr/source/firefox-140.11.0esr.source.tar.xz"
sha256 = "1b034d2117356fda24807a151055132315c6ba58ad2bdf7ec71ee707fac5e028"

[license]
spdx = "MPL-2.0"
url = "https://www.mozilla.org/MPL/2.0/"

[build]
script_path = "packages/registry/spidermonkey/build-spidermonkey.sh"

[[host_tools]]
name = "python3"
version_constraint = ">=3.10"
probe = { args = ["--version"], version_regex = "Python (\\d+\\.\\d+(?:\\.\\d+)?)" }
install_hints = { darwin = "run through scripts/dev-shell.sh", linux = "run through scripts/dev-shell.sh" }

[[host_tools]]
name = "rustc"
version_constraint = ">=1.85"
probe = { args = ["--version"], version_regex = "rustc (\\d+\\.\\d+(?:\\.\\d+)?)" }
install_hints = { darwin = "rustup toolchain install stable", linux = "rustup toolchain install stable" }

[[host_tools]]
name = "cargo"
version_constraint = ">=1.85"
probe = { args = ["--version"], version_regex = "cargo (\\d+\\.\\d+(?:\\.\\d+)?)" }
install_hints = { darwin = "rustup toolchain install stable", linux = "rustup toolchain install stable" }

[[host_tools]]
name = "cbindgen"
version_constraint = ">=0.27.0"
probe = { args = ["--version"], version_regex = "cbindgen (\\d+\\.\\d+(?:\\.\\d+)?)" }
install_hints = { darwin = "nix develop, or: cargo install cbindgen", linux = "nix develop, or: cargo install cbindgen" }

[[host_tools]]
name = "node"
version_constraint = ">=22.0"
probe = { args = ["--version"], version_regex = "v(\\d+\\.\\d+(?:\\.\\d+)?)" }
install_hints = { darwin = "run through scripts/dev-shell.sh", linux = "run through scripts/dev-shell.sh" }

[[host_tools]]
name = "make"
version_constraint = ">=3.80"
probe = { args = ["--version"], version_regex = "GNU Make (\\d+\\.\\d+(?:\\.\\d+)?)" }
install_hints = { darwin = "run through scripts/dev-shell.sh", linux = "run through scripts/dev-shell.sh" }

[[host_tools]]
name = "curl"
version_constraint = ">=7.0"
probe = { args = ["--version"], version_regex = "curl (\\d+\\.\\d+(?:\\.\\d+)?)" }
install_hints = { darwin = "run through scripts/dev-shell.sh", linux = "run through scripts/dev-shell.sh" }

[[outputs]]
name = "js"
wasm = "js.wasm"
fork_instrumentation = "disabled"
