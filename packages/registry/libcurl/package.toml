# Per-library manifest for libcurl. See docs/package-management.md.
#
# The logical name is "libcurl" (matches the directory). Consumers
# reference it as `libcurl@8.11.1` in their own `depends_on`, and the
# resolver surfaces the install path via `WASM_POSIX_DEP_LIBCURL_DIR`.
# This manifest publishes only the library package. The separate `curl`
# program manifest invokes the same upstream build recipe in its own resolver
# transaction and publishes only curl.wasm; direct legacy invocations remain
# available to run.sh callers.

kind = "library"

name = "libcurl"
version = "8.11.1"
kernel_abi = 7
depends_on = ["zlib@1.3.1", "openssl@3.3.2"]
arches = ["wasm32"]

[source]
url = "https://curl.se/download/curl-8.11.1.tar.xz"
sha256 = "c7ca7db48b0909743eaef34250da02c19bc61d4f1dcedd6603f109409536ab56"

[license]
spdx = "curl"
url = "https://curl.se/docs/copyright.html"

[build]
script_path = "packages/registry/libcurl/build-libcurl.sh"

[[host_tools]]
name = "curl"
version_constraint = ">=7.0"
probe = { args = ["--version"], version_regex = "curl (\\d+\\.\\d+(?:\\.\\d+)?)" }
install_hints = { darwin = "run through scripts/dev-shell.sh", linux = "run through scripts/dev-shell.sh" }

[[host_tools]]
name = "make"
version_constraint = ">=3.80"
probe = { args = ["--version"], version_regex = "GNU Make (\\d+\\.\\d+(?:\\.\\d+)?)" }
install_hints = { darwin = "run through scripts/dev-shell.sh", linux = "run through scripts/dev-shell.sh" }

[[host_tools]]
name = "tar"
version_constraint = ">=1.30"
probe = { args = ["--version"], version_regex = "tar.*?(\\d+\\.\\d+(?:\\.\\d+)?)" }
install_hints = { darwin = "run through scripts/dev-shell.sh", linux = "run through scripts/dev-shell.sh" }

[[host_tools]]
name = "shasum"
version_constraint = ">=6.0"
probe = { args = ["--version"], version_regex = "(\\d+\\.\\d+(?:\\.\\d+)?)" }
install_hints = { darwin = "run through scripts/dev-shell.sh", linux = "run through scripts/dev-shell.sh" }

[[host_tools]]
name = "wasm-objdump"
version_constraint = ">=1.0"
probe = { args = ["--version"], version_regex = "(\\d+\\.\\d+(?:\\.\\d+)?)" }
install_hints = { darwin = "run through scripts/dev-shell.sh", linux = "run through scripts/dev-shell.sh" }

[outputs]
libs = ["lib/libcurl.a"]
# curl installs ~12 headers under include/curl/. Declare the directory
# (validator accepts dirs; matches openssl/ncurses pattern) instead of
# listing each header — churn-free across version bumps.
headers = ["include/curl"]
pkgconfig = ["lib/pkgconfig/libcurl.pc"]
