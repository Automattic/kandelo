# Per-library manifest for libwayland. See docs/package-management.md.
#
# Ports wayland 1.24.0's client + server libraries (libwayland-client.a +
# libwayland-server.a) to wasm32-posix-kernel. This is a REAL upstream
# port (tarball fetched + verified), not a shim: it exercises the kernel's
# AF_UNIX / SCM_RIGHTS / epoll surface with a large unmodified C codebase.
#
# The version pin is load-bearing: it MUST match
#   - packages/registry/wayland-protocols/xml/wayland.xml  (wayland 1.24.0), and
#   - the host `wayland-scanner` from flake.nix                (1.24.0),
# so the wire glue this library generates + compiles agrees byte-for-byte
# with the opcodes/interfaces the compositor and clients marshal against.
# See docs/plans/2026-07-08-dri-wayland-compositor-plan.md §3.
#
# We bypass upstream's meson build — it runs host-side feature probes that
# misreport against the wasm sysroot — and compile the handful of core TUs
# directly with a hand-curated config.h, mirroring the alsa-lib pattern.
#
# Dependencies:
#   libffi             — the Wayland-scoped ffi shim (PR1). libwayland's
#                        only ffi use is wl_closure_invoke; on wasm32 every
#                        argument is one i32 word, so the shim's arity
#                        switch (call_indirect) stands in for real libffi.
#   wayland-protocols  — the vendored protocol XML (PR2). The build
#                        generates wayland-protocol.c + the client/server
#                        protocol headers from xml/wayland.xml with the
#                        host wayland-scanner.

kind = "library"

name = "libwayland"
version = "1.24.0"
kernel_abi = 16
depends_on = ["libffi@0.1.0", "wayland-protocols@1.45"]

[[host_tools]]
# Pure code generator (like flex/bison); provided via flake.nix, consumed
# at build time to turn xml/wayland.xml into C marshalling glue. Must be
# >=1.24 so the generated wl_interface/wl_message tables match this port.
name = "wayland-scanner"
version_constraint = ">=1.24"
probe = { args = ["--version"], version_regex = "wayland-scanner (\\d+\\.\\d+(?:\\.\\d+)?)" }
install_hints = { darwin = "provided by flake.nix (pkgs.wayland-scanner); enter scripts/dev-shell.sh", linux = "provided by flake.nix (pkgs.wayland-scanner); or apt install libwayland-bin" }

[source]
# wayland 1.24.0 release tarball (freedesktop GitLab). sha256 matches the
# nixpkgs-pinned artifact used during PR3 development.
url = "https://gitlab.freedesktop.org/wayland/wayland/-/releases/1.24.0/downloads/wayland-1.24.0.tar.xz"
sha256 = "82892487a01ad67b334eca83b54317a7c86a03a89cfadacfef5211f11a5d0536"

[license]
spdx = "MIT"
url = "https://gitlab.freedesktop.org/wayland/wayland/-/blob/1.24.0/COPYING"

[build]
script_path = "packages/registry/libwayland/build-libwayland.sh"

[outputs]
libs = ["lib/libwayland-client.a", "lib/libwayland-server.a"]
# Public API + the generated protocol headers. wayland-util.h is what
# PR2's optional wasm-compile leg needs (WAYLAND_UTIL_H).
headers = [
  "include/wayland-client.h",
  "include/wayland-client-core.h",
  "include/wayland-client-protocol.h",
  "include/wayland-server.h",
  "include/wayland-server-core.h",
  "include/wayland-server-protocol.h",
  "include/wayland-util.h",
  "include/wayland-version.h",
]
