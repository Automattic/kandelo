kind = "program"
name = "sdl2-mixer-playwave"
version = "2.8.2"
kernel_abi = 40
depends_on = ["sdl2@2.32.10"]
arches = ["wasm32"]

[source]
url = "https://github.com/libsdl-org/SDL_mixer/releases/download/release-2.8.2/SDL2_mixer-2.8.2.tar.gz"
sha256 = "938dff531d00ace2296557a6599abe6f34599e2f34f0a4a08a397e2ccac8b8f7"

[license]
spdx = "Zlib"
url = "https://github.com/libsdl-org/SDL_mixer/blob/release-2.8.2/LICENSE.txt"

[build]
script_path = "packages/registry/sdl2-mixer-playwave/build-sdl2-mixer-playwave.sh"

[[host_tools]]
name = "make"
version_constraint = ">=3.80"
probe = { args = ["--version"], version_regex = "GNU Make (\\d+\\.\\d+(?:\\.\\d+)?)" }
install_hints = { darwin = "run through scripts/dev-shell.sh", linux = "run through scripts/dev-shell.sh" }

[[host_tools]]
name = "curl"
version_constraint = ">=7.71.0"
probe = { args = ["--version"], version_regex = "curl (\\d+\\.\\d+(?:\\.\\d+)?)" }
install_hints = { darwin = "run through scripts/dev-shell.sh", linux = "run through scripts/dev-shell.sh" }

[[host_tools]]
name = "tar"
version_constraint = ">=1.30"
probe = { args = ["--version"], version_regex = "tar.*?(\\d+\\.\\d+(?:\\.\\d+)?)" }
install_hints = { darwin = "run through scripts/dev-shell.sh", linux = "run through scripts/dev-shell.sh" }

[[host_tools]]
name = "shasum"
version_constraint = ">=6.0"
probe = { args = ["--version"], version_regex = "(\\d+\\.\\d+(?:\\.\\d+)?)" }
install_hints = { darwin = "run through scripts/dev-shell.sh", linux = "run through scripts/dev-shell.sh" }

[[outputs]]
name = "playwave"
wasm = "playwave.wasm"
