script_path = "packages/registry/libevdev/build-libevdev.sh"
repo_url    = "https://github.com/Automattic/kandelo.git"
commit      = "126f07f12"
revision    = 1

# The hand-curated config.h is part of the cache key: editing it (e.g.
# flipping a feature flag to track a sysroot change) must invalidate
# cached archives so consumers rebuild against the corrected set. The
# build script + config.h are tracked in git (the fetched `*-src/` tree
# is gitignored), so the resolver can hash them on a clean checkout.
inputs = [
  "packages/registry/libevdev/build-libevdev.sh",
  "packages/registry/libevdev/src/config.h",
  "packages/registry/libevdev/src/linux-types.h",
]

[binary]
index_url = "https://github.com/Automattic/kandelo/releases/download/binaries-abi-v{abi}/index.toml"
