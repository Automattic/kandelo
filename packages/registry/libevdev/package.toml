# Per-library manifest for libevdev. See docs/package-management.md.
#
# Ports libevdev 1.13.3 (libevdev.a) to wasm32-posix-kernel. libevdev
# wraps a `/dev/input/event*` fd: it owns the fd, does the EVIOCG*
# capability probing, and turns the raw `struct input_event` stream into
# a resyncable per-slot state machine. It is the mandatory foundation for
# the real libinput port (PR5c) — libinput's core evdev backend is built
# entirely on libevdev_new_from_fd / libevdev_next_event — and the
# roadmap's libinput dependency map had omitted it. See
# docs/plans/2026-07-08-dri-wayland-compositor-plan.md §5 (PR5).
#
# We bypass upstream's meson build (its feature probes target the build
# host, not the wasm sysroot) and compile the two core TUs directly, the
# same pattern as libxkbcommon and libwayland. The one build-time input
# libevdev needs is the generated event-name table (event-names.h), which
# python3 (flake.nix) produces from the bundled linux UAPI headers.

kind = "library"

name = "libevdev"
version = "1.13.3"
kernel_abi = 16

[[host_tools]]
# make-event-names.py generates libevdev/event-names.h from the bundled
# <linux/input.h> + <linux/input-event-codes.h> at build time (the dist
# tarball ships the generator, not its output). Provided via flake.nix
# (pkgs.python3).
name = "python3"
version_constraint = ">=3.6"
probe = { args = ["--version"], version_regex = "Python (\\d+\\.\\d+(?:\\.\\d+)?)" }
install_hints = { darwin = "provided by flake.nix (pkgs.python3); enter scripts/dev-shell.sh", linux = "provided by flake.nix (pkgs.python3); or apt install python3" }

[source]
# libevdev 1.13.3 dist tarball (freedesktop.org software mirror — durable,
# checksummed release artifacts, unlike the gitlab auto-archives). sha256
# verified against the fetched artifact during PR5 development.
url = "https://www.freedesktop.org/software/libevdev/libevdev-1.13.3.tar.xz"
sha256 = "abf1aace86208eebdd5d3550ffded4c8d73bb405b796d51c389c9d0604cbcfbf"

[license]
spdx = "MIT"
url = "https://gitlab.freedesktop.org/libevdev/libevdev/-/blob/libevdev-1.13.3/COPYING"

[build]
script_path = "packages/registry/libevdev/build-libevdev.sh"

[outputs]
libs = ["lib/libevdev.a"]
headers = ["include/libevdev/libevdev.h"]
