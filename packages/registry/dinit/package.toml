kind = "program"
name = "dinit"
version = "0.19.4"
kernel_abi = 7
# build-dinit.sh links against libc++/libc++abi from sysroot/lib/.
# Without this dep the resolver doesn't pre-stage libcxx and the build
# fails with "libc++.a not found". Mirrors mariadb's libcxx dep.
depends_on = ["libcxx@21.1.7"]

[source]
url = "https://github.com/davmac314/dinit/archive/refs/tags/v0.19.4.tar.gz"
sha256 = "3c0f624eb958f8e884631be4ef687da1e475ebaa6241e7ee330b864e6cd9e30b"

[license]
spdx = "Apache-2.0"
url = "https://github.com/davmac314/dinit/blob/v0.19.4/LICENSE"

[build]
script_path = "packages/registry/dinit/build-dinit.sh"

[[outputs]]
name = "dinit"
wasm = "dinit.wasm"

[[outputs]]
name = "dinitctl"
wasm = "dinitctl.wasm"

[[outputs]]
name = "dinitcheck"
wasm = "dinitcheck.wasm"
