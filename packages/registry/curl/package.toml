kind = "program"
name = "curl"
version = "8.11.1"
kernel_abi = 7
# curl and libcurl come from the same upstream build graph, but they are
# separate resolver packages. This transaction delegates to
# build-libcurl.sh in `curl` package mode and publishes only curl.wasm. Keep
# the source aligned with libcurl's release tarball because GitHub's tag
# archive does not contain the release-generated configure script.
#
# This separate build consumes zlib and OpenSSL resolver paths while linking
# the CLI. It does not consume the libcurl package output: the common source
# version and recipe content are already part of this package's own cache key.
depends_on = ["zlib@1.3.1", "openssl@3.3.2"]
arches = ["wasm32"]

[source]
url = "https://curl.se/download/curl-8.11.1.tar.xz"
sha256 = "c7ca7db48b0909743eaef34250da02c19bc61d4f1dcedd6603f109409536ab56"

[license]
spdx = "curl"
url = "https://github.com/curl/curl/blob/master/COPYING"

[build]
script_path = "packages/registry/curl/build-curl.sh"

[[host_tools]]
name = "curl"
version_constraint = ">=7.0"
probe = { args = ["--version"], version_regex = "curl (\\d+\\.\\d+(?:\\.\\d+)?)" }
install_hints = { darwin = "run through scripts/dev-shell.sh", linux = "run through scripts/dev-shell.sh" }

[[host_tools]]
name = "make"
version_constraint = ">=3.80"
probe = { args = ["--version"], version_regex = "GNU Make (\\d+\\.\\d+(?:\\.\\d+)?)" }
install_hints = { darwin = "run through scripts/dev-shell.sh", linux = "run through scripts/dev-shell.sh" }

[[host_tools]]
name = "tar"
version_constraint = ">=1.30"
probe = { args = ["--version"], version_regex = "tar.*?(\\d+\\.\\d+(?:\\.\\d+)?)" }
install_hints = { darwin = "run through scripts/dev-shell.sh", linux = "run through scripts/dev-shell.sh" }

[[host_tools]]
name = "shasum"
version_constraint = ">=6.0"
probe = { args = ["--version"], version_regex = "(\\d+\\.\\d+(?:\\.\\d+)?)" }
install_hints = { darwin = "run through scripts/dev-shell.sh", linux = "run through scripts/dev-shell.sh" }

[[host_tools]]
name = "wasm-objdump"
version_constraint = ">=1.0"
probe = { args = ["--version"], version_regex = "(\\d+\\.\\d+(?:\\.\\d+)?)" }
install_hints = { darwin = "run through scripts/dev-shell.sh", linux = "run through scripts/dev-shell.sh" }

[[outputs]]
name = "curl"
wasm = "curl.wasm"
