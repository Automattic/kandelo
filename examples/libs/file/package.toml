kind = "program"
name = "file"
version = "5.45"
revision = 1
kernel_abi = 7
depends_on = []

[source]
url = "https://astron.com/pub/file/file-5.45.tar.gz"
sha256 = "fc97f51029bb0e2c9f4e3bffefdaf678f0e039ee872b9de5c002a6d09c784d82"

[license]
spdx = "BSD-2-Clause"
url = "https://github.com/file/file/blob/master/COPYING"

[build]
script_path = "examples/libs/file/build-file.sh"
repo_url    = "https://github.com/wasm-posix-kernel/wasm-posix-kernel.git"
commit = "691b02ef99d28a48e2dd5b15c19e0dc9e0894eb1"

[[outputs]]
name = "file"
wasm = "file.wasm"

# magic.lite — wasm-safe trimmed magic database. Read by shell's
# build-shell-vfs-image.ts from file's cache canonical dir during
# shell's source build. Declaring it here makes it part of the
# package's cache_key_sha + validate_outputs contract: the existing
# v6/v7 release archives (which don't carry magic.lite) become stale,
# and the resolver source-rebuilds file — picking up the build-file.sh
# stage step that copies magic.lite into OUT_DIR.
[[outputs]]
name = "file-magic"
wasm = "magic.lite"

[binary]
archive_url = "https://github.com/brandonpayton/wasm-posix-kernel/releases/download/binaries-abi-v8/file-5.45-rev1-abi8-wasm32-e884efac.tar.zst"
