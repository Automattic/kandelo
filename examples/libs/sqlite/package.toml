# Per-library manifest for SQLite. See docs/package-management.md.
#
# Uses the single-source-file amalgamation distribution. Upstream
# version string is human-readable (e.g. "3.49.1"); the zip URL uses
# a packed form (3490100 = 3_49_01_00), which lives entirely inside
# source.url — consumers don't need to know about the encoding.

kind = "library"

name = "sqlite"
version = "3.49.1"
revision = 1
kernel_abi = 7
depends_on = []
# Opt into wasm64 because PHP depends on it. See
# memory/wasm64-build-policy.md.
arches = ["wasm32", "wasm64"]

[source]
url = "https://www.sqlite.org/2025/sqlite-amalgamation-3490100.zip"
sha256 = "6cebd1d8403fc58c30e93939b246f3e6e58d0765a5cd50546f16c00fd805d2c3"

[license]
spdx = "blessing"
url = "https://www.sqlite.org/copyright.html"

[build]
script_path = "examples/libs/sqlite/build-sqlite.sh"
repo_url    = "https://github.com/wasm-posix-kernel/wasm-posix-kernel.git"
commit = "7820d77228b1745335c259513b45573058f13fa6"

[outputs]
libs = ["lib/libsqlite3.a"]
headers = ["include/sqlite3.h", "include/sqlite3ext.h"]
pkgconfig = ["lib/pkgconfig/sqlite3.pc"]
[binary.wasm32]
archive_url = "https://github.com/brandonpayton/wasm-posix-kernel/releases/download/binaries-abi-v8/sqlite-3.49.1-rev1-abi8-wasm32-69aa2f69.tar.zst"
archive_sha256 = "1f9e5de63195507208972695f0626d86687086a60c7474eb2998df622b3e11a3"
[binary.wasm64]
archive_url = "https://github.com/brandonpayton/wasm-posix-kernel/releases/download/binaries-abi-v8/sqlite-3.49.1-rev1-abi8-wasm64-787285a6.tar.zst"
archive_sha256 = "8453e825d7808a7b71ffa008b829581df7f6eaed549a5cef0a99ff97a6a1b80e"
