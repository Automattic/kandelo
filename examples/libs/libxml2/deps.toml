# Per-library manifest for libxml2. See docs/dependency-management.md.
#
# libxml2 depends on zlib for optional compressed-input support (the
# `--with-zlib` configure path). Only zlib is declared as a build-time
# dep in V1; libxml2's other optional deps (lzma, icu, python, etc.)
# are all disabled via `--without-*` in build-libxml2.sh.

kind = "library"

name = "libxml2"
version = "2.13.8"
revision = 1
depends_on = ["zlib@1.3.1"]

[source]
url = "https://download.gnome.org/sources/libxml2/2.13/libxml2-2.13.8.tar.xz"
sha256 = "277294cb33119ab71b2bc81f2f445e9bc9435b893ad15bb2cd2b0e859a0ee84a"

[license]
spdx = "MIT"
url = "https://gitlab.gnome.org/GNOME/libxml2/-/blob/v2.13.8/Copyright"

[outputs]
# Note: the in-tree build installs headers directly under
# include/libxml/ rather than upstream's include/libxml2/libxml/ —
# consumers link with `-I$prefix/include` + `#include <libxml/...>`.
# See build-libxml2.sh for context (libtool mishandles the wasm .o
# naming, so the script compiles + installs by hand).
libs = ["lib/libxml2.a"]
headers = ["include/libxml"]
pkgconfig = ["lib/pkgconfig/libxml-2.0.pc"]
[binary]
archive_url = "https://github.com/brandonpayton/wasm-posix-kernel/releases/download/binaries-abi-v1/libxml2-2.13.8-rev1-wasm32-e1db116f.tar.zst"
archive_sha256 = "2500c7db46f556bbb6051a2112833564248a3db319a868c64b1b590238482c18"
