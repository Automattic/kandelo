# Pre-built VFS image for the MariaDB browser demo: mariadbd binary
# at /usr/sbin/mariadbd, bootstrap SQL at /etc/mariadb/bootstrap.sql,
# data tree at /data, shell init descriptors. Source at
# examples/browser/scripts/build-mariadb-vfs-image.ts.
