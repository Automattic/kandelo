kind = "program"
name = "php"
version = "8.3.2"
revision = 2
depends_on = ["zlib@1.3.1", "openssl@3.3.2", "sqlite@3.49.1", "libxml2@2.13.8"]

[source]
url = "https://www.php.net/distributions/php-8.3.2.tar.xz"
sha256 = "4ffa3e44afc9c590e28dc0d2d31fc61f0139f8b335f11880a121b9f9b9f0634e"

[license]
spdx = "PHP-3.01"
url = "https://github.com/php/php-src/blob/master/LICENSE"

[[outputs]]
name = "php"
wasm = "php.wasm"

# php-fpm shipped as a second output. The CLI + FPM builds were
# previously two parallel scripts (this dir's build-php.sh + the
# now-removed examples/nginx/build-php-fpm.sh) using two separate
# php-src checkouts and a sysroot-copy dance. Build-php.sh now does
# both from one source tree: --enable-cli + --enable-fpm produce
# sapi/cli/php and sapi/fpm/php-fpm; FPM gets asyncify-onlylist on
# top so its worker fork() path resumes correctly.
[[outputs]]
name = "php-fpm"
wasm = "php-fpm.wasm"
[binary]
archive_url = "https://github.com/brandonpayton/wasm-posix-kernel/releases/download/binaries-abi-v1/php-8.3.2-rev2-abi1-wasm32-057dbc2d.tar.zst"
archive_sha256 = "542965e5dc98f5eadc1e055e98ea78a8d6e8cad78da0f3ccc606fe62f0371b12"
