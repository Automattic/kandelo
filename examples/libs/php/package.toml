kind = "program"
name = "php"
version = "8.3.2"
revision = 2
kernel_abi = 7
depends_on = ["zlib@1.3.1", "openssl@3.3.2", "sqlite@3.49.1", "libxml2@2.13.8"]
# Opt into wasm64 — see memory/wasm64-build-policy.md. Both the CLI
# and php-fpm outputs ship per-arch.
arches = ["wasm32", "wasm64"]

[source]
url = "https://www.php.net/distributions/php-8.3.2.tar.xz"
sha256 = "4ffa3e44afc9c590e28dc0d2d31fc61f0139f8b335f11880a121b9f9b9f0634e"

[license]
spdx = "PHP-3.01"
url = "https://github.com/php/php-src/blob/master/LICENSE"

[build]
script_path = "examples/libs/php/build-php.sh"
repo_url    = "https://github.com/wasm-posix-kernel/wasm-posix-kernel.git"
commit = "7820d77228b1745335c259513b45573058f13fa6"

[[outputs]]
name = "php"
wasm = "php.wasm"

# php-fpm shipped as a second output. The CLI + FPM builds were
# previously two parallel scripts (this dir's build-php.sh + the
# now-removed examples/nginx/build-php-fpm.sh) using two separate
# php-src checkouts and a sysroot-copy dance. Build-php.sh now does
# both from one source tree: --enable-cli + --enable-fpm produce
# sapi/cli/php and sapi/fpm/php-fpm; FPM gets asyncify-onlylist on
# top so its worker fork() path resumes correctly.
[[outputs]]
name = "php-fpm"
wasm = "php-fpm.wasm"
[binary.wasm32]
archive_url = "https://github.com/brandonpayton/wasm-posix-kernel/releases/download/binaries-abi-v8/php-8.3.2-rev2-abi8-wasm32-65bbf1b4.tar.zst"
archive_sha256 = "409ac59e356fa92d9bf72fd84f29f2de69f06a93916c742e59cf72ffbcab59fe"
[binary.wasm64]
archive_url = "https://github.com/brandonpayton/wasm-posix-kernel/releases/download/binaries-abi-v8/php-8.3.2-rev2-abi8-wasm64-60cb6b4f.tar.zst"
archive_sha256 = "def39563ad225fbe5a14d13cf3e843d0dd390fa2bdb54782e5590d4260cc567a"
