kind = "program"
name = "lamp"
version = "0.1.0"
# rev2: TEMPORARY workaround for the "MariaDB bootstrap-mode startup
# hang" deferred investigation (same root cause as mariadb-vfs rev3).
# The dinit `mariadb-bootstrap` service is now a no-op `internal`
# anchor instead of running `mariadbd --bootstrap < bootstrap.sql`.
# Daemon mariadbd starts directly on top of an empty /data tree;
# `--init-file=/etc/mariadb/init.sql` creates the `wordpress`
# database and WordPress lazily creates its tables. mysql.* system
# tables are not present, but `--skip-grant-tables` lets mariadbd
# run without them and the demo doesn't query them.
#
# Revert to revision = 1 + restore the scripted `mariadb-bootstrap`
# service in build-lamp-vfs-image.ts once the startup hang is fixed.
revision = 2
depends_on = []

