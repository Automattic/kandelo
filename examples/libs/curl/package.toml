kind = "program"
name = "curl"
version = "8.11.1"
revision = 1
kernel_abi = 7
# curl is a side-output of libcurl's build (libcurl's autoconf produces
# both lib/libcurl.a and src/curl). Keep this manifest aligned with
# libcurl's source so build-curl.sh — which delegates to
# build-libcurl.sh — finds a pre-generated `configure` script. The
# github "archive/refs/tags/" tarball does NOT contain one (autoconf
# runs at release time, not in git); the curl.se release tarball does.
#
# build-curl.sh is literally `exec bash build-libcurl.sh`, so curl
# is a strict consumer of libcurl's build. Declaring the dep makes
# the resolver build libcurl first; folds libcurl's cache_key into
# ours so a libcurl bump invalidates the curl cache.
depends_on = ["libcurl@8.11.1"]

[source]
url = "https://curl.se/download/curl-8.11.1.tar.xz"
sha256 = "c7ca7db48b0909743eaef34250da02c19bc61d4f1dcedd6603f109409536ab56"

[license]
spdx = "curl"
url = "https://github.com/curl/curl/blob/master/COPYING"

[build]
script_path = "examples/libs/curl/build-curl.sh"
repo_url    = "https://github.com/wasm-posix-kernel/wasm-posix-kernel.git"
commit = "691b02ef99d28a48e2dd5b15c19e0dc9e0894eb1"

[[outputs]]
name = "curl"
wasm = "curl.wasm"
[binary]
archive_url = "https://github.com/brandonpayton/wasm-posix-kernel/releases/download/binaries-abi-v8/curl-8.11.1-rev1-abi8-wasm32-8f365038.tar.zst"
archive_sha256 = "6fc96add2030474c8dd09c3c3cfbc007fe6251ac47d6394603aa7349906e388c"
