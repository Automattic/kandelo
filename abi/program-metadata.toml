# Source + license metadata per logical program.
#
# Consumed by `cargo xtask bundle-program` to decorate each release
# bundle with `source` and `license` fields in abi/manifest.json.
#
# Adding a new ported program → add a section here. Missing metadata
# is a hard error from `bundle-program`; every asset we ship declares
# who made it and how.

# --- This project ---

[kernel]
source.url = "https://github.com/brandonpayton/wasm-posix-kernel"
source.ref = "main"
license.spdx = "GPL-2.0-or-later"
license.url  = "https://github.com/brandonpayton/wasm-posix-kernel/blob/main/COPYING"

[userspace]
source.url = "https://github.com/brandonpayton/wasm-posix-kernel"
source.ref = "main"
license.spdx = "GPL-2.0-or-later"
license.url  = "https://github.com/brandonpayton/wasm-posix-kernel/blob/main/COPYING"

# Test/example programs built from this repo's `programs/` and `examples/`
# directories all share the repo's license. The `examples` entry holds
# the canonical metadata; each program below is an `alias` so the
# manifest still records its specific program name while reusing the
# same source + license facts.
[examples]
source.url = "https://github.com/brandonpayton/wasm-posix-kernel"
source.ref = "main"
license.spdx = "GPL-2.0-or-later"
license.url  = "https://github.com/brandonpayton/wasm-posix-kernel/blob/main/COPYING"

[exec-caller]
alias = "examples"

[exec-child]
alias = "examples"

[fork-exec]
alias = "examples"

[ifhwaddr]
alias = "examples"

[mmap_shared_test]
alias = "examples"

[hello]
alias = "examples"

[hello64]
alias = "examples"

[sh]
alias = "dash"

