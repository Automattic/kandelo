<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kandelo Homebrew Framebuffer Smoke</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        background: #111;
        color: #eee;
      }
      body { margin: 0; padding: 16px; }
      #status { margin-bottom: 12px; }
      #fb { image-rendering: pixelated; background: #000; border: 1px solid #333; }
      #log { white-space: pre-wrap; overflow-wrap: anywhere; max-height: 40vh; overflow: auto; }
    </style>
  </head>
  <body>
    <div id="status">Loading</div>
    <canvas id="fb" width="640" height="480"></canvas>
    <pre id="log"></pre>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
