<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/wasm-posix-kernel/service-worker.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MariaDB — wasm-posix-kernel</title>
  <script type="module" crossorigin src="/wasm-posix-kernel/assets/mariadb-B7nsYZws.js"></script>
  <link rel="modulepreload" crossorigin href="/wasm-posix-kernel/assets/browser-kernel-DKpCrzg4.js">
  <link rel="modulepreload" crossorigin href="/wasm-posix-kernel/assets/worker-main-N8-Fr_O9.js">
  <link rel="modulepreload" crossorigin href="/wasm-posix-kernel/assets/mysql_system_tables_data-BEXINe6V.js">
  <link rel="stylesheet" crossorigin href="/wasm-posix-kernel/assets/layout-CgaJCU8K.css">
</head>
<body>
  <nav class="sidebar">
    <div class="sidebar-title">Demos</div>
    <a href="/wasm-posix-kernel/">Simple Programs</a>
    <a href="/wasm-posix-kernel/pages/nginx/">nginx</a>
    <a href="/wasm-posix-kernel/pages/php/">PHP CLI</a>
    <a href="/wasm-posix-kernel/pages/nginx-php/">nginx + PHP-FPM</a>
    <a href="/wasm-posix-kernel/pages/mariadb/" aria-current="page">MariaDB</a>
    <a href="/wasm-posix-kernel/pages/redis/">Redis</a>
    <a href="/wasm-posix-kernel/pages/wordpress/">WordPress</a>
    <a href="/wasm-posix-kernel/pages/lamp/">LAMP</a>
    <a href="/wasm-posix-kernel/pages/shell/">Shell</a>
    <a href="/wasm-posix-kernel/pages/python/">Python</a>
  </nav>
  <div class="main">
    <div class="main-header">
      <h1>MariaDB on wasm-posix-kernel</h1>
      <p class="subtitle">MariaDB 10.5 running inside a POSIX kernel compiled to WebAssembly</p>
      <div class="controls">
        <button id="start">Start MariaDB</button>
        <select id="examples">
          <option value="">-- Example Queries --</option>
          <option value="version">Server Version</option>
          <option value="create">Create Table</option>
          <option value="insert">Insert Data</option>
          <option value="select">Select Data</option>
          <option value="show">Show Tables</option>
          <option value="databases">Show Databases</option>
        </select>
        <button id="execute" disabled>Execute SQL</button>
      </div>
      <div class="sql-input">
        <textarea id="sql" placeholder="Enter SQL query...">SELECT VERSION(), @@version_comment;</textarea>
      </div>
      <div id="status" class="status" style="display:none"></div>
    </div>
    <div class="preview-area">
      <div class="split-panels">
        <div class="log-panel">
          <h3>Kernel Log</h3>
          <pre id="log"></pre>
        </div>
        <div class="result-panel">
          <h3>Query Result</h3>
          <div id="result" class="result-content"><p class="placeholder-text">Start MariaDB and execute a query</p></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
